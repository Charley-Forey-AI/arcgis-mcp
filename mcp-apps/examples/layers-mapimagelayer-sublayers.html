<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>MapImageLayer - Toggle sublayer visibility | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
  </head>
  <body>
    <calcite-shell>
      <arcgis-map center="-99, 39" zoom="3">
        <arcgis-zoom slot="top-left"></arcgis-zoom>
        <calcite-panel heading="Sublayer Visibility" slot="top-right">
          <calcite-list label="Sublayers" selection-mode="multiple">
            <calcite-list-item label="Cities" value="0"> </calcite-list-item>
            <calcite-list-item label="Highways" value="1"> </calcite-list-item>
            <calcite-list-item label="Railroads" value="4"> </calcite-list-item>
            <calcite-list-item label="States" value="2"> </calcite-list-item>
          </calcite-list>
        </calcite-panel>
      </arcgis-map>
    </calcite-shell>
    <script type="module">
      const [Map, MapImageLayer, SimpleRenderer, SimpleLineSymbol] = await $arcgis.import([
        "@arcgis/core/Map.js",
        "@arcgis/core/layers/MapImageLayer.js",
        "@arcgis/core/renderers/SimpleRenderer.js",
        "@arcgis/core/symbols/SimpleLineSymbol.js",
      ]);

      // Define a custom line renderer for the Railroads sublayer (dynamic data layer)
      // to control its appearance on the map.
      const renderer = new SimpleRenderer({
        symbol: new SimpleLineSymbol({
          color: [255, 255, 255, 0.5],
          width: 0.75,
          style: "long-dash-dot-dot",
        }),
      });
      // Create a MapImageLayer for a USA Map Service containing cities,
      // highways, railroads, and states.
      // Configure initial visibility for each sublayer.
      const layer = new MapImageLayer({
        url: "https://sampleserver6.arcgisonline.com/arcgis/rest/services/USA/MapServer",
        sublayers: [
          {
            id: 2,
            visible: true,
          },
          {
            id: 4,
            visible: false,
            title: "Railroads",
            renderer,
            source: {
              // Specify that this sublayer uses a dynamic data source.
              type: "data-layer",
              // Define the data source for the sublayer:
              // here, a feature class table from a file geodatabase is referenced.
              dataSource: {
                type: "table",
                workspaceId: "MyDatabaseWorkspaceIDSSR2", // Workspace name
                dataSourceName: "ss6.gdb.Railroads", // Table name
              },
            },
          },
          {
            id: 1,
            visible: true,
          },
          {
            id: 0,
            visible: true,
          },
        ],
      });
      // Initialize the map with a basemap and add the configured MapImageLayer
      // to display its sublayers.
      document.querySelector("arcgis-map").map = new Map({
        basemap: "dark-gray-vector",
        layers: [layer],
      });
      // After the layer loads, synchronize the Calcite list UI
      // with the current sublayer visibility.
      await layer.loadAll();
      layer.sublayers?.forEach((sublayer) => {
        const listItem = document.querySelector(`calcite-list-item[value="${sublayer.id}"]`);
        if (listItem) {
          listItem.selected = sublayer.visible;
        }
      });

      // When the Calcite list selection changes, update each sublayer's visibility
      // to match the selected state of its corresponding list item.
      document.querySelector("calcite-list").addEventListener("calciteListChange", () => {
        const listItems = document.querySelectorAll("calcite-list-item");
        listItems.forEach((listItem) => {
          const sublayer = layer.findSublayerById(Number(listItem.value));
          if (sublayer) {
            sublayer.visible = listItem.selected;
          }
        });
      });
    </script>
  </body>
</html>
