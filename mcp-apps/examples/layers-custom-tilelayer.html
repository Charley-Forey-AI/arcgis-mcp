<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Custom TileLayer | Sample | ArcGIS Maps SDK for JavaScript</title>

    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css" />

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
    </style>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <script type="module">
      // Import necessary modules from the ArcGIS Maps SDK for JavaScript
      const [Map, esriRequest, Color, BaseTileLayer, reactiveUtils] = await $arcgis.import([
        "@arcgis/core/Map.js",
        "@arcgis/core/request.js",
        "@arcgis/core/Color.js",
        "@arcgis/core/layers/BaseTileLayer.js",
        "@arcgis/core/core/reactiveUtils.js",
      ]);

      const expand = document.querySelector("arcgis-expand");
      expand.expandIcon = "palette";

      // *******************************************************
      // Custom tile layer class code
      // Create a subclass of BaseTileLayer
      // *******************************************************
      const TintLayer = BaseTileLayer.createSubclass({
        properties: {
          urlTemplate: null,
          tint: {
            value: null,
            type: Color,
          },
        },
        // Watch the tint property and refresh the layer if the tint values
        // change at runtime.
        initialize() {
          reactiveUtils.watch(
            () => this.tint,
            () => {
              this.refresh();
            },
          );
        },
        // Generate the tile url for a given level, row and column
        getTileUrl(level, row, col) {
          return this.urlTemplate.replace("{z}", level).replace("{x}", col).replace("{y}", row);
        },
        // This method fetches tiles for the specified level and size.
        // Override this method to process the data returned from the server.
        fetchTile(level, row, col, options) {
          // call getTileUrl() method to construct the URL to tiles
          // for a given level, row and col provided by the LayerView
          const url = this.getTileUrl(level, row, col);
          // Request for tiles based on the generated url
          // the signal option ensures that obsolete requests are aborted
          return esriRequest(url, {
            responseType: "image",
            signal: options && options.signal,
          }).then((response) => {
            // When esri request resolves successfully
            // get the image from the response
            const image = response.data;
            const width = this.tileInfo.size[0];
            const height = this.tileInfo.size[0];

            // Create a canvas with 2D rendering context
            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");
            canvas.width = width;
            canvas.height = height;

            // Apply the tint color provided by
            // by the application to the canvas
            if (this.tint) {
              // Get a CSS color string in rgba form
              // representing the tint Color instance.
              context.fillStyle = this.tint.toCss();
              context.fillRect(0, 0, width, height);

              // Applies "difference" blending operation between canvas
              // and steman tiles. Difference blending operation subtracts
              // the bottom layer (canvas) from the top layer (tiles) or the
              // other way round to always get a positive value.
              context.globalCompositeOperation = "difference";
            }

            // Draw the blended image onto the canvas.
            context.drawImage(image, 0, 0, width, height);
            return canvas;
          });
        },
      });

      // Create a new instance of the TintLayer and set its properties
      const openTopoMapTileLayer = new TintLayer({
        urlTemplate: "https://tile.opentopomap.org/{z}/{x}/{y}.png",
        tint: new Color("#132178"),
        title: "OpenTopoMap",
        copyright:
          'Map data from &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> Map design by &copy; <a href="http://opentopomap.org/" target="_blank">OpenTopoMap</a> (<a href="https://creativecommons.org/licenses/by-sa/3.0/" target="_blank">CC-BY-SA</a>) contributors',
      });

      // Add the new instance of the custom tile layer to the map
      const map = new Map({
        layers: [openTopoMapTileLayer],
      });

      // Scene setup
      const viewElement = document.querySelector("arcgis-scene");
      viewElement.map = map;

      await viewElement.viewOnReady();

      viewElement.environment = {
        lighting: {
          type: "virtual",
        },
      };

      const colorPicker = document.getElementById("colorPicker");
      colorPicker.addEventListener("calciteColorPickerChange", () => {
        openTopoMapTileLayer.tint = colorPicker.value;
      });
    </script>
  </head>

  <body>
    <arcgis-scene zoom="7" center="8.5, 45.5">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"></arcgis-compass>
      <arcgis-layer-list slot="top-right"></arcgis-layer-list>
      <arcgis-expand slot="top-right" label="Change tint color">
        <calcite-color-picker
          id="colorPicker"
          channels-disabled
          saved-disabled
          value="#132178"></calcite-color-picker>
      </arcgis-expand>
    </arcgis-scene>
  </body>
</html>
