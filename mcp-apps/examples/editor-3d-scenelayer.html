<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>SceneLayer attribute editing | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      arcgis-editor {
        max-height: 300px;
        overflow-y: auto;
      }

      #editorConfigDiv {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 4px;
        padding: 12px 16px;
        background: var(--calcite-color-foreground-1);
        min-width: 260px;
      }

      #editorConfigDiv calcite-button {
        flex: 1;
        width: 112px;
        height: 40px;
      }

      #editorConfigDiv calcite-button:hover {
        filter: brightness(1.05);
      }
    </style>
  </head>

  <body>
    <arcgis-scene item-id="a3bd04ebe7fe49fbae145ae6b9c66da7" popup-disabled>
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"></arcgis-compass>
      <arcgis-editor slot="top-right"></arcgis-editor>
      <div id="editorConfigDiv" slot="bottom-right">
        <calcite-button
          id="renderFloorType"
          title="Floortype"
          scale="m"
          width="full"
          appearance="outline">
          Floor type
        </calcite-button>
        <calcite-button id="renderStatus" title="Status" scale="m" width="full" appearance="solid">
          Status
        </calcite-button>
      </div>
    </arcgis-scene>

    <script type="module">
      /*****************************************************************
       * Get a reference to the HTML elements
       *****************************************************************/
      const viewElement = document.querySelector("arcgis-scene");
      const editorElement = document.querySelector("arcgis-editor");

      // Wait for the view to initialize
      await viewElement.viewOnReady();
      // Set the colors for the status values
      const visualVariablesStatus = [
        {
          type: "color",
          field: "Status",
          stops: [
            {
              value: 0, // unknown
              color: [191, 189, 189, 1],
            },
            {
              value: 1, // free
              color: [0, 204, 0, 1],
            },
            {
              value: 2, // reserved
              color: [255, 128, 0, 1],
            },
            {
              value: 3, // occupied
              color: [204, 0, 0, 1],
            },
          ],
        },
      ];

      // Set the colors for the floortype values
      const visualVariablesFloorType = [
        {
          type: "color",
          field: "FloorType",
          stops: [
            {
              value: 0, // Unknown
              color: [191, 189, 189, 1],
            },
            {
              value: 1, // Apartments
              color: [0, 182, 241, 1],
            },
            {
              value: 2, // Industrial
              color: [217, 191, 13, 1],
            },
            {
              value: 3, // Restaurants
              color: [106, 40, 199, 1],
            },
            {
              value: 4, // Retail
              color: [171, 87, 157, 1],
            },
            {
              value: 5, // Hotel
              color: [120, 174, 160, 1],
            },
          ],
        },
      ];

      // Create the renderer and configure visual variables
      const renderer = {
        type: "simple", // autocasts as new SimpleRenderer()
        symbol: {
          type: "mesh-3d", // autocasts as new MeshSymbol3D()
          symbolLayers: [
            {
              type: "fill", // autocasts as new FillSymbol3DLayer()
              material: {
                color: "#ffffff",
                colorMixMode: "replace",
              },
              edges: {
                type: "solid",
                color: [0, 0, 0, 0.6],
                size: 1,
              },
            },
          ],
        },
        visualVariables: visualVariablesStatus,
      };

      // Search in the map for the scenelayer for attribute editing
      const sceneLayer = viewElement.map.layers.find((layer) => {
        return layer.title === "BuildingsEditAttribute";
      });
      sceneLayer.renderer = renderer;

      // Setup the actions for the buttons
      const renderFloorTypeBtn = document.getElementById("renderFloorType");
      const renderStatusBtn = document.getElementById("renderStatus");
      renderFloorTypeBtn.addEventListener("click", () => {
        toggleRenderer("FloorType");
      });
      renderStatusBtn.addEventListener("click", () => {
        toggleRenderer("Status");
      });

      function toggleRenderer(type) {
        if (type === "Status") {
          const renderer = sceneLayer.renderer.clone();
          renderer.visualVariables = visualVariablesStatus;
          sceneLayer.renderer = renderer;
          renderStatusBtn.appearance = "solid";
          renderFloorTypeBtn.appearance = "outline";
        }
        if (type === "FloorType") {
          const renderer = sceneLayer.renderer.clone();
          renderer.visualVariables = visualVariablesFloorType;
          sceneLayer.renderer = renderer;
          renderStatusBtn.appearance = "outline";
          renderFloorTypeBtn.appearance = "solid";
        }
      }
    </script>
  </body>
</html>
