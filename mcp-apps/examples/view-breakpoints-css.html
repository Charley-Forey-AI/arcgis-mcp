<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Responsive apps using CSS | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      #titleDiv {
        font-size: var(--calcite-font-size-md);
        font-weight: var(--calcite-font-weight-bold);
        padding: var(--calcite-spacing-sm);
      }
    </style>
  </head>

  <body>
    <calcite-shell>
      <div slot="header" id="titleDiv">test content</div>
      <arcgis-map item-id="52333f74c9d9465c88f2ed7336e1e627">
        <arcgis-zoom slot="top-left"></arcgis-zoom>
        <arcgis-legend id="legend" slot="top-right"></arcgis-legend>
        <arcgis-expand id="expandLegend" slot="top-right">
          <arcgis-legend></arcgis-legend>
        </arcgis-expand>
      </arcgis-map>
    </calcite-shell>
    <script type="module">
      // Get references to the map, legend, and expand components
      const viewElement = document.querySelector("arcgis-map");
      const legendElement = document.querySelector("#legend");
      const expandLegendElement = document.querySelector("#expandLegend");
      // wait for the map to be ready
      await viewElement.viewOnReady();
      // Set the title
      const titleDiv = document.querySelector("#titleDiv");
      titleDiv.textContent = viewElement.map.portalItem.title + " - Expand Widget";

      let isMobile = null; // Track last known mode

      // update the view
      function updateView(nextIsMobile) {
        if (isMobile === nextIsMobile) {
          return; // Skip if nothing changed
        }
        isMobile = nextIsMobile;
        // Update the UI based on the current mode
        titleDiv.style.display = isMobile ? "none" : "block";
        expandLegendElement.style.display = isMobile ? "block" : "none";
        legendElement.style.display = isMobile ? "none" : "block";
      }
      // Initial check
      updateView(viewElement.offsetWidth < 500);
      // Observe changes in the map container size
      const observer = new ResizeObserver((entries) => {
        for (const entry of entries) {
          updateView(entry.contentRect.width < 500);
        }
      });
      observer.observe(viewElement);
    </script>
  </body>
</html>
