<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Add edges to a SceneLayer | Sample | ArcGIS Maps SDK for JavaScript</title>
    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      calcite-segmented-control {
        --calcite-segmented-control-border-color: #cfcfcf;
      }
    </style>
  </head>

  <body>
    <!-- Use the component with a WebScene ID -->
    <arcgis-scene item-id="12d629fc946845628011f17a963373a9">
      <arcgis-legend slot="bottom-right"></arcgis-legend>
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"> </arcgis-compass>

      <div id="controls" slot="top-right">
        <calcite-segmented-control id="edge-control">
          <calcite-segmented-control-item value="solidEdges" checked
            >Solid edges</calcite-segmented-control-item
          >
          <calcite-segmented-control-item value="sketchEdges"
            >Sketch edges</calcite-segmented-control-item
          >
          <calcite-segmented-control-item value="noEdges">No edges</calcite-segmented-control-item>
        </calcite-segmented-control>
      </div>
    </arcgis-scene>

    <script type="module">
      const SceneLayer = await $arcgis.import("@arcgis/core/layers/SceneLayer.js");

      // Get a reference to the Scene component
      const viewElement = document.querySelector("arcgis-scene");

      // Define edge types
      const solidEdges = {
        type: "solid",
        color: [0, 0, 0, 0.6],
        size: 1,
      };
      const sketchEdges = {
        type: "sketch",
        color: [0, 0, 0, 0.8],
        size: 1,
        extensionLength: 10,
      };

      // Create the renderer and configure visual variables
      const renderer = {
        type: "simple", // autocasts as new SimpleRenderer()
        symbol: {
          type: "mesh-3d",
          symbolLayers: [
            {
              type: "fill",
              material: {
                color: "#ffffff",
                colorMixMode: "replace",
              },
              edges: solidEdges,
            },
          ],
        },
        visualVariables: [
          {
            // specifies a visual variable of continuous color
            type: "color",
            // based on a field indicating the walking time to public transport
            field: "walkTimeToStopsInService",
            legendOptions: {
              title: "Walking time to public transport",
            },
            // color ramp from white to blue
            // based on the walking time to public transport.
            // Buildings will be assigned a color proportional
            // to the min and max colors specified below
            stops: [
              {
                value: 1,
                color: "#2887a1",
                label: "less than 1 minute",
              },
              {
                value: 15,
                color: "#ffffff",
                label: "more than 15 minutes",
              },
            ],
          },
        ],
      };

      // Create a SceneLayer instance
      const sceneLayer = new SceneLayer({
        portalItem: {
          id: "f5c497819a374941b0ce8d9b0e979819",
        },
        title: "San Francisco buildings",
        renderer: renderer, // Set the renderer to sceneLayer
      });

      // Wait for the view to initialize
      await viewElement.viewOnReady();

      // Add the SceneLayer to the map
      viewElement.map.add(sceneLayer);

      // Edge toggle logic
      document.getElementById("edge-control").addEventListener("click", (event) => {
        let edges = null;
        if (event.target.value === "sketchEdges") edges = sketchEdges;
        else if (event.target.value === "solidEdges") edges = solidEdges;

        const newRenderer = sceneLayer.renderer.clone();
        newRenderer.symbol.symbolLayers.getItemAt(0).edges = edges;
        sceneLayer.renderer = newRenderer;
      });
    </script>
  </body>
</html>
