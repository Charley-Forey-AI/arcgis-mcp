<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Intro to ImageryTileLayer | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-map basemap="gray-vector" center="84, 31" zoom="4">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-layer-list slot="top-right">
        <calcite-card>
          <div slot="heading">Stretch Rendering Parameters</div>
          <div slot="description">
            <calcite-label>
              stretchType
              <calcite-select>
                <calcite-option value="min-max" selected>min-max</calcite-option>
                <calcite-option value="standard-deviation">standard deviation</calcite-option>
              </calcite-select>
            </calcite-label>

            <calcite-label>
              <span id="slider-label">min-max</span>
              <calcite-slider label-handles label-ticks></calcite-slider>
            </calcite-label>

            <calcite-label>
              <div>blendMode</div>
              <calcite-switch label-text-start="Off" label-text-end="On" checked></calcite-switch>
            </calcite-label>
          </div>
        </calcite-card>
      </arcgis-layer-list>
    </arcgis-map>

    <script type="module">
      const [GroupLayer, ImageryTileLayer, TileLayer] = await $arcgis.import([
        "@arcgis/core/layers/GroupLayer.js",
        "@arcgis/core/layers/ImageryTileLayer.js",
        "@arcgis/core/layers/TileLayer.js",
      ]);

      let stretchType = "min-max";

      const viewElement = document.querySelector("arcgis-map");
      const layerList = document.querySelector("arcgis-layer-list");
      const rendererCard = document.querySelector("calcite-card");
      const slider = document.querySelector("calcite-slider");
      const sliderLabel = document.getElementById("slider-label");
      const stretchTypeSelect = document.querySelector("calcite-select");
      const blendModeSwitch = document.querySelector("calcite-switch");
      await viewElement.componentOnReady();

      // Store initialization objects for the different slider configurations.
      const init = {
        "min-max": { max: 5000, min: 0, step: 10, ticks: 5000, value: [360, 3068] },
        "standard-deviation": { max: 3, min: 1, step: 1, ticks: 3, value: 1 },
      };

      // Create a transparent-to-black color ramp gradient for render updates.
      const colorRamp = { type: "algorithmic", fromColor: [0, 0, 0, 0], toColor: [0, 0, 0, 1] };
      // Create and load the ImageryTileLayer for tiled elevation data.
      const imageryTileLayer = new ImageryTileLayer({
        url: "https://elevation3d.arcgis.com/arcgis/rest/services/WorldElevation3D/Terrain3D/ImageServer",
        blendMode: "destination-in", // Draw only where TileLayer and ImageryTileLayer overlap.
        title: "World Elevation ImageryTileLayer",
      });
      await imageryTileLayer.load();
      const bandStats = imageryTileLayer.serviceRasterInfo.statistics[0];

      // Create a base TileLayer for the imagery background.
      const tileLayerUrl =
        "https://services.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer";
      const tileLayer = new TileLayer({ url: tileLayerUrl, listMode: "hide-children" });
      // Configure the slider UI to match the current stretch type.
      const initializeSlider = () => {
        sliderLabel.textContent = `${stretchType} value`;
        for (const key in init[stretchType]) {
          slider[key] = init[stretchType][key];
        }
      };

      initializeSlider(); // Initialize the slider upon first load.

      // Initialize the renderer so the layer starts with meaningful data.
      imageryTileLayer.renderer = {
        type: "raster-stretch", // autocasts as new RasterStretchRenderer()
        customStatistics: [{ ...bandStats, min: slider.value[0], max: slider.value[1] }],
        numberOfStandardDeviations: 1,
        colorRamp,
        stretchType,
      };
      // Group elevation and imagery layers to confine blend mode effects to this group.
      const groupLayer = new GroupLayer({
        title: "Group Layer",
        layers: [tileLayer, imageryTileLayer],
      });
      viewElement.map.add(groupLayer);
      await viewElement.whenLayerView(groupLayer);

      viewElement.constraints.snapToZoom = false; // Disable for continuous zooming.

      // Configure the LayerList to show the renderer controls.
      layerList.listItemCreatedFunction = ({ item, item: { layer } }) => {
        const panel = { content: rendererCard, open: true, icon: "map" };
        if (layer === imageryTileLayer) item.panel = panel;
        if (layer === groupLayer) item.open = true;
      };
      const updateRenderer = () => {
        // Clone the layer's renderer to modify it at runtime.
        const renderer = imageryTileLayer.renderer.clone();
        const isMinMax = stretchType === "min-max";
        const [min, max] = isMinMax ? slider.value : [0, 0];

        // Configure the cloned renderer with the UI's settings.
        renderer.customStatistics = isMinMax ? [{ ...bandStats, min, max }] : [bandStats];
        renderer.numberOfStandardDeviations = isMinMax ? 1 : slider.value;
        renderer.stretchType = stretchType;
        imageryTileLayer.renderer = renderer; // Assign the new renderer.
      };
      stretchTypeSelect.addEventListener("calciteSelectChange", ({ target }) => {
        stretchType = target.value;
        initializeSlider();
        updateRenderer();
      });

      slider.addEventListener("calciteSliderInput", () => updateRenderer());

      blendModeSwitch.addEventListener("calciteSwitchChange", ({ target }) => {
        imageryTileLayer.blendMode = target.checked ? "destination-in" : "normal";
      });
    </script>
  </body>
</html>
