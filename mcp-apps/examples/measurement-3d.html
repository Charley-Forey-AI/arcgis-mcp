<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Measurement components in 3D | Sample | ArcGIS Maps SDK for JavaScript</title>

  <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
  <script type="module" src="https://js.arcgis.com/5.0/"></script>

  <style>
    html,
    body {
      margin: 0;
      height: 100%;
    }
  </style>
</head>

<body>
  <arcgis-scene item-id="5ce0de673d3b41a3bf3a217942211c4b">
    <arcgis-zoom slot="top-left"></arcgis-zoom>
    <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
    <arcgis-compass slot="top-left"> </arcgis-compass>
    <arcgis-expand id="expand-line" slot="top-right" group="top-right" mode="floating">
      <arcgis-direct-line-measurement-3d> </arcgis-direct-line-measurement-3d>
    </arcgis-expand>
    <arcgis-expand id="expand-area" slot="top-right" group="top-right" mode="floating">
      <arcgis-area-measurement-3d> </arcgis-area-measurement-3d>
    </arcgis-expand>
  </arcgis-scene>

  <script type="module">
    const viewElement = document.querySelector("arcgis-scene");
    const directLineMeasurement3d = document.querySelector("arcgis-direct-line-measurement-3d");
    const areaMeasurement3d = document.querySelector("arcgis-area-measurement-3d");
    const expandDirectLine = document.getElementById("expand-line");
    const expandArea = document.getElementById("expand-area");

    // Use arcgisPropertyChange to watch the "expanded" attribute on both of the arcgis-expand components.
    await viewElement.viewOnReady();
    // When expandDirectLine is expanded, start the direct line measurement. If it is closed, clear any measurements.
    expandDirectLine.addEventListener("arcgisPropertyChange", (e) => {
      if (e.detail.name === "expanded") {
        if (expandDirectLine.expanded) {
          directLineMeasurement3d.start();
        } else {
          directLineMeasurement3d.clear();
          areaMeasurement3d.clear();
        }
      }
    });

    // When expandArea is expanded, start the area measurement. If it is closed, clear any measurements.
    expandArea.addEventListener("arcgisPropertyChange", (e) => {
      if (e.detail.name === "expanded") {
        if (expandArea.expanded) {
          areaMeasurement3d.start();
        } else {
          directLineMeasurement3d.clear();
          areaMeasurement3d.clear();
        }
      }
    });
  </script>
</body>

</html>
