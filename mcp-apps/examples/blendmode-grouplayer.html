<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Composite blending | Sample | ArcGIS Maps SDK for JavaScript</title>

    <style>
      html,
      body,
      #viewDiv {
        height: 100%;
        margin: 0;
      }
    </style>

    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css" />
    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <script type="module">
      const [Map, MapView, GroupLayer, FeatureLayer, ImageryLayer, VectorTileLayer] =
        await $arcgis.import([
          "@arcgis/core/Map.js",
          "@arcgis/core/views/MapView.js",
          "@arcgis/core/layers/GroupLayer.js",
          "@arcgis/core/layers/FeatureLayer.js",
          "@arcgis/core/layers/ImageryLayer.js",
          "@arcgis/core/layers/VectorTileLayer.js",
        ]);

      const view = new MapView({
        container: "viewDiv",
        map: new Map({
          basemap: {
            baseLayers: [
              new VectorTileLayer({
                portalItem: {
                  id: "f5ada26f334745c097fc801c911ebbd6",
                },
              }),
              new FeatureLayer({
                portalItem: {
                  id: "b36ffa14d4e243f2b6887868eba80642",
                },
              }),
            ],
          },
        }),
        extent: {
          spatialReference: {
            latestWkid: 102003,
            wkid: 102003,
          },
          xmax: 1874643.2331984383,
          xmin: -2268085.08383833,
          ymax: 1306570.485845424,
          ymin: -962852.3969934431,
        },
        constraints: {
          snapToZoom: false,
          minScale: 30999535,
        },
      });
      view.map.layers.add(
        new GroupLayer({
          layers: [
            new FeatureLayer({
              portalItem: {
                id: "c786669a00b547c995f0cc970dc007d8",
              },
              opacity: 1,
            }),
            new ImageryLayer({
              blendMode: "destination-in",
              url: "https://sampleserver6.arcgisonline.com/arcgis/rest/services/NLCDLandCover2001/ImageServer",
              renderer: {
                type: "unique-value",
                field: "Value",
                uniqueValueInfos: [
                  {
                    value: 82,
                    label: "Cultivated crops",
                    symbol: {
                      type: "simple-fill",
                      color: "black",
                    },
                  },
                ],
              },
            }),
          ],
        }),
      );
    </script>
  </head>
  <body>
    <div id="viewDiv"></div>
  </body>
</html>
