<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Intro to clustering | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: rgba(50, 50, 50);
      }
      #infoDiv {
        padding: 10px;
      }
    </style>
  </head>

  <body class="calcite-mode-dark">
    <arcgis-map center="-73.94226,40.7163" scale="288895">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-home slot="top-left"></arcgis-home>
      <arcgis-expand slot="top-left" expand-icon="list-bullet">
        <div id="infoDiv">
          <calcite-button id="cluster" secondary width="full">Disable Clustering</calcite-button>
          <arcgis-legend legend-style="classic"></arcgis-legend>
        </div>
      </arcgis-expand>
    </arcgis-map>

    <script type="module">
      const [Map, FeatureLayer, GeoJSONLayer] = await $arcgis.import([
        "@arcgis/core/Map.js",
        "@arcgis/core/layers/FeatureLayer.js",
        "@arcgis/core/layers/GeoJSONLayer.js",
      ]);

      // Configures clustering on the layer. A cluster radius
      // of 100px indicates an area comprising screen space 100px
      // in length from the center of the cluster
      const clusterConfig = {
        type: "cluster",
        clusterRadius: "100px",
        // {cluster_count} is an aggregate field containing
        // the number of features comprised by the cluster
        popupTemplate: {
          title: "Cluster summary",
          content: "This cluster represents {cluster_count} earthquakes.",
          fieldInfos: [
            {
              fieldName: "cluster_count",
              format: {
                places: 0,
                digitSeparator: true,
              },
            },
          ],
        },
        clusterMinSize: "24px",
        clusterMaxSize: "60px",
        labelingInfo: [
          {
            deconflictionStrategy: "none",
            labelExpressionInfo: {
              expression: "Text($feature.cluster_count, '#,###')",
            },
            symbol: {
              type: "text",
              color: "#004a5d",
              font: {
                weight: "bold",
                family: "Noto Sans",
                size: "12px",
              },
            },
            labelPlacement: "center-center",
          },
        ],
      };

      const layer = new GeoJSONLayer({
        title: "Earthquakes from the last month",
        url: "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_month.geojson",
        copyright: "USGS Earthquakes",
        featureReduction: clusterConfig,
        // popupTemplates can still be viewed on
        // individual features
        popupTemplate: {
          title: "Magnitude {mag} {type}",
          content: "Magnitude {mag} {type} hit {place} on {time}",
          fieldInfos: [
            {
              fieldName: "time",
              format: {
                dateFormat: "short-date-short-time",
              },
            },
          ],
        },
        renderer: {
          type: "simple",
          field: "mag",
          symbol: {
            type: "simple-marker",
            size: 4,
            color: "#69dcff",
            outline: {
              color: "rgba(0, 139, 174, 0.5)",
              width: 5,
            },
          },
        },
      });

      // background layer for geographic context
      // projected to Alaska Polar Stereographic
      const baseLayer = new FeatureLayer({
        portalItem: {
          id: "2b93b06dc0dc4e809d3c8db5cb96ba69",
        },
        legendEnabled: false,
        popupEnabled: false,
        renderer: {
          type: "simple",
          symbol: {
            type: "simple-fill",
            color: [65, 65, 65, 1],
            outline: {
              color: [50, 50, 50, 0.75],
              width: 0.5,
            },
          },
        },
        spatialReference: {
          wkid: 5936,
        },
      });

      // get the arcgis-map component element and set the map and initial extent
      // and spatial reference
      const viewElement = document.querySelector("arcgis-map");
      viewElement.map = new Map({
        layers: [baseLayer, layer],
      });

      viewElement.extent = {
        spatialReference: {
          wkid: 5936,
        },
        xmin: 1270382,
        ymin: -1729511,
        xmax: 2461436,
        ymax: -953893,
      };
      viewElement.spatialReference = {
        // WGS_1984_EPSG_Alaska_Polar_Stereographic
        wkid: 5936,
      };
      viewElement.constraints = {
        minScale: 15469455,
      };

      const toggleButton = document.getElementById("cluster");

      // To turn off clustering on a layer, set the
      // featureReduction property to null
      toggleButton.addEventListener("click", () => {
        let fr = layer.featureReduction;
        layer.featureReduction = fr && fr.type === "cluster" ? null : clusterConfig;
        toggleButton.textContent =
          toggleButton.textContent === "Enable Clustering"
            ? "Disable Clustering"
            : "Enable Clustering";
      });
    </script>
  </body>
</html>
