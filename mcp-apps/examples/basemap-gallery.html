<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Basemap Gallery component | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <arcgis-scene
      basemap="topo-3d"
      camera-position="-74.034237, 40.691732, 1620"
      camera-tilt="57"
      camera-heading="57">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-basemap-gallery slot="top-right"></arcgis-basemap-gallery>
    </arcgis-scene>
  </body>
</html>
