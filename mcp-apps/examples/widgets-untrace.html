<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>UtilityNetworkTrace widget | Sample | ArcGIS Maps SDK for JavaScript</title>

    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css" />
    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body,
      #viewDiv {
        height: 100%;
        margin: 0;
      }
    </style>
    <script type="module">
      const [WebMap, MapView, UtilityNetworkTrace, config] = await $arcgis.import([
        "@arcgis/core/WebMap.js",
        "@arcgis/core/views/MapView.js",
        "@arcgis/core/widgets/UtilityNetworkTrace.js",
        "@arcgis/core/config.js",
      ]);

      // Set the hostname to the on-premise portal
      // Enterprise example: config.portalUrl = "https://myHostName.esri.com/arcgis";
      config.portalUrl = "https://www.arcgis.com"; // this is the default

      // Initialize the WebMap and pass in the webmap id
      // Credentials to sign in to the webmap:
      // username: viewer01
      // password: I68VGU^nMurF
      const webmap = new WebMap({
        portalItem: {
          // autocasts as new PortalItem()
          id: "471eb0bf37074b1fbb972b1da70fb310", // webmap id
        },
      });

      // Initialize the view
      const view = new MapView({
        container: "viewDiv",
        map: webmap,
      });

      // Initialize the UtilityNetworkTrace widget without any set parameters
      const utilityNetworkTrace = new UtilityNetworkTrace({
        view: view,
      });

      // Add the widget to the view
      view.ui.add(utilityNetworkTrace, "top-right");
    </script>
  </head>

  <body>
    <div id="viewDiv"></div>
  </body>
</html>
