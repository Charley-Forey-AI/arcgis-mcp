<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Visualizations with light-emitting symbols | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      .controls-panel {
        width: 220px;
      }

      .toggleRow {
        display: flex;
        justify-content: space-between;
      }

      .cameraToggleContainer {
        position: absolute;
        left: 0;
        right: 0;
        bottom: calc(24px + env(safe-area-inset-bottom));
        z-index: 2;
        display: flex;
        justify-content: center;
        pointer-events: none;
      }

      #cameraViewToggle {
        width: 360px;
        max-width: calc(100vw - 32px);
        pointer-events: auto;
      }
    </style>
  </head>

  <body>
    <arcgis-scene item-id="762a25d933ff452ea763f96d86b379b3">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"></arcgis-compass>

      <calcite-panel slot="top-right" class="controls-panel" heading="Customize Appearance">
        <!-- Emissive strength slider -->
        <calcite-block heading="Emissive strength" expanded>
          <calcite-action
            id="emissiveStrengthHelp"
            icon="question"
            scale="s"
            slot="actions-end"></calcite-action>
          <calcite-slider
            id="emissiveStrength"
            min="0"
            max="2"
            step="0.1"
            value="1"
            label-handles></calcite-slider>
          <calcite-tooltip reference-element="emissiveStrengthHelp">
            Controls how much light a symbol emits. This slider adjusts the theatre sign and the bus
            line.
          </calcite-tooltip>
        </calcite-block>

        <!-- Glow controls -->
        <calcite-block heading="Glow" expanded>
          <calcite-action
            id="glowHelp"
            icon="question"
            scale="s"
            slot="actions-end"></calcite-action>
          <div class="toggleRow">
            <calcite-label scale="m">Enabled</calcite-label>
            <calcite-switch id="glowToggle" scale="m"></calcite-switch>
          </div>

          <calcite-tooltip reference-element="glowHelp">
            Glow is a global stylistic effect that emphasizes the appearance of all light-emitting
            symbols in a scene.
          </calcite-tooltip>
          <div id="glowControls" hidden>
            <calcite-label scale="m">
              Intensity
              <calcite-slider
                id="glowIntensity"
                min="0"
                max="1"
                step="0.1"
                value="0.5"
                label-handles></calcite-slider>
            </calcite-label>
          </div>
        </calcite-block>
      </calcite-panel>

      <!-- Camera view toggle -->
      <div class="cameraToggleContainer">
        <calcite-segmented-control id="cameraViewToggle" width="full">
          <calcite-segmented-control-item value="street" checked
            >Street view</calcite-segmented-control-item
          >
          <calcite-segmented-control-item value="birdsEye"
            >Bird's eye view</calcite-segmented-control-item
          >
        </calcite-segmented-control>
      </div>
    </arcgis-scene>

    <script type="module">
      (async () => {
        const [GraphicsLayer, Graphic, Point, Mesh, Glow] = await $arcgis.import([
          "@arcgis/core/layers/GraphicsLayer.js",
          "@arcgis/core/Graphic.js",
          "@arcgis/core/geometry/Point.js",
          "@arcgis/core/geometry/Mesh.js",
          "@arcgis/core/webscene/Glow.js",
        ]);

        const cameraViewpoints = {
          streetView: {
            position: {
              spatialReference: {
                latestWkid: 3857,
                wkid: 102100,
              },
              x: -8233922.1,
              y: 4967235.9,
              z: 30.4,
            },
            heading: 229,
            tilt: 85.8,
          },
          birdsEyeView: {
            position: {
              spatialReference: {
                latestWkid: 3857,
                wkid: 102100,
              },
              x: -8232824.2,
              y: 4966909.6,
              z: 582.47,
            },
            heading: 283.8,
            tilt: 65.4,
          },
        };

        /***********************************
         * Scene set up
         ***********************************/
        const viewElement = document.querySelector("arcgis-scene");
        await viewElement.viewOnReady();

        viewElement.camera = cameraViewpoints.streetView;

        viewElement.environment.lighting = {
          type: "sun",
          date: new Date("2025/6/6 04:00:00 UTC"),
        };

        /***********************************
         * Add glTF models to the scene
         ***********************************/

        // Create a layer for glTF models
        const gltfModelLayer = new GraphicsLayer();
        viewElement.map.add(gltfModelLayer);

        // Create a MeshSymbol3D that displays emissive definitions from the model
        const gltfSymbol = {
          type: "mesh-3d",
          symbolLayers: [
            {
              type: "fill",
              // The material drives the appearance of the fill layer
              material: {
                // Use emissive textures stored in the glTF
                emissive: {
                  source: "emissive",
                  strength: 1.0, // Display the emissive intensity defined in the model
                },
              },
            },
          ],
        };

        // Add the street glTF
        const streetModelUrl = "https://developers.arcgis.com/javascript/latest/assets/sample-code/light-emitting-symbols/Street.glb";

        const streetModelOrigin = new Point({
          longitude: -73.96858620657494,
          latitude: 40.69364087589028,
          z: 17.038374425843358,
          spatialReference: { wkid: 4326 },
        });

        // Create the mesh from the glTF model
        const streetMesh = await Mesh.createFromGLTF(streetModelOrigin, streetModelUrl);
        await streetMesh.load();

        gltfModelLayer.add(
          new Graphic({
            geometry: streetMesh, // Mesh created from your glTF
            symbol: gltfSymbol,
          }),
        );

        // Add the theatre sign glTF
        const theatreSignModelUrl = "https://developers.arcgis.com/javascript/latest/assets/sample-code/light-emitting-symbols/TheatreSign.glb";

        const theatreSignOrigin = new Point({
          longitude: -73.96864811436414,
          latitude: 40.693472566862674,
          z: 17.038374425843358,
          spatialReference: { wkid: 4326 },
        });

        // Create the mesh from the glTF model
        const theatreSignMesh = await Mesh.createFromGLTF(theatreSignOrigin, theatreSignModelUrl);
        await theatreSignMesh.load();
        theatreSignMesh.rotate(0, 0, 8);

        const theatreSignGraphic = new Graphic({
          geometry: theatreSignMesh,
          symbol: gltfSymbol,
        });
        gltfModelLayer.add(theatreSignGraphic);

        /***********************************
         * Set up bus line FeatureLayer
         ***********************************/

        // Select the layer containing bus line data
        const transportationNetworkLayer = viewElement.map.layers.at(0);

        // Clone the layer's renderer
        const renderer = transportationNetworkLayer.renderer.clone();

        // Modify each symbol in the renderer to emit light based on its existing color
        renderer.symbols.forEach((symbol) => {
          symbol.symbolLayers.forEach((layer) => {
            // Configure emissive properties to use the symbol's color
            layer.material.emissive = {
              source: "color", // The symbol's current color is used for emission
              strength: 1.0, // Adjust to control how much light is being emitted
            };
          });
        });

        // Assign the modified renderer to the layer
        transportationNetworkLayer.renderer = renderer;

        /***********************************
         * Viewpoint toggle
         ***********************************/

        const cameraViewToggle = document.getElementById("cameraViewToggle");

        // Switch between predefined camera positions
        cameraViewToggle.addEventListener("calciteSegmentedControlChange", (event) => {
          const viewMode = event.target.value;
          const viewpoint =
            viewMode === "birdsEye" ? cameraViewpoints.birdsEyeView : cameraViewpoints.streetView;

          viewElement.goTo(viewpoint, { duration: 4000 });
        });

        /***********************************
         * Glow toggle
         ***********************************/

        const glowToggle = document.getElementById("glowToggle");
        const slider = document.getElementById("glowIntensity");
        const glowControls = document.getElementById("glowControls");

        function toggleGlow() {
          const enableGlow = glowToggle.checked;
          glowControls.hidden = !enableGlow;

          const glowIntensity = Number(slider.value);

          viewElement.environment.lighting.glow = enableGlow
            ? new Glow({
                intensity: glowIntensity, // Range: 0 – 1, from subtle to strong stylized glow
              })
            : null; // Turns off glow, restores natural appearance
        }

        glowToggle.addEventListener("calciteSwitchChange", toggleGlow);
        slider.addEventListener("calciteSliderInput", toggleGlow);

        /***********************************
         * Emissive strength control
         ***********************************/

        const emissiveSlider = document.getElementById("emissiveStrength");

        // Update emissive strength for both the glTF model and the bus line layer when the slider value changes
        emissiveSlider.addEventListener("calciteSliderInput", (e) => {
          const strength = Number(e.target.value);
          applyEmissiveStrength(strength);
        });

        function applyEmissiveStrength(strength) {
          // Theatre sign graphic on the gltfModelLayer GraphicsLayer
          {
            const sym = theatreSignGraphic.symbol.clone(); // MeshSymbol3D with a single symbol layer

            const sl = sym.symbolLayers?.at(0);
            if (!sl) return;

            sl.material.emissive = {
              strength, // Update emissive strength
              source: "emissive", // Use emissive infromation from the glTF
            };
            theatreSignGraphic.symbol = sym;
          }
          // Transport network FeatureLayer
          {
            const r = transportationNetworkLayer.renderer?.clone(); // UniqueValueRenderer with multiple symbols
            if (!r?.symbols) return;

            const target = r.symbols.at(2); // Select the symbol for the bus line that passes by the theatre
            const sl = target?.symbolLayers?.at(0);
            if (!sl) return;

            sl.material.emissive = {
              strength, // Update emissive strength
              source: "color", // Use the symbol color as the color of emitted light
            };
            transportationNetworkLayer.renderer = r;
          }
        }
      })();
    </script>
  </body>
</html>
