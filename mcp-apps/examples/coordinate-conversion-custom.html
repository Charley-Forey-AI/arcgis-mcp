<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Coordinate Conversion component - Custom Formats | Sample | ArcGIS Maps SDK for JavaScript</title>
    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-scene
      basemap="topo-vector"
      center="-118.836, 36.487"
      zoom="10"
      ground="world-elevation"
      camera-tilt="10">
      <arcgis-zoom slot="top-right"></arcgis-zoom>
      <arcgis-coordinate-conversion
        slot="bottom-left"
        mode="live"
        expanded></arcgis-coordinate-conversion>
    </arcgis-scene>
    <script type="module">
      const [Conversion, Format, Point, SpatialReference, webMercatorUtils] = await $arcgis.import([
        "@arcgis/core/widgets/CoordinateConversion/support/Conversion.js",
        "@arcgis/core/widgets/CoordinateConversion/support/Format.js",
        "@arcgis/core/geometry/Point.js",
        "@arcgis/core/geometry/SpatialReference.js",
        "@arcgis/core/geometry/support/webMercatorUtils.js",
      ]);
      const coordinateConversion = document.querySelector("arcgis-coordinate-conversion");
      await coordinateConversion.componentOnReady();

      // Regular expression to find a number
      const numberSearchPattern = /-?\d+[\.]?\d*/;

      /**
       * Create a new Format called XYZ, which looks like: "<Latitude>, <Longitude>, <Z>"
       *
       * We need to define a convert function, a reverse convert function,
       * and some formatting information.
       */
      const newFormat = new Format({
        // The format's name should be unique with respect to other formats used by the component
        name: "XYZ",
        conversionInfo: {
          // Define a convert function
          // Point -> Position
          convert: function (point) {
            const returnPoint = point.spatialReference.isWGS84
              ? point
              : webMercatorUtils.webMercatorToGeographic(point);
            const x = returnPoint.x.toFixed(4);
            const y = returnPoint.y.toFixed(4);
            const z = returnPoint.z.toFixed(4);
            return {
              location: returnPoint,
              coordinate: `${x}, ${y}, ${z}`,
            };
          },
          // Define a reverse convert function
          // String -> Point
          reverseConvert: function (string) {
            const parts = string.split(",");
            return new Point({
              x: parseFloat(parts[0]),
              y: parseFloat(parts[1]),
              z: parseFloat(parts[2]),
              spatialReference: { wkid: 4326 },
            });
          },
        },
        // Define each segment of the coordinate
        coordinateSegments: [
          {
            alias: "X",
            description: "Longitude",
            searchPattern: numberSearchPattern,
          },
          {
            alias: "Y",
            description: "Latitude",
            searchPattern: numberSearchPattern,
          },
          {
            alias: "Z",
            description: "Elevation",
            searchPattern: numberSearchPattern,
          },
        ],
        defaultPattern: "X°, Y°, Z",
      });
      /**
       * Create a new Format 'SPS I', which looks like: "<X>, <Y>" in the
       * California StatePlane Zone I Spatial Reference, described by wkid 102241
       *
       * For this Format, we only need to provide a spatialReference with the correct
       * wkid. The geometry service can take care of the rest.
       */
      const stateplaneCA = new Format({
        name: "SPS I",
        conversionInfo: {
          spatialReference: new SpatialReference({ wkid: 102241 }),
          reverseConvert: function (string, format) {
            const parts = string.split(",");
            return new Point({
              x: parseFloat(parts[0]),
              y: parseFloat(parts[1]),
              spatialReference: { wkid: 102241 },
            });
          },
        },
        coordinateSegments: [
          {
            alias: "X",
            description: "easting",
            searchPattern: numberSearchPattern,
          },
          {
            alias: "Y",
            description: "northing",
            searchPattern: numberSearchPattern,
          },
        ],
        defaultPattern: "X, Y",
      });
      // set custom spatial references
      coordinateConversion.spatialReferences = [
        new SpatialReference({ wkid: 2263 }), // State Plane New York Long Island (ftUS)
        new SpatialReference({ wkid: 26918 }), // UTM Zone 18N
      ];

      coordinateConversion.formats.add(newFormat);
      coordinateConversion.formats.add(stateplaneCA);

      // Add the two custom formats to the top of the component's display
      coordinateConversion.conversions.splice(
        0,
        0,
        new Conversion({
          format: newFormat,
        }),
        new Conversion({
          format: stateplaneCA,
        }),
      );
    </script>
  </body>
</html>
