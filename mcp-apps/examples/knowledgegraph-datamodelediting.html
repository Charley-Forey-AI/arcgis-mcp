<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Knowledge Graph Data Model Editing | Sample | ArcGIS Maps SDK for JavaScript</title>

    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css" />

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      .flex {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        flex-wrap: wrap;
        height: 100%;
      }

      .typeDiv {
        margin: 10px;
        height: 100%;
      }

      .type-list {
        height: 90%;
        overflow-y: auto;
      }
    </style>
    <script type="module">
      const [KnowledgeGraphService] = await $arcgis.import([
        "@arcgis/core/rest/knowledgeGraphService.js",
      ]);

      /**
       * Credentials to sign in to the knowledge graph service:
       * Username: editor01
       * Password: S7#i2LWmYH75
       */

      //url to the knowledge graph service
      const url =
        "https://sampleserver7.arcgisonline.com/server/rest/services/Hosted/BumbleBeeEdits/KnowledgeGraphServer";

      const relationshipList = document.getElementById("relationship-list");
      const entityList = document.getElementById("entity-list");

      //fetch the current knowledge graph, this will return the service definition and the data model
      let kg = await KnowledgeGraphService.fetchKnowledgeGraph(url);

      /**
       * Update the UI with the entity types, relationship types and their properties
       * from the knowledge graph data model
       */
      const updateUI = (newType, newProp = null) => {
        const dataModel = kg.dataModel;
        relationshipList.textContent = "";
        entityList.textContent = "";
        //generate type lists
        dataModel.entityTypes.forEach((e, i) => {
          generateTypeList("entity", e, i, newType, newProp);
        });
        dataModel.relationshipTypes.forEach((r, i) => {
          generateTypeList("relationship", r, i, newType, newProp);
        });
        //add property to entity type or relationship type
        document.querySelectorAll(".apply-property-edit-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document.getElementById(btn.getAttribute("type") + "-add-props-div").style.visibility =
              "hidden";
            document.getElementById(btn.getAttribute("type") + "-add-props-btn").style.visibility =
              "visible";
            const name = document.getElementById(btn.getAttribute("type") + "-new-prop-name").value;
            addPropertyToType(btn.getAttribute("type"), name);
          });
        });
        //show add property input
        document.querySelectorAll(".add-property-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document.getElementById(btn.getAttribute("type") + "-add-props-div").style.visibility =
              "visible";
            document.getElementById(btn.getAttribute("type") + "-add-props-btn").style.visibility =
              "hidden";
          });
        });
      };

      /**
       * Generate the list of types and their properties
       * based on the knowledge graph data model
       */
      const generateTypeList = (graphType, type, i, newType = null, newProp = null) => {
        let propsList = "";
        for (const p in type.properties) {
          propsList += `<calcite-list-item label="${type.properties[p].name}" value="${type.properties[p].name}" ${newProp == type.properties[p].name ? 'icon-start="asterisk-small"' : ""}>
</calcite-list-item>`;
        }
        const html = `<calcite-block heading="${type.name}" collapsible ${i > 0 ? "" : "open"} ${newType == type.name ? 'icon-start="asterisk-small"' : ""}>
        <calcite-list label="${type.name} properties">${propsList}
          </calcite-list><calcite-button icon-start="plus" class="add-property-btn" id="${type.name}-add-props-btn" type="${type.name}" appearance="transparent" width="full"></calcite-button>
          <div id="${type.name}-add-props-div">
            <calcite-label>
              Name
              <calcite-input-text id="${type.name}-new-prop-name" icon="string" placeholder="Enter property name">
                  <calcite-button  class="apply-property-edit-btn" type="${type.name}" slot="action">
        Add Property
    </calcite-button></calcite-input></calcite-label></div></calcite-block>`;

        graphType == "relationship"
          ? (relationshipList.innerHTML += html)
          : (entityList.innerHTML += html);
        document.getElementById(type.name + "-add-props-div").style.visibility = "hidden";
      };

      /**
       * Add a new entity type to the knowledge graph data model.
       * Type names must be unique.
       */
      const createEntityType = () => {
        //define the new entity type
        const newEntityType = {
          type: "entity",
          name: "MyNewEntityType" + Math.floor(Math.random() * 100) + 1,
          alias: "NewEntityType",
          properties: [
            {
              name: "name",
              alias: "full name",
              fieldType: "esriFieldTypeString",
              defaultValue: "new entity",
              role: "esriGraphPropertyRegular",
            },
            {
              name: "shape",
              alias: "location",
              fieldType: "esriFieldTypeGeometry",
              geometryType: "esriGeometryPoint",
              role: "esriGraphPropertyRegular",
              required: false,
              editable: true,
            },
          ],
        };
        //Add the new entity type to the knowledge graph data model
        KnowledgeGraphService.executeAddNamedTypes(kg, {
          newEntityTypes: [newEntityType],
        })
          .then((response) => {
            console.log("Response from add named types: ", response);
            //set the working knowledge graph to be the newly updated graph
            kg = response.updatedKnowledgeGraph;
            updateUI(newEntityType.name);
          })
          .catch((e) => {
            //catch errors and provide user feedback
          });
      };

      /**
       * Add a new relationship type to the knowledge graph data model.
       * The type name must be unique in the graph.
       */
      const createRelationshipType = () => {
        //define the new relationship type
        const newRelationshipType = {
          type: "relationship",
          name: "MyNewRelationshipType" + Math.floor(Math.random() * 100) + 1,

          properties: [
            {
              name: "nameProp",
              fieldType: "esriFieldTypeString",
              role: "esriGraphPropertyRegular",
            },
          ],
          endPoints: [
            {
              originEntityType: "Observation",
              destinationEntityType: "User",
            },
          ],
        };

        //add it to the knowledge graph data model
        KnowledgeGraphService.executeAddNamedTypes(kg, {
          newRelationshipTypes: [newRelationshipType],
        })
          .then((response) => {
            //set the working knowledge graph to be the newly updated graph
            //with the new type and update the UI.
            kg = response.updatedKnowledgeGraph;
            updateUI(newRelationshipType.name);
          })
          .catch((e) => {
            //catch errors and provide user feedback
          });
      };

      document.getElementById("createEntityType").addEventListener("click", createEntityType);

      document
        .getElementById("createRelationshipType")
        .addEventListener("click", createRelationshipType);

      /**
       * Add a GraphProperty to an existing entity type or relationship type
       */
      const addPropertyToType = (namedType, name) => {
        KnowledgeGraphService.executeAddGraphProperties(kg, namedType, [
          {
            //autocasts as a new GraphProperty
            name: name,
            fieldType: "esriFieldTypeString",
            role: "esriGraphPropertyRegular",
            nullable: true, //when you are adding a property to an existing type you must set nullable to true
          },
        ])
          .then((response) => {
            kg = response.updatedKnowledgeGraph;
            updateUI(namedType, name);
          })
          .catch((e) => {
            //catch errors and provide user feedback
          });
      };

      updateUI();
    </script>
  </head>

  <body>
    <calcite-shell>
      <calcite-panel heading="Modify Knowledge Graph Data Model">
        <div class="flex">
          <div class="typeDiv">
            <calcite-panel heading="Entities">
              <div class="type-list" id="entity-list"></div>
              <calcite-button id="createEntityType">Create Entity</calcite-button>
            </calcite-panel>
          </div>
          <div class="typeDiv">
            <calcite-panel heading="Relationships">
              <div class="type-list" id="relationship-list"></div>
              <calcite-button id="createRelationshipType">Create Relationship</calcite-button>
            </calcite-panel>
          </div>
        </div>
      </calcite-panel>
    </calcite-shell>
  </body>
</html>
