<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Arrows along a line | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-map center="-117.183, 34.056" zoom="16">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-legend slot="bottom-right"></arcgis-legend>
    </arcgis-map>
  </body>

  <script type="module">
    const [Map, FeatureLayer] = await $arcgis.import([
      "@arcgis/core/Map.js",
      "@arcgis/core/layers/FeatureLayer.js",
    ]);

    // Set up initial graphics
    const redlandsStreets = new FeatureLayer({
      portalItem: {
        id: "fe5881620b274be99ca345c92d2f0302",
      },
      renderer: {
        type: "unique-value", // autocasts as UniqueValueRenderer
        field: "oneway",
        defaultSymbol: {
          type: "simple-line", // default SimpleLineSymbol
        },
        uniqueValueInfos: [
          {
            value: "yes", // when one-way='yes', create CIMSymbol line with arrows
            label: "One-way street",
            symbol: {
              type: "cim", // autocasts as CIMSymbol
              data: {
                type: "CIMSymbolReference",
                symbol: {
                  type: "CIMLineSymbol",
                  symbolLayers: [
                    {
                      // black 1px line symbol
                      type: "CIMSolidStroke",
                      enable: true,
                      width: 1,
                      color: [0, 0, 0, 255],
                    },
                    {
                      // arrow symbol
                      type: "CIMVectorMarker",
                      enable: true,
                      size: 5,
                      markerPlacement: {
                        type: "CIMMarkerPlacementAlongLineSameSize", // places same size markers along the line
                        endings: "WithMarkers",
                        placementTemplate: [19.5], // determines space between each arrow
                        angleToLine: true, // symbol will maintain its angle to the line when map is rotated
                      },
                      frame: {
                        xmin: -5,
                        ymin: -5,
                        xmax: 5,
                        ymax: 5,
                      },
                      markerGraphics: [
                        {
                          type: "CIMMarkerGraphic",
                          geometry: {
                            rings: [
                              [
                                [-8, -5.47],
                                [-8, 5.6],
                                [1.96, -0.03],
                                [-8, -5.47],
                              ],
                            ],
                          },
                          symbol: {
                            // black fill for the arrow symbol
                            type: "CIMPolygonSymbol",
                            symbolLayers: [
                              {
                                type: "CIMSolidFill",
                                enable: true,
                                color: [0, 0, 0, 255],
                              },
                            ],
                          },
                        },
                      ],
                    },
                  ],
                },
              },
            },
          },
        ],
      },
    });

    const map = new Map({
      basemap: "gray-vector",
      layers: [redlandsStreets],
    });
    // Add the map to the Map component
    const viewElement = document.querySelector("arcgis-map");
    viewElement.map = map;
  </script>
</html>
