<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>MediaLayer with video | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
  </head>
  <body>
    <calcite-shell>
      <arcgis-scene center="-80, 40">
        <arcgis-layer-list slot="top-right"></arcgis-layer-list>
      </arcgis-scene>
    </calcite-shell>
    <script type="module">
      const [Map, MediaLayer, VideoElement, ExtentAndRotationGeoreference, Extent] =
        await $arcgis.import([
          "@arcgis/core/Map.js",
          "@arcgis/core/layers/MediaLayer.js",
          "@arcgis/core/layers/support/VideoElement.js",
          "@arcgis/core/layers/support/ExtentAndRotationGeoreference.js",
          "@arcgis/core/geometry/Extent.js",
        ]);
      // create a video element by setting video param to point to the video file url
      // set the geographic location of the video file on the map using an extent
      const videoElement = new VideoElement({
        video:
          "https://arcgis.github.io/arcgis-samples-javascript/sample-data/media-layer/videos/hurricanes_aerosol-aug.mp4",
        georeference: new ExtentAndRotationGeoreference({
          extent: new Extent({
            xmin: -150,
            ymin: 1,
            xmax: 20,
            ymax: 80,
            spatialReference: {
              wkid: 4326,
            },
          }),
        }),
      });
      // add the video element to the media layer
      const layer = new MediaLayer({
        source: [videoElement],
        title: "2017 Hurricanes and Aerosols Simulation",
        copyright: "NASA's Goddard Space Flight Center",
      });
      const viewElement = document.querySelector("arcgis-scene");
      viewElement.map = new Map({
        basemap: {
          portalItem: {
            id: "eb303185d14e45e9be8bbbc1c0daf7ab",
          },
        },
        layers: [layer],
      });
      viewElement.constraints = {
        ...viewElement.constraints,
        altitude: {
          max: 20000000,
          min: 2000000,
        },
      };

      // add a slider to the layer list list item's panel to change the layer's opacity
      document.querySelector("arcgis-layer-list").listItemCreatedFunction = (event) => {
        const item = event.item;

        const label = document.createElement("calcite-label");
        label.textContent = "Opacity";
        label.scale = "s";

        const slider = document.createElement("calcite-slider");
        slider.labelHandles = true;
        slider.labelTicks = true;
        slider.max = 1;
        slider.min = 0;
        slider.step = 0.1;
        slider.ticks = 1;
        slider.value = item.layer.opacity;
        slider.addEventListener("calciteSliderChange", (event) => {
          item.layer.opacity = event.target.value;
        });

        label.appendChild(slider);

        item.panel = {
          content: label,
          icon: "transparency",
          title: "Change layer opacity",
          open: true,
        };
      };
    </script>
  </body>
</html>
