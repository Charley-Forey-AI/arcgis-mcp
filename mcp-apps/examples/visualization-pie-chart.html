<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Pie charts | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-map basemap="gray-vector" center="-84.78, 42.44" zoom="6">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-legend slot="bottom-left"></arcgis-legend>
      <arcgis-popup slot="popup"></arcgis-popup>
    </arcgis-map>

    <script type="module">
      const FeatureLayer = await $arcgis.import("@arcgis/core/layers/FeatureLayer.js");
      const layer = new FeatureLayer({
        portalItem: {
          id: "a7c5a8c8ea42416e8bd92df9872cc51b",
        },
        renderer: {
          type: "pie-chart", // autocasts as new PieChartRenderer
          size: 10,
          attributes: [
            {
              color: "#ed5151",
              label: "No high school diploma",
              field: "SOMEHS_CY",
            },
            {
              field: "HSGRAD_CY",
              color: "#149ece",
              label: "High school diploma",
            },
            {
              field: "CollegeEducated",
              color: "#a7c636",
              label: "College educated",
            },
          ],
          // polygon fill behind pie chart
          backgroundFillSymbol: {
            type: "simple-fill", // autocasts as new SimpleFillSymbol
            color: [127, 127, 127, 0.2],
            outline: {
              width: 1,
              color: [255, 255, 255, 0.3],
            },
          },
          outline: {
            width: 1.5,
            color: "grey",
          },
          visualVariables: [
            {
              type: "size", // size visual variable based on population represented in each pie
              valueExpression: "$feature.SOMEHS_CY + $feature.HSGRAD_CY + $feature.CollegeEducated",
              minDataValue: 20000,
              maxDataValue: 500000,
              minSize: 12,
              maxSize: 48,
            },
          ],
        },
        popupTemplate: {
          title: "{COUNTY}, {STATE}",
          content: [
            {
              type: "media",
              mediaInfos: [
                {
                  title: "{COUNTY} County Education Attainment",
                  type: "pie-chart",
                  value: {
                    fields: ["SOMEHS_CY", "HSGRAD_CY", "CollegeEducated"],
                  },
                },
              ],
            },
            {
              type: "fields",
              fieldInfos: [
                {
                  fieldName: "ASSCDEG_CY",
                  label: "Number of Associate's degrees",
                  fieldFormat: {
                    type: "number",
                    usegrouping: "always",
                  },
                },
                {
                  fieldName: "BACHDEG_CY",
                  label: "Number of Bachelor's Degrees",
                  fieldFormat: {
                    type: "number",
                    usegrouping: "always",
                  },
                },
                {
                  fieldName: "GRADDEG_CY",
                  label: "Number of Graduate degrees",
                  fieldFormat: {
                    type: "number",
                    usegrouping: "always",
                  },
                },
                {
                  fieldName: "CollegeEducated",
                  label: "Number of college degrees",
                  fieldFormat: {
                    type: "number",
                    usegrouping: "always",
                  },
                },
                {
                  fieldName: "EDUCBASECY",
                  label: "Total population base",
                  fieldFormat: {
                    type: "number",
                    usegrouping: "always",
                  },
                },
                {
                  fieldName: "expression/percent-educated",
                  label: "Percent college educated",
                },
              ],
            },
          ],
          fieldInfos: [
            {
              fieldName: "HSGRAD_CY",
              label: "High school diploma",
            },
            {
              fieldName: "SOMEHS_CY",
              label: "No high school diploma",
            },
            {
              fieldName: "CollegeEducated",
              label: "College educated",
            },
          ],
          expressionInfos: [
            {
              name: "percent-educated",
              title: "Percent college educated",
              expression: "ROUND((($feature.CollegeEducated/$feature.EDUCBASECY)*100),2)+ '%'",
            },
          ],
        },
      });
      const viewElement = document.querySelector("arcgis-map");
      await viewElement.viewOnReady();
      viewElement.map.add(layer);
      viewElement.constraints.snapToZoom = false;
      viewElement.constraints.minScale = 9500000;
      viewElement.constraints.maxScale = 900000;
    </script>
  </body>
</html>
