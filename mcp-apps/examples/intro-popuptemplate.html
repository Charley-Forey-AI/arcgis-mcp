<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Intro to PopupTemplate | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <!-- Note: popup-component-enabled enables the Popup component (beta). See https://developers.arcgis.com/javascript/latest/references/map-components/components/arcgis-map/#popupComponentEnabled for details. -->
    <arcgis-map basemap="gray-vector" zoom="10" center="-73.95, 40.702" popup-component-enabled>
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-legend slot="bottom-left"></arcgis-legend>
    </arcgis-map>
    <script type="module">
      const FeatureLayer = await $arcgis.import("@arcgis/core/layers/FeatureLayer.js");
      // Get a reference to the map component
      const viewElement = document.querySelector("arcgis-map");
      await viewElement.viewOnReady();
      /*************************************************************
       * The PopupTemplate content is the text that appears inside the
       * popup. {fieldName} can be used to reference the value of an
       * attribute of the selected feature. HTML elements can be used
       * to provide structure and styles within the content. The
       * fieldInfos property is an array of objects (each object representing
       * a field) that is use to format number fields and customize field
       * aliases in the popup and legend.
       **************************************************************/
      const template = {
        // autocasts as new PopupTemplate()
        title: "{NAME} in {COUNTY}",
        content: [
          {
            // It is also possible to set the fieldInfos outside of the content
            // directly in the popupTemplate. If no fieldInfos is specifically set
            // in the content, it defaults to whatever may be set within the popupTemplate.
            type: "fields",
            fieldInfos: [
              {
                fieldName: "B12001_calc_pctMarriedE",
                label: "Married %",
              },
              {
                fieldName: "B12001_calc_numMarriedE",
                label: "People Married",
                fieldFormat: {
                  type: "number",
                  useGrouping: "always",
                  maximumFractionDigits: 0,
                },
              },
              {
                fieldName: "B12001_calc_numNeverE",
                label: "People that Never Married",
                fieldFormat: {
                  type: "number",
                  useGrouping: "always",
                  maximumFractionDigits: 0,
                },
              },
              {
                fieldName: "B12001_calc_numDivorcedE",
                label: "People Divorced",
                fieldFormat: {
                  type: "number",
                  useGrouping: "always",
                  maximumFractionDigits: 0,
                },
              },
            ],
          },
        ],
      };
      // Reference the popupTemplate instance in the
      // popupTemplate property of FeatureLayer
      const featureLayer = new FeatureLayer({
        url: "https://services.arcgis.com/P3ePLMYs2RVChkJx/arcgis/rest/services/ACS_Marital_Status_Boundaries/FeatureServer/2",
        popupTemplate: template,
      });
      // Add the layer to the map component
      viewElement.map.layers.add(featureLayer);
    </script>
  </body>
</html>
