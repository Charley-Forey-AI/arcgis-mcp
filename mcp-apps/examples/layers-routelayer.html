<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Intro to RouteLayer | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      .label-padding {
        padding: 1rem;
      }

      .button-padding {
        padding: 0 1rem 1rem 1rem;
      }
    </style>
  </head>

  <body>
    <calcite-shell class="calcite-mode-auto">
      <arcgis-map basemap="topo-vector" center="-117.59275, 34.062" zoom="5">
        <arcgis-zoom slot="top-left"></arcgis-zoom>
        <calcite-panel heading="Save RouteLayer" slot="top-right">
          <calcite-label class="label-padding"
            >Title:<calcite-input-text
              id="routelayer-title-input-text"
              value="Airport Route"></calcite-input-text>
          </calcite-label>
          <calcite-button appearance="solid" class="button-padding" id="save-routelayer"
            >Save</calcite-button
          >
        </calcite-panel>
      </arcgis-map>
      <calcite-dialog
        heading="Saved RouteLayer Information"
        id="save-results-dialog"
        modal
        width="s">
        <calcite-loader
          id="save-loader"
          label="Saving RouteLayer"
          text="Saving RouteLayer"></calcite-loader>
        <calcite-notice icon id="save-success-notice" kind="success">
          <div slot="title">The RouteLayer has been saved successfully</div>
          <calcite-link id="save-success-link" slot="message" target="_blank"></calcite-link>
        </calcite-notice>
        <calcite-notice icon id="save-error-notice" kind="danger">
          <div slot="title">The RouteLayer could not be saved</div>
          <div id="save-error-message" slot="message"></div>
        </calcite-notice>
      </calcite-dialog>
    </calcite-shell>
    <script type="module">
      const [RouteLayer, Stop, PointBarrier, PolygonBarrier, PolylineBarrier, PortalItem] =
        await $arcgis.import([
          "@arcgis/core/layers/RouteLayer.js",
          "@arcgis/core/rest/support/Stop.js",
          "@arcgis/core/rest/support/PointBarrier.js",
          "@arcgis/core/rest/support/PolygonBarrier.js",
          "@arcgis/core/rest/support/PolylineBarrier.js",
          "@arcgis/core/portal/PortalItem.js",
        ]);
      // an authorization string used to access the routing service
      const apiKey = "YOUR_ACCESS_TOKEN";

      // Get a reference to the map component and its view
      const viewElement = document.querySelector("arcgis-map");

      // Container (div) for displaying detailed error messages to the user when saving the RouteLayer fails
      const saveErrorMessage = document.querySelector("#save-error-message");
      // Visual alert (notice) that informs the user when an error occurs during the RouteLayer save process
      const saveErrorNotice = document.querySelector("#save-error-notice");
      // Visual loading indicator that shows the user when the RouteLayer is being saved or processed
      const saveLoader = document.querySelector("#save-loader");
      // Dialog window that communicates the outcome of the RouteLayer save operation,
      // showing success or error details to the user
      const saveResultsDialog = document.querySelector("#save-results-dialog");
      // Direct link that allows the user to access and view the newly saved RouteLayer
      // after a successful save operation
      const saveSuccessLink = document.querySelector("#save-success-link");
      // Visual alert (notice) that informs the user when the RouteLayer has been saved successfully
      const saveSuccessNotice = document.querySelector("#save-success-notice");
      // Button that initiates the process of saving the current RouteLayer to the portal
      const saveRouteLayerButton = document.querySelector("#save-routelayer");
      // Text input field where users specify or edit the title for the RouteLayer before saving it to the portal
      const routeLayerTitleInput = document.querySelector("#routelayer-title-input-text");
      // Listen for when the component is ready
      await viewElement.viewOnReady();
      // Event listener that resets the UI state when the save results dialog is closed,
      // preparing the application for further user actions
      saveResultsDialog.addEventListener("calciteDialogClose", () => {
        saveLoader.hidden = false;
        saveSuccessNotice.open = false;
        saveErrorNotice.open = false;
      });
      // create new stops for start (Ontario) and end (Esri)
      const stops = [
        new Stop({
          geometry: {
            x: -117.59275,
            y: 34.062,
          },
          name: "Ontario Airport",
        }),
        new Stop({
          geometry: {
            x: -117.1957,
            y: 34.05609,
          },
          name: "Esri Campus",
        }),
      ];
      // create new point barriers
      const pointBarriers = [
        // Sinkhole, Fontana
        new PointBarrier({
          geometry: {
            x: -117.43576,
            y: 34.10264,
          },
        }),
        // Construction, San Bernardino
        new PointBarrier({
          geometry: {
            x: -117.29412,
            y: 34.1053,
          },
        }),
        // Car fire, Grand Terrace
        new PointBarrier({
          geometry: {
            x: -117.30507,
            y: 34.03644,
          },
        }),
        // REI sale, Rancho Cucamonda
        new PointBarrier({
          geometry: {
            x: -117.57527,
            y: 34.10282,
          },
        }),
        // Protest, Kaiser
        new PointBarrier({
          geometry: {
            x: -117.48886,
            y: 34.09552,
          },
        }),
        // Quarry incident, Declezville
        new PointBarrier({
          geometry: {
            x: -117.47636,
            y: 34.04798,
          },
        }),
      ];
      // create new polyline barrier
      const polylineBarriers = [
        new PolylineBarrier({
          geometry: {
            paths: [
              [
                [-117.30584, 34.071],
                [-117.2871, 34.06],
              ],
            ],
          },
          name: "Major highway closure",
        }),
      ];
      // create new polygon barrier
      const polygonBarriers = [
        new PolygonBarrier({
          geometry: {
            rings: [
              [
                [-117.49497 - 0.01, 34.13484 - 0.01],
                [-117.49497 - 0.01, 34.13484 + 0.01],
                [-117.49497 + 0.01, 34.13484 + 0.01],
                [-117.49497 + 0.01, 34.13484 - 0.01],
                [-117.49497 - 0.01, 34.13484 - 0.01],
              ],
            ],
          },
          name: "Street festival, Etiwanda",
        }),
      ];
      // create a new RouteLayer with stops and barriers
      // only stops are required
      const routeLayer = new RouteLayer({
        stops,
        pointBarriers,
        polylineBarriers,
        polygonBarriers,
      });
      viewElement.map.add(routeLayer);
      // wait for the view and the RouteLayer to load
      await routeLayer.load();
      // once the RouteLayer is loaded, solve the route
      // use the optional RouteParameters parameter to provide the apiKey
      // and other settings like directions language and travel mode
      const results = await routeLayer.solve({
        apiKey,
      });
      // the `solve()` method returns a routing solution
      // it contains the computed route, stops, and barriers
      routeLayer.update(results);
      // when the route is solved, zoom to the route's extent
      await viewElement.goTo(routeLayer.routeInfo.geometry);
      // Event listener that handles the workflow for saving the current RouteLayer,
      // including UI feedback for success or error states.
      saveRouteLayerButton.addEventListener("click", async () => {
        try {
          // Open the dialog that displays the outcome of the RouteLayer save operation,
          // providing feedback on success or failure
          saveResultsDialog.open = true;
          // Retrieve the user-provided title for the RouteLayer from the input field,
          // or use a default title if none is specified
          const title = routeLayerTitleInput.value || "RouteLayer";
          // Create a new PortalItem instance representing the RouteLayer, including its title and description,
          // to prepare it for saving to the portal
          const portalItem = new PortalItem({
            description: "Route created using the ArcGIS Maps SDK for JavaScript",
            title,
          });
          // Save the current RouteLayer as a new PortalItem in the user's portal,
          // making it accessible and shareable online
          const saveAsResult = await routeLayer.saveAs(portalItem);
          // Update the success link to provide direct access to the newly saved RouteLayer,
          // setting its URL and display title from the new PortalItem
          saveSuccessLink.href = `${saveAsResult.portal.url}/home/item.html?id=${saveAsResult.id}`;
          saveSuccessLink.textContent = saveAsResult.title ?? "";
          // Hide the loading indicator and display a success notice to inform the user
          // that the RouteLayer was saved successfully
          saveLoader.hidden = true;
          saveSuccessNotice.open = true;
        } catch (error) {
          // Display a detailed error message and visual feedback if the RouteLayer save operation fails,
          // helping the user understand what went wrong
          saveErrorMessage.textContent = error.message;
          saveLoader.hidden = true;
          saveErrorNotice.open = true;
        }
      });
    </script>
  </body>
</html>
