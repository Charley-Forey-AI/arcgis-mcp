<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Watch for changes in components using reactiveUtils | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      #info {
        box-sizing: border-box;
        padding: 20px;
        height: 225px;
        width: 350px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        font-size: 14px;
        line-height: 30px;
        overflow: auto;
        overflow-wrap: break-word;
      }

      #info span {
        font-weight: 600;
        color: #f7be81;
      }
    </style>
  </head>

  <body class="calcite-mode-dark">
    <arcgis-map id="map" item-id="ceb8954a5f2c457284c5074efd5a5ca0">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-expand slot="bottom-left" expanded>
        <arcgis-basemap-gallery></arcgis-basemap-gallery>
      </arcgis-expand>
      <div id="info" slot="top-right">
        <b>Watch for changes</b><br />
        <div id="messages"></div>
      </div>
    </arcgis-map>

    <script type="module">
      const reactiveUtils = await $arcgis.import("@arcgis/core/core/reactiveUtils.js");
      const mapElement = document.getElementById("map");
      const logElement = document.getElementById("messages");

      await mapElement.viewOnReady();

      const state = {
        ready: false,
        zoom: null,
        scale: null,
        stationary: null,
        center: null,
        basemap: null,
      };

      const renderState = () => {
        logElement.innerHTML = `
          <span>ready</span>: ${state.ready}<br/>
          <span>zoom</span>: ${state.zoom ?? "—"}<br/>
          <span>scale</span>: ${state.scale ?? "—"}<br/>
          <span>stationary</span>: ${state.stationary ?? "—"}<br/>
          <span>basemap</span>: ${state.basemap ?? "—"}
        `;
      };
      reactiveUtils.watch(
        () => mapElement.ready,
        (isComponentReady) => {
          state.ready = isComponentReady;
          renderState();
        },
        { initial: true },
      );
      reactiveUtils.watch(
        () => [mapElement.zoom, mapElement.scale, mapElement.stationary],
        ([zoomLevel, scaleValue, isStationary]) => {
          state.zoom = zoomLevel;
          state.scale = Math.round(scaleValue);
          state.stationary = isStationary;
          renderState();
        },
        { initial: true },
      );
      reactiveUtils.watch(
        () => mapElement.basemap?.title,
        (basemapTitle) => {
          state.basemap = basemapTitle;
          renderState();
        },
        { initial: true },
      );
    </script>
  </body>
</html>
