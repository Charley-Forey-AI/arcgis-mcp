<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Binning with aggregate fields | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      #infoDiv {
        padding: 10px;
      }
    </style>
  </head>

  <body>
    <!-- Note: popup-component-enabled enables the Popup component (beta). See https://developers.arcgis.com/javascript/latest/references/map-components/components/arcgis-map/#popupComponentEnabled for details. -->
    <arcgis-map center="-73.94226,40.7163" scale="288895" popup-component-enabled>
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-home slot="top-left"></arcgis-home>
      <arcgis-expand slot="top-left" expand-icon="list-bullet">
        <div id="infoDiv">
          <calcite-button id="showBins" secondary width="full">Toggle Binning</calcite-button>
          <arcgis-legend legend-style="classic"></arcgis-legend>
        </div>
      </arcgis-expand>
    </arcgis-map>

    <script type="module">
      const [Map, FeatureLayer, LabelClass, AggregateField] = await $arcgis.import([
        "@arcgis/core/Map.js",
        "@arcgis/core/layers/FeatureLayer.js",
        "@arcgis/core/layers/support/LabelClass.js",
        "@arcgis/core/layers/support/AggregateField.js",
      ]);

      const colors = ["#d7e1ee", "#cbd6e4", "#b3bfd1", "#c86558", "#991f17"];

      const featureReduction = {
        type: "binning",
        fixedBinLevel: 6,
        fields: [
          new AggregateField({
            name: "aggregateCount",
            statisticType: "count",
          }),
          new AggregateField({
            name: "SUM_PERSONS_INJURED",
            alias: "Total number of persons injured",
            onStatisticField: "NUMBER_OF_PERSONS_INJURED",
            statisticType: "sum",
          }),
          new AggregateField({
            name: "SUM_PEDESTRIANS_INJURED",
            alias: "Number of pedestrians injured",
            onStatisticField: "NUMBER_OF_PEDESTRIANS_INJURED",
            statisticType: "sum",
          }),
          new AggregateField({
            name: "SUM_CYCLIST_INJURED",
            alias: "Number of cyclists injured",
            onStatisticField: "NUMBER_OF_CYCLIST_INJURED",
            statisticType: "sum",
          }),
          new AggregateField({
            name: "SUM_MOTORIST_INJURED",
            alias: "Number of cyclists injured",
            onStatisticField: "NUMBER_OF_MOTORIST_INJURED",
            statisticType: "sum",
          }),
          new AggregateField({
            name: "AVG_MOTORIST_INJURED",
            alias: "Ratio of motorist injuries to crashes",
            onStatisticField: "NUMBER_OF_MOTORIST_INJURED",
            statisticType: "avg",
          }),
          new AggregateField({
            name: "SUM_KILLED",
            alias: "Total fatalities",
            onStatisticField: "NUMBER_OF_PERSONS_KILLED",
            statisticType: "sum",
          }),
        ],
        labelsVisible: true,
        labelingInfo: [
          new LabelClass({
            minScale: 36112,
            maxScale: 0,
            deconflictionStrategy: "none",
            symbol: {
              type: "text", // autocasts as new TextSymbol()
              color: "white",
              font: {
                family: "Noto Sans",
                size: 12,
                weight: "bold",
              },
              haloColor: colors[4],
              haloSize: 0.5,
            },
            labelExpressionInfo: {
              expression: "Text($feature.AVG_MOTORIST_INJURED, '#%')",
            },
          }),
        ],
        fieldConfigurations: [
          {
            name: "aggregateCount",
            fieldFormat: {
              type: "number",
              maximumFractionDigits: 0,
              minimumFractionDigits: 0,
              useGrouping: "always",
            },
          },
          {
            name: "SUM_PERSONS_INJURED",
            fieldFormat: {
              type: "number",
              maximumFractionDigits: 0,
              minimumFractionDigits: 0,
              useGrouping: "never",
            },
          },
        ],
        popupEnabled: true,
        popupTemplate: {
          title: "Crash summary",
          content: [
            {
              type: "text",
              text: "{aggregateCount} car crashes occurred in this area.",
            },
            {
              type: "fields",
              fieldInfos: [
                {
                  fieldName: "aggregateCount",
                },
                {
                  fieldName: "SUM_PERSONS_INJURED",
                },
                {
                  fieldName: "SUM_PEDESTRIANS_INJURED",
                },
                {
                  fieldName: "SUM_CYCLIST_INJURED",
                },
                {
                  fieldName: "SUM_MOTORIST_INJURED",
                },
                {
                  fieldName: "SUM_KILLED",
                },
              ],
            },
          ],
        },
        renderer: {
          type: "simple",
          symbol: {
            type: "simple-marker",
            color: [0, 255, 71, 1],
            outline: null,
            outline: {
              color: "rgba(153, 31, 23, 0.3)",
              width: 0.3,
            },
          },
          visualVariables: [
            {
              type: "size",
              field: "aggregateCount",
              legendOptions: {
                title: "Total crashes",
              },
              minSize: {
                type: "size",
                valueExpression: "$view.scale",
                stops: [
                  { value: 18055, size: 18 },
                  { value: 36111, size: 12 },
                  { value: 72223, size: 8 },
                  { value: 144447, size: 4 },
                  { value: 288895, size: 2 },
                  { value: 577790, size: 1 },
                ],
              },
              maxSize: {
                type: "size",
                valueExpression: "$view.scale",
                stops: [
                  { value: 18055, size: 48 },
                  { value: 36111, size: 32 },
                  { value: 72223, size: 24 },
                  { value: 144447, size: 18 },
                  { value: 288895, size: 12 },
                  { value: 577790, size: 6 },
                ],
              },
              minDataValue: 10,
              maxDataValue: 300,
            },
            {
              type: "color",
              field: "AVG_MOTORIST_INJURED",
              legendOptions: {
                title: "% of motorists injured per crash",
              },
              stops: [
                { value: 0, color: colors[0], label: "No injuries" },
                { value: 0.1, color: colors[1] },
                { value: 0.3, color: colors[2], label: "30%" },
                { value: 0.5, color: colors[3] },
                { value: 0.75, color: colors[4], label: ">75%" },
              ],
            },
          ],
        },
      };

      const year = 2020;

      const layer = new FeatureLayer({
        title: "Motor vehicle crashes (2020)",
        url: "https://services.arcgis.com/V6ZHFr6zdgNZuVG0/ArcGIS/rest/services/NYC_motor_crashes/FeatureServer/0",
        featureReduction,
        fieldConfigurations: [
          {
            name: "CRASH_DATE",
            alias: "Date",
            fieldFormat: {
              type: "date-time",
              dateStyle: "medium",
              timeStyle: "medium",
              hour12: "always",
            },
          },
          {
            name: "NUMBER_OF_PERSONS_KILLED",
            alias: "Fatalities",
          },
          {
            name: "NUMBER_OF_PERSONS_INJURED",
            alias: "Injuries",
          },
        ],
        popupTemplate: {
          title: "Crash location",
          content: [
            {
              type: "fields",
              fieldInfos: [
                {
                  fieldName: "CRASH_DATE",
                },
                {
                  fieldName: "NUMBER_OF_PERSONS_KILLED",
                },
                {
                  fieldName: "NUMBER_OF_PERSONS_INJURED",
                },
              ],
            },
          ],
        },
        definitionExpression: `CRASH_DATE > Date '${year - 1}-12-31' AND CRASH_DATE < Date '${year + 1}-01-01'`,
        renderer: {
          type: "simple",
          label: "Crash location",
          symbol: {
            type: "simple-marker",
            style: "circle",
            size: 5,
            color: colors[3],
            outline: {
              style: "solid",
              color: [15, 15, 15, 0.3],
              width: 0.5,
            },
          },
        },
      });

      // get the arcgis-map component element and set the map
      const viewElement = document.querySelector("arcgis-map");
      viewElement.map = new Map({
        basemap: "gray-vector",
        layers: [layer],
      });

      const toggleButton = document.getElementById("showBins");
      toggleButton.onclick = () => {
        layer.featureReduction = layer.featureReduction ? null : featureReduction;
      };
    </script>
  </body>
</html>
