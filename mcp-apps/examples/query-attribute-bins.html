<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Attribute Bins Query | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <!-- Load Charts components from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/charts-components/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      #statsPanel {
        width: 420px;
      }

      calcite-panel {
        width: 800px;
      }

      arcgis-chart {
        height: 300px;
      }
    </style>
  </head>

  <body>
    <calcite-shell>
      <arcgis-map zoom="2">
        <arcgis-zoom slot="top-left"></arcgis-zoom>
        <calcite-panel slot="bottom-left">
          <calcite-block expanded id="histogram-block" heading="Hurricanes since 1925">
            <calcite-slider
              min="1925"
              max="2024"
              min-value="1925"
              max-value="1935"
              step="10"
              ticks="5"
              label-ticks
              id="hurricanes-histogram"
              scale="m"></calcite-slider>
          </calcite-block>
        </calcite-panel>
        <arcgis-expand slot="top-left" mode="floating">
          <arcgis-legend></arcgis-legend>
        </arcgis-expand>
        <calcite-panel
          id="statsPanel"
          slot="top-right"
          heading="Hurricanes 1925 - 2024"
          description="Explore hurricanes data">
          <calcite-block expanded label="chart block" id="chart-block">
            <arcgis-chart></arcgis-chart>
          </calcite-block>
        </calcite-panel>
      </arcgis-map>
    </calcite-shell>

    <script type="module">
      const { createModel } = await $arcgis.import("@arcgis/charts-components");
      const [Map, FeatureLayer, AttributeBinsQuery, DateBinParameters] = await $arcgis.import([
        "@arcgis/core/Map.js",
        "@arcgis/core/layers/FeatureLayer.js",
        "@arcgis/core/rest/support/AttributeBinsQuery.js",
        "@arcgis/core/rest/support/DateBinParameters.js",
      ]);

      // historic hurricanes track data
      const layer = new FeatureLayer({
        portalItem: {
          id: "d5555b8358b84c24b97e902ff2d44533",
        },
        outFields: ["*"],
      });

      // get the arcgis-chart component element
      const barChartElement = document.querySelector("arcgis-chart");

      // get the arcgis-map component element and wait for it to be ready
      const viewElement = document.querySelector("arcgis-map");
      viewElement.map = new Map({
        basemap: "gray-vector",
        layers: [layer],
      });

      await viewElement.viewOnReady();

      // wait for the layer to load and set up the time slider once the map is ready
      const layerView = await viewElement.whenLayerView(layer);
      updateMapTimeExtent("1925", "1935");

      // get total hurricanes by year between 1925 and 2024 in the PST time zone
      // using a date bin query with a yearly interval
      const hurricanesQuery = new AttributeBinsQuery({
        binParameters: new DateBinParameters({
          field: "Hurricane_Date",
          start: new Date(1925, 0, 1),
          end: new Date(2024, 11, 31),
          interval: {
            value: 1,
            unit: "years",
          },
        }),
        outTimeZone: "America/Los_Angeles",
        cacheHint: true,
      });

      // query the layer for the total hurricanes by year
      const hurricanesQueryResult = await layer.queryAttributeBins(hurricanesQuery);
      const histogramData = hurricanesQueryResult.features.map((feature) => {
        const year = new Date(feature.attributes.lowerBoundary).getFullYear();
        const count = feature.attributes.frequency;
        return [year, count];
      });

      // get the histogram element and set the histogram data
      const hurricanesHistogram = document.getElementById("hurricanes-histogram");
      hurricanesHistogram.histogram = histogramData;
      hurricanesHistogram.histogramStops = [
        {
          offset: 0,
          color: "#52aeb7",
        },
      ];

      // initialize the bar chart by creating a bar chart model and set the x-axis field
      // to month to show the total hurricanes by month for the selected years
      const barChartModel = await createModel({ layer: layer, chartType: "barChart" });
      barChartModel.xAxisField = "month";
      barChartModel.titleSymbol = {
        type: "esriTS",
        font: {
          family: "Avenir Next",
          size: 15,
          weight: "bold",
        },
      };

      barChartModel.titleText = "Total hurricanes by month 1925 - 1935";
      barChartElement.hideLoaderAnimation = true;
      barChartElement.layer = layer;
      barChartElement.view = viewElement;
      // update the bar chart when the map time extent changes
      barChartElement.viewTimeExtentChangePolicy = "refresh";
      barChartElement.model = barChartModel;

      // listen for selection events on the bar chart
      // when a selection is made, highlight the selected features on the map
      barChartElement.addEventListener("arcgisSelectionComplete", (event) => {
        viewElement.highlightSelect?.remove();
        viewElement.highlightSelect = layerView.highlight(event.detail.selectionData.selectionOIDs);
      });

      // update the map time extent when the slider value changes
      hurricanesHistogram.addEventListener("calciteSliderChange", () => {
        const [startYear, endYear] = hurricanesHistogram.value || [];
        updateMapTimeExtent(startYear, endYear);
        barChartModel.titleText = `Total hurricanes by month ${startYear} - ${endYear}`;
      });

      // this function updates the time extent of the map and is called when the slider value changes
      function updateMapTimeExtent(startYear, endYear) {
        const start = new Date(startYear, 0, 1);
        const end = new Date(endYear, 11, 31);
        viewElement.timeExtent = { start, end };
        const histogramBlock = document.getElementById("histogram-block");
        histogramBlock.description = `${startYear} - ${endYear}`;
      }
    </script>
  </body>
</html>
