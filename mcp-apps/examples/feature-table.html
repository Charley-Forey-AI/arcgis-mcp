<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>FeatureTable component | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        display: flex;
        height: 100%;
        margin: 0;
      }

      .map-panel,
      .table-panel {
        flex: 1;
      }

      arcgis-feature-table {
        height: 100%;
      }
    </style>
  </head>

  <body>
    <calcite-shell>
      <calcite-panel class="map-panel">
        <arcgis-map id="map" item-id="332e5d145bec4c2c860d65f7ca494b23"></arcgis-map>
      </calcite-panel>
      <calcite-panel class="table-panel">

        <arcgis-feature-table
          reference-element="arcgis-map"
          show-layer-dropdown
          related-records-enabled
          hide-selection-column></arcgis-feature-table>

      </calcite-panel>
    </calcite-shell>

    <script type="module">
      const reactiveUtils = await $arcgis.import("@arcgis/core/core/reactiveUtils.js");

      // Get references to the ArcGIS Map and Feature Table components.
      const viewElement = document.querySelector("arcgis-map");
      const table = document.querySelector("arcgis-feature-table");

      // check for relationships in the layer and update their labels.
      const processLayerRelationships = async (layer) => {
        // Ensure the layer is loaded
        if (!layer.loaded) await layer.load();

        // Check if the layer has relationships and an attribute table template.
        if (layer.relationships?.length > 0 && layer.attributeTableTemplate?.elements) {
          for (const element of layer.attributeTableTemplate.elements) {
            if (element.type === "relationship") {
              // Match the relationship by ID and update its label.
              const matchingRelationship = layer.relationships.find(
                (rel) => rel.id === element.relationshipId,
              );

              // Update the relationship name and display within the column's label.
              if (matchingRelationship) {
                const prefix = matchingRelationship.name.split("_")[0];
                element.label = `Related to: ${prefix}`;
              }
            }
          }
        }
      };

      // Initialize the Feature Table with the Region layer and configure related records behavior.
      const initializeTable = (regionLayer) => {
        // Set the layer for the table
        table.layer = regionLayer;

        // Add a custom action column for main table.
        table.actionColumnConfig = {
          label: "Go to feature",
          icon: "zoom-to-object",
          callback: (event) => viewElement.goTo(event.feature),
        };

        // Listen for the map's extent to change and update the table accordingly
        viewElement.addEventListener("arcgisViewChange", () => {
          table.filterGeometry = viewElement.extent;
        });

        // Monitor when the related table is loaded.
        reactiveUtils.when(
          () => table.relatedTable,
          (relatedTable) => {
            // Configure the related table.
            relatedTable.visibleElements.columnMenus = false;
            relatedTable.visibleElements.selectionColumn = false;

            // Add a custom action column for related tables.
            relatedTable.actionColumnConfig = {
              label: `Go to ${relatedTable.layer.title} feature`,
              icon: "zoom-to-object",
              callback: (event) => viewElement.goTo(event.feature),
            };
          },
        );
      };

      // Iterate through the map's layers, process their relationships, get the Region layer, and initialize the table.
      const checkLayers = async () => {
        await viewElement.viewOnReady();
        return new Promise((resolve) => {
          const layers = viewElement.map.layers.items;

          Promise.all(
            layers.map(async (layer) => {
              await processLayerRelationships(layer);
              if (layer.title === "Region") resolve(layer);
            }),
          );
        });
      };

      // Main entry
      (async () => {
        try {
          // Check layers and initialize the table with the Region layer
          const regionLayer = await checkLayers();
          if (regionLayer) initializeTable(regionLayer);
        } catch (error) {
          console.error("Error processing layers:", error);
        }
      })();
    </script>
  </body>
</html>
