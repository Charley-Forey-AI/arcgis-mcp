<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Intro to graphics | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-map basemap="hybrid" center="-80, 35" zoom="3">
      <arcgis-popup slot="popup"></arcgis-popup>
      <arcgis-zoom slot="top-left"></arcgis-zoom>
    </arcgis-map>

    <script type="module">
      const [Graphic] = await $arcgis.import(["@arcgis/core/Graphic.js"]);

      const viewElement = document.querySelector("arcgis-map");

      // Wait for the component to be ready before adding graphics.
      await viewElement.viewOnReady();

      // Configure a point's geometry. This is the location of the Titanic.
      const point = {
        type: "point", // autocasts as new Point()
        longitude: -49.97,
        latitude: 41.73,
      };

      // Configure a line's geometry. This is the Keystone pipeline.
      const polyline = {
        type: "polyline", // autocasts as new Polyline()
        paths: [
          [-111.3, 52.68],
          [-98, 49.5],
          [-93.94, 29.89],
        ],
      };

      // Configure a polygon's geometry. This is the Bermuda Triangle.
      const polygon = {
        type: "polygon", // autocasts as new Polygon()
        rings: [
          [-64.78, 32.3],
          [-66.07, 18.45],
          [-80.21, 25.78],
          [-64.78, 32.3],
        ],
      };

      // Create a symbol to define the point's style.
      const markerSymbol = {
        type: "simple-marker", // autocasts as new SimpleMarkerSymbol()
        color: [226, 119, 40],
        outline: {
          color: [255, 255, 255], // autocasts as new SimpleLineSymbol()
          width: 2,
        },
      };

      // Create a symbol to define the line's style.
      const lineSymbol = {
        type: "simple-line", // autocasts as SimpleLineSymbol()
        color: [226, 119, 40],
        width: 4,
      };

      // Create a symbol to define the polygon's style.
      const polygonFillSymbol = {
        type: "simple-fill", // autocasts as new SimpleFillSymbol()
        color: [227, 139, 79, 0.8],
        outline: {
          // autocasts as new SimpleLineSymbol()
          color: [255, 255, 255],
          width: 1,
        },
      };

      // Create a point graphic with the point geometry and symbol.
      const pointGraphic = new Graphic({
        geometry: point,
        symbol: markerSymbol,
      });

      // Create a line graphic with the line geometry and symbol.
      const polylineGraphic = new Graphic({
        geometry: polyline,
        symbol: lineSymbol,
        attributes: {
          Name: "Keystone Pipeline",
          Owner: "TransCanada",
          Length: "3,456 km",
        },
        popupTemplate: {
          // Add a popup so users can view the graphic's attributes
          // when clicked. It autocasts as new PopupTemplate().
          title: "{Name}",
          content: [
            {
              type: "fields",
              fieldInfos: [{ fieldName: "Name" }, { fieldName: "Owner" }, { fieldName: "Length" }],
            },
          ],
        },
      });

      // Create a polygon graphic with the polygon geometry and symbol.
      const polygonGraphic = new Graphic({
        geometry: polygon,
        symbol: polygonFillSymbol,
      });

      // Add the graphics to the map's graphics layer.
      viewElement.graphics.addMany([pointGraphic, polylineGraphic, polygonGraphic]);
    </script>
  </body>
</html>
