<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Clustered polygons | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body,
      #viewDiv {
        height: 100%;
        margin: 0;
      }

      #infoDiv {
        padding: 10px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      #cluster-button {
        width: 100%;
        --calcite-color-brand: royalblue;
      }
    </style>
  </head>

  <body>
    <arcgis-map basemap="gray-vector" center="-76.4568, 44.3398" scale="288896">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-expand expand-icon="list-bullet" slot="top-left">
        <div id="infoDiv">
          <calcite-button id="cluster-button">Disable Clustering</calcite-button>
          <arcgis-legend></arcgis-legend>
        </div>
      </arcgis-expand>
      <arcgis-home slot="top-left"></arcgis-home>
    </arcgis-map>

    <script type="module">
      const FeatureLayer = await $arcgis.import("@arcgis/core/layers/FeatureLayer.js");

      const toggleButton = document.getElementById("cluster-button");
      const viewElement = document.querySelector("arcgis-map");

      await viewElement.viewOnReady();
      const map = viewElement.map;

      const clusterConfig = {
        type: "cluster",
        labelingInfo: [
          {
            deconflictionStrategy: "none",
            labelExpressionInfo: {
              expression: "Text($feature.cluster_count, '#,###')",
            },
            symbol: {
              type: "text",
              color: "rgba(255,255,255,1)",
              font: {
                weight: "bold",
                family: "Noto Sans",
                size: "12px",
              },
            },
            where: "cluster_count >= 2",
            labelPlacement: "center-center",
          },
        ],
        popupTemplate: {
          title: "Cluster summary",
          content: "This cluster represents {cluster_count} pools.",
        },
        clusterMinSize: 16,
        maxScale: 4514,
        // clustered polygon and polyline layers
        // must have a defined renderer for clusters
        // to be visible
        renderer: {
          type: "simple",
          symbol: {
            type: "simple-marker",
            color: "royalblue",
            outline: {
              width: 0.5,
              color: "rgba(255,255,255,0.3)",
            },
          },
        },
      };

      const layer = new FeatureLayer({
        portalItem: {
          id: "c9b5c75e26774c57b48a1476f238eeb3",
        },
        minScale: 0,
        maxScale: 0,
        popupTemplate: {
          title: "Pool {OBJECTID}",
          content: "This is an {FEATURETYPE}.",
        },
        featureReduction: clusterConfig,
        renderer: {
          type: "simple",
          symbol: {
            type: "simple-fill",
            color: "royalblue",
            outline: {
              width: 0.5,
              color: "rgba(255,255,255,0.3)",
            },
          },
        },
      });

      map.add(layer);

      viewElement.addEventListener("arcgisViewChange", (event) => {
        toggleButton.disabled = viewElement.scale <= clusterConfig.maxScale;
      });

      // To turn off clustering on a layer, set the
      // featureReduction property to null
      toggleButton.addEventListener("click", () => {
        const fr = layer.featureReduction;
        layer.featureReduction = fr && fr.type === "cluster" ? null : clusterConfig;
        toggleButton.textContent =
          toggleButton.textContent === "Enable Clustering"
            ? "Disable Clustering"
            : "Enable Clustering";
      });
    </script>
  </body>
</html>
