<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>VectorTileLayer hitTest | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      #instructions {
        width: 300px;
        height: 100px;
      }

      #textDiv {
        height: 100%;
        padding: 10px;
      }

      .tooltip {
        position: absolute;
        pointer-events: none;
        transition: opacity 200ms;
        width: 330px;
        font-size: 14px;
      }

      .tooltip > div {
        margin: 0 auto;
        padding: 12px;
        border-radius: 4px;
        box-shadow: 0px 0px 4px rgba(255, 255, 255, 0.75);
        transform: translate3d(-50%, -125%, 0);
        line-height: 1.3em;
        background-color: #fff;
      }
    </style>
  </head>

  <body>
    <arcgis-map>
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-search slot="top-right"></arcgis-search>
      <arcgis-expand
        expanded
        close-on-esc
        slot="top-left"
        mode="floating"
        expand-icon="question"
        expand-tooltip="Sample instructions">
        <calcite-panel id="instructions">
          <div id="textDiv">
            Move the pointer over the contour lines in a VectorTileLayer to see a height, a measure
            unit and a depression of a contour.
          </div>
        </calcite-panel>
      </arcgis-expand>
    </arcgis-map>

    <script type="module">
      const [Map, VectorTileLayer, promiseUtils, GraphicsLayer, Graphic] = await $arcgis.import([
        "@arcgis/core/Map.js",
        "@arcgis/core/layers/VectorTileLayer.js",
        "@arcgis/core/core/promiseUtils.js",
        "@arcgis/core/layers/GraphicsLayer.js",
        "@arcgis/core/Graphic.js",
      ]);

      const layer = new VectorTileLayer({
        url: "https://basemaps.arcgis.com/arcgis/rest/services/World_Contours_v2/VectorTileServer",
        blendMode: "multiply",
      });

      // a graphic in this layer will show a location of the pointer when the hittest
      // returns contour info from contours vector tile layer
      const graphicsLayer = new GraphicsLayer({
        blendMode: "overlay",
      });
      let graphic = new Graphic({
        symbol: {
          type: "simple-marker",
          color: [239, 170, 10, 0.8],
          size: "40px",
        },
      });
      graphicsLayer.add(graphic);

      // get the arcgis-map component element and wait for it to be ready
      const viewElement = document.querySelector("arcgis-map");
      viewElement.map = new Map({
        basemap: "streets-relief-vector",
        layers: [layer, graphicsLayer],
      });

      viewElement.zoom = 14;
      viewElement.center = [86.925993, 27.989];
      viewElement.constraints = {
        minScale: 72223.819286,
        maxScale: 1128.497176,
      };
      await viewElement.viewOnReady();

      const searchElement = document.querySelector("arcgis-search");

      // setup a tooltip to show contours info from vector tile layer as user moves the pointer over the map
      const vtlTooltip = createTooltip();

      // debounce the hittest as user moves the mouse over the map to improve performance
      const hitTest = promiseUtils.debounce(async (event) => {
        // get hit test results only from the vector tile layer
        const hit = await viewElement.hitTest(event, { include: layer });
        if (hit.results.length) {
          // check if the hit test results from the vector tile layer contains
          // results for label layers defined in styleLayerIds
          const results = hit.results.filter((result) => {
            return result.graphic;
          });
          results.screenPoint = hit.screenPoint;
          if (!results.length) {
            return null;
          }
          return results;
        } else {
          return null;
        }
      });

      // Listen to map component's pointer move event and call hittest
      // Display the contours info if the hittest result
      // contains contours information from vector tile layer
      viewElement.addEventListener("arcgisViewPointerMove", async (event) => {
        let hits;
        try {
          hits = await hitTest(event.detail);
          if (hits) {
            let displayContent;
            for (let hit of hits) {
              displayContent = hits.map((hit) => {
                const styleLayer = layer.getStyleLayer(hit.graphic.origin.layerId);
                const mapPoint = viewElement.toMap({ x: event.detail.x, y: event.detail.y });
                graphic.geometry = mapPoint;

                let depressionValue;
                // check the values returned in depression attributes and assign descriptive info
                switch (hit.graphic.attributes["DEPRESSION"]) {
                  case 0:
                    depressionValue = "Depression status is indeterminate";
                    break;
                  case 1:
                    depressionValue = "Depression contour";
                    break;
                  case 2:
                    depressionValue = "Feature is a normal contour";
                    break;
                  default:
                    depressionValue = hit.graphic.attributes["DEPRESSION"];
                }
                const content = {
                  Contour: hit.graphic.attributes["Contour"],
                  Depression: depressionValue,
                  Unit: hit.graphic.attributes["Unit"],
                };
                return content;
              });
            }
            // clean up the tooltip content to show contours info
            displayContent[0] = JSON.stringify(displayContent[0])?.replace(/[{}]/g, "");
            displayContent[0] = displayContent[0].replace(/\"/g, "").replace(/:/g, ": ");
            displayContent[0] = displayContent[0].split(",").join("<br />");
            const screenPoint = hits.screenPoint;
            vtlTooltip.show(screenPoint, displayContent[0]);
          } else {
            vtlTooltip.hide();
          }
        } catch {}
      });

      // create and set up a tool tip to show contours info from the vector tiles from mouse over
      function createTooltip() {
        const tooltip = document.createElement("div");
        const style = tooltip.style;
        tooltip.setAttribute("role", "tooltip");
        tooltip.classList.add("tooltip");
        const textElement = document.createElement("div");
        tooltip.appendChild(textElement);

        viewElement.appendChild(tooltip);
        let x = 0;
        let y = 0;
        let targetX = 0;
        let targetY = 0;
        let visible = false;
        // move the tooltip progressively
        function move() {
          x += (targetX - x) * 0.1;
          y += (targetY - y) * 0.1;
          if (Math.abs(targetX - x) < 1 && Math.abs(targetY - y) < 1) {
            x = targetX;
            y = targetY;
          } else {
            requestAnimationFrame(move);
          }
          style.transform = "translate3d(" + Math.round(x) + "px," + Math.round(y) + "px, 0)";
        }
        return {
          show: (point, text) => {
            if (!visible) {
              x = point.x;
              y = point.y;
            }
            targetX = point.x;
            targetY = point.y;
            style.opacity = 1;
            visible = true;
            textElement.innerHTML = text;
            move();
          },
          hide: () => {
            style.opacity = 0;
            visible = false;
          },
        };
      }

      // Listen for property changes on the view after it has been loaded.
      viewElement.addEventListener("arcgisViewChange", async (event) => {
        const { stationary } = event.target;
        if (stationary) {
          searchElement.clear();
        }
      });
    </script>
  </body>
</html>
