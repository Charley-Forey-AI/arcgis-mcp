<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Web scene - slides | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      #slidesDiv {
        max-height: 66vh;
      }
    </style>
  </head>

  <body class="calcite-mode-dark">
    <arcgis-scene item-id="1c7a06421a314ac9b7d0fae22aa367fb">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"> </arcgis-compass>
      <arcgis-expand slot="top-left" group="top-left">
        <arcgis-weather></arcgis-weather>
      </arcgis-expand>
      <arcgis-expand slot="top-left" group="top-left">
        <arcgis-daylight></arcgis-daylight>
      </arcgis-expand>
      <calcite-panel slot="top-right" id="slidesDashboard" heading="Slides" scale="m">
        <calcite-list id="slidesDiv" drag-enabled></calcite-list>
        <calcite-label layout="inline" scale="s" slot="footer">
          Add slide:
          <calcite-input id="createSlideTitleInput" placeholder="Enter name" scale="s">
            <calcite-button
              id="createSlideButton"
              slot="action"
              scale="s"
              kind="neutral"
              appearance="solid">
              Create
            </calcite-button>
          </calcite-input>
        </calcite-label>
      </calcite-panel>
    </arcgis-scene>

    <script type="module">
      const [Slide] = await $arcgis.import(["@arcgis/core/webscene/Slide.js"]);

      const viewElement = document.querySelector("arcgis-scene");
      // Wait for the view to load
      await viewElement.viewOnReady();
      // The slides are a collection inside the presentation property of the WebScene
      const slides = viewElement.map.presentation.slides;
      // Loop through each slide in the collection and render the slide
      slides.forEach(createSlideUI);

      document.getElementById("createSlideButton").addEventListener("click", () => {
        // Create a slide containing a snapshot of the current view and its properties
        Slide.createFrom(viewElement.view).then((slide) => {
          // Set the slide title using the text from the title input element
          slide.title.text = document.getElementById("createSlideTitleInput").value;
          // Add the slide to the slides collection of the scene presentation
          slides.add(slide);
          // Create an UI for the new slide using a custom function
          createSlideUI(slide);
        });
      });

      function createSlideUI(slide) {
        // Create a new element which will contain all the slide information
        const slideElement = document.createElement("calcite-list-item");
        // Assign attributes of the slide to the element
        slideElement.id = slide.id;
        slideElement.label = slide.title.text;
        slideElement.scale = "s";
        slideElement.setAttribute("closable", "");
        // Assign the date and time (in UTC) representing the light state to the slide description
        slideElement.description = slide.environment.lighting.date.toLocaleString("en-GB", {
          timeZone: "UTC",
        });
        // Create an element with a thumbnail using the slide's URL
        slideElement.innerHTML = `<calcite-content slot="content-start">
                    <img alt="" src="${slide.thumbnail.url}">
                  </calcite-content>`;
        slidesDiv.appendChild(slideElement);
        slideElement.addEventListener("calciteListItemSelect", () => {
          // Applies a slide's settings to the SceneView and configure the animation
          slide.applyTo(viewElement.view, {
            maxDuration: 3000,
            easing: "quad-in-out-coast",
          });
        });
        slideElement.addEventListener("calciteListItemClose", () => {
          // Remove slide from slides collection
          slides.remove(slide);
        });
      }
    </script>
  </body>
</html>
