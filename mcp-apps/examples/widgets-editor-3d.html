<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Edit features in 3D with the Editor widget | Sample | ArcGIS Maps SDK for JavaScript</title>
    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css" />
    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <style>
      html,
      body,
      #viewDiv {
        height: 100%;
        margin: 0;
      }
    </style>
    <script type="module">
      const [FeatureLayer, WebScene, SceneView, Editor] = await $arcgis.import([
        "@arcgis/core/layers/FeatureLayer.js",
        "@arcgis/core/WebScene.js",
        "@arcgis/core/views/SceneView.js",
        "@arcgis/core/widgets/Editor.js",
      ]);

      // Create a map from the referenced webscene item id
      const webscene = new WebScene({
        portalItem: {
          id: "206a6a13162c4d9a95ea6a87abad2437",
        },
      });

      // Create a layer with visualVariables to use interactive handles for size and rotation
      const recreationLayer = new FeatureLayer({
        title: "Recreation",
        url: "https://services.arcgis.com/V6ZHFr6zdgNZuVG0/arcgis/rest/services/EditableFeatures3D/FeatureServer/1",
        elevationInfo: {
          mode: "absolute-height",
        },
        renderer: {
          type: "unique-value", // autocasts as new UniqueValueRenderer()
          field: "TYPE",
          visualVariables: [
            {
              // size can be modified with the interactive handle
              type: "size",
              field: "SIZE",
              axis: "height",
              valueUnit: "meters",
            },
            {
              // rotation can be modified with the interactive handle
              type: "rotation",
              field: "ROTATION",
            },
          ],
          uniqueValueInfos: [
            {
              value: "1",
              label: "Slide",
              symbol: {
                type: "point-3d", // autocasts as new PointSymbol3D()
                symbolLayers: [
                  {
                    type: "object",
                    resource: {
                      href: "https://static.arcgis.com/arcgis/styleItems/Recreation/gltf/resource/Slide.glb",
                    },
                  },
                ],
                styleOrigin: {
                  styleName: "EsriRecreationStyle",
                  name: "Slide",
                },
              },
            },
            {
              value: "2",
              label: "Swing",
              symbol: {
                type: "point-3d", // autocasts as new PointSymbol3D()
                symbolLayers: [
                  {
                    type: "object",
                    resource: {
                      href: "https://static.arcgis.com/arcgis/styleItems/Recreation/gltf/resource/Swing.glb",
                    },
                  },
                ],
                styleOrigin: {
                  styleName: "EsriRecreationStyle",
                  name: "Swing",
                },
              },
            },
          ],
        },
      });

      webscene.add(recreationLayer);

      const view = new SceneView({
        container: "viewDiv",
        map: webscene,
      });

      view.when(() => {
        view.popupEnabled = false; //disable popups
        // Create the Editor
        const editor = new Editor({
          view: view,
          tooltipOptions: {
            enabled: true,
          },
          labelOptions: {
            enabled: true,
          },
        });
        // Add widget to top-right of the view
        view.ui.add(editor, "top-right");
      });
    </script>
  </head>

  <body>
    <div id="viewDiv"></div>
  </body>
</html>
