<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>PointCloudLayer - intensity color modulation | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      calcite-panel {
        width: 360px;
      }

      calcite-switch {
        margin-top: 10px;
        margin-left: 10px;
      }

      .panel-help {
        margin-top: 10px;
        margin-left: 10px;
        color: var(--calcite-color-text-2);
        font-size: var(--calcite-font-size--2);
        line-height: 1.3;
      }

      .panel-help p {
        margin: 0 0 8px 0;
      }
    </style>
  </head>

  <body>
    <arcgis-scene>
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"></arcgis-compass>
      <calcite-panel slot="bottom-left" heading="Modulate classification colors">
        <calcite-switch
          id="modulation-switch"
          label-text-start="Color modulation based on INTENSITY"
          checked></calcite-switch>
        <div class="panel-help">
          <p>
            When enabled, the layer is rendered by LAS class (CLASS_CODE), and those class colors
            are brightened/darkened using the INTENSITY field.
          </p>
        </div>
      </calcite-panel>
      <arcgis-legend slot="top-right"></arcgis-legend>
    </arcgis-scene>

    <script type="module">
      const [Map, PointCloudLayer] = await $arcgis.import([
        "@arcgis/core/Map.js",
        "@arcgis/core/layers/PointCloudLayer.js",
      ]);

      /******************************************************************
       *
       * Load point cloud layer and display it using classification. Colors
       * assigned in the classification renderer will be modulated by the
       * INTENSITY field.
       *
       ******************************************************************/

      // Intensity values can vary between 0 and 255. The values set here are
      // minimum and maximum values of the Intensity field of the point cloud layer.
      const colorModulation = {
        field: "INTENSITY",
        minValue: 35, // colors of points with this intensity value will be displayed darker
        maxValue: 211, // colors of points with maximum intensity value will be displayed the same
      };

      const pcLayer = new PointCloudLayer({
        url: "https://tiles.arcgis.com/tiles/z2tnIkrLQ2BRzr6P/arcgis/rest/services/SONOMA_AREA1_LiDAR_RGB/SceneServer",
        renderer: {
          type: "point-cloud-unique-value", // autocasts as new PointCloudUniqueValueRenderer()
          field: "CLASS_CODE", // field containing data for standard LAS classification
          colorModulation: colorModulation,
          pointSizeAlgorithm: {
            type: "fixed-size",
            useRealWorldSymbolSizes: false,
            size: 3,
          },
          pointsPerInch: 35,
          colorUniqueValueInfos: [
            {
              values: ["1"],
              label: "Unclassified",
              color: [178, 178, 178],
            },
            {
              values: ["2"],
              label: "Ground",
              color: [168, 112, 0],
            },
            {
              values: ["5"],
              label: "High Vegetation",
              color: [205, 245, 121],
            },
            {
              values: ["6"],
              label: "Building",
              color: [229, 75, 65],
            },
            {
              values: ["7"],
              label: "Low Point(noise)",
              color: [229, 0, 0],
            },
            {
              values: ["9"],
              label: "Water",
              color: [0, 92, 230],
            },
          ],
        },
        elevationInfo: {
          mode: "absolute-height",
          offset: 2,
        },
      });

      // Create Map with the Point Cloud Layer
      const map = new Map({
        basemap: "gray-vector",
        ground: "world-elevation",
        layers: [pcLayer],
      });

      const viewElement = document.querySelector("arcgis-scene");
      viewElement.map = map;
      viewElement.camera = {
        heading: 140.19101175677667,
        tilt: 62.60556759594034,
        position: {
          x: -13631735.748425495,
          y: 4621846.155726249,
          z: 117.0263783885166,
          spatialReference: {
            wkid: 3857,
          },
        },
      };

      await viewElement.viewOnReady();

      // switch between a renderer with colorModulation and one without
      const modulation = document.getElementById("modulation-switch");
      modulation.addEventListener("calciteSwitchChange", (event) => {
        const renderer = pcLayer.renderer.clone();
        renderer.colorModulation = event.target.checked ? colorModulation : null;
        pcLayer.renderer = renderer;
      });
    </script>
  </body>
</html>
