<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <title>Add a Legend to the LayerList | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
      }

      arcgis-map {
        display: block;
        height: 100vh;
      }
    </style>
  </head>

  <body class="calcite-mode-dark">
    <arcgis-map item-id="d5dda743788a4b0688fe48f43ae7beb9">
      <arcgis-layer-list slot="top-right"></arcgis-layer-list>
    </arcgis-map>

    <script type="module">
      document.querySelector("arcgis-layer-list").listItemCreatedFunction = (event) => {
        const { item } = event;

        // Exclude group layers, otherwise the legend will be displayed twice
        if (item.layer.type != "group") {
          item.panel = {
            content: "legend",
            open: true,
          };
        }
      };
    </script>
  </body>
</html>
