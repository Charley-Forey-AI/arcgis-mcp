<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>BuildingSceneLayer with Slice component | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      arcgis-slice {
        margin-bottom: 4px;
      }

      #menu {
        padding: 20px;
        width: min-content;
        background-color: #fff;
        line-height: 1.3em;
        font-size: 14px;
      }

      #menu > calcite-button {
        margin-bottom: 4px;
      }
    </style>
  </head>

  <body>
    <arcgis-scene item-id="c7470b0e4e4c44288cf287d658155300">
      <arcgis-layer-list slot="top-left"></arcgis-layer-list>
      <div id="menu" slot="top-right">
        <arcgis-slice slot="top-right"></arcgis-slice>
        <calcite-button
          id="resetPlaneBtn"
          title="Reset slice plane"
          appearance="outline-fill"
          width="full">
          Reset slice plane
        </calcite-button>
        <calcite-button
          id="clearPlaneBtn"
          title="Clear slice plane"
          appearance="outline-fill"
          width="full">
          Clear slice
        </calcite-button>
        <input type="checkbox" id="tiltEnabled" checked /><label for="tiltEnabled"
          >Allow tilt on slice plane</label
        >
        <br />
        <input type="checkbox" id="color" /><label for="color"
          >Display all doors with a red color</label
        >
      </div>
    </arcgis-scene>

    <script type="module">
      (async () => {
        const [BuildingSceneLayer, SlicePlane, reactiveUtils] = await $arcgis.import([
          "@arcgis/core/layers/BuildingSceneLayer.js",
          "@arcgis/core/analysis/SlicePlane.js",
          "@arcgis/core/core/reactiveUtils.js",
        ]);

        /**********************************************
         * Variables and HTML elements
         *********************************************/
        const viewElement = document.querySelector("arcgis-scene");
        await viewElement.viewOnReady();
        const sliceComponent = document.querySelector("arcgis-slice");

        const excludedLayers = [];

        const resetPlaneBtn = document.getElementById("resetPlaneBtn");
        const clearPlaneBtn = document.getElementById("clearPlaneBtn");

        let doorsLayer = null;
        let sliceTiltEnabled = true;

        /**********************************************
         * BuildingSceneLayer and Slice
         *********************************************/
        // Create the BuildingSceneLayer and add it to the scene
        const buildingLayer = new BuildingSceneLayer({
          url: "https://tiles.arcgis.com/tiles/V6ZHFr6zdgNZuVG0/arcgis/rest/services/BSL__4326__US_Redlands__EsriAdminBldg_PublicDemo/SceneServer",
          title: "Administration Building, Redlands - Building Scene Layer",
        });
        viewElement.map.layers.add(buildingLayer);

        // Create an initial SlicePlane to slice the building scene layer
        const plane = new SlicePlane({
          position: {
            latitude: 34.0600460070941,
            longitude: -117.18669237418565,
            z: 417.75,
          },
          tilt: 32.62,
          width: 29,
          height: 29,
          heading: 0.46,
        });

        buildingLayer.when(() => {
          // Iterate through the flat array of sublayers and extract the ones
          // that should be excluded from the slice component
          buildingLayer.allSublayers.forEach((layer) => {
            // modelName is standard accross all BuildingSceneLayer,
            // use it to identify a certain layer
            switch (layer.modelName) {
              // Because of performance reasons, the Full Model view is
              // by default set to false. In this scene, the Full Model should be visible.
              case "FullModel":
                layer.visible = true;
                break;
              case "Overview":
              case "Rooms":
                layer.visible = false;
                break;
              // Extract the layers that should not be hidden by the slice component
              case "Doors":
                doorsLayer = layer;
                excludedLayers.push(layer);
                break;
              default:
                layer.visible = true;
            }
          });
          setSliceSettings();
        });

        /**********************************************
         * Support functions
         *********************************************/
        // Configure the Slice component
        function setSliceSettings() {
          sliceComponent.excludedLayers.addMany(excludedLayers);
          sliceTiltEnabled = true;
          sliceComponent.tiltEnabled = sliceTiltEnabled;
          sliceComponent.shape = plane;
          reactiveUtils.watch(
            () => sliceComponent.state,
            (state) => {
              if (state === "ready") {
                clearPlaneBtn.style.display = "none";
              } else {
                clearPlaneBtn.style.display = "inherit";
              }
            },
          );
        }

        /**********************************************
         * Event listeners to handle user interactions
         * with the Slice component
         *********************************************/
        // Reset the slice component shape to the initial SlicePlane
        resetPlaneBtn.addEventListener("click", () => {
          document.getElementById("tiltEnabled").checked = true;
          sliceTiltEnabled = true;
          sliceComponent.tiltEnabled = sliceTiltEnabled;
          sliceComponent.shape = plane;
        });

        clearPlaneBtn.addEventListener("click", () => {
          sliceComponent.shape = null;
        });

        document.getElementById("tiltEnabled").addEventListener("change", (event) => {
          sliceTiltEnabled = event.target.checked;
          sliceComponent.tiltEnabled = sliceTiltEnabled;
        });

        // Change the color of the doors layer when the checkbox is checked
        document.getElementById("color").addEventListener("change", (event) => {
          if (event.target.checked) {
            // A renderer can be set on a BuildingComponentSublayer
            doorsLayer.renderer = {
              type: "simple", // autocasts as new SimpleRenderer()
              symbol: {
                type: "mesh-3d", // autocasts as new MeshSymbol3D()
                symbolLayers: [
                  {
                    type: "fill", // autocasts as new FillSymbol3DLayer()
                    material: {
                      color: "red",
                    },
                  },
                ],
              },
            };
          } else {
            doorsLayer.renderer = null;
          }
        });
      })();
    </script>
  </body>
</html>
