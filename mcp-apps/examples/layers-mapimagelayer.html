<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Intro to MapImageLayer | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-scene basemap="dark-gray-vector">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"> </arcgis-compass>
    </arcgis-scene>

    <script type="module">
      const MapImageLayer = await $arcgis.import("@arcgis/core/layers/MapImageLayer.js");

      // Get a reference to the Scene component
      const viewElement = document.querySelector("arcgis-scene");

      // Create a MapImageLayer instance which points to a Map Service, containing data of pool permits in Southern California
      const permitsLayer = new MapImageLayer({
        portalItem: {
          // autocasts as new PortalItem()
          id: "d7892b3c13b44391992ecd42bfa92d01",
        },
      });

      // Wait for the view to initialize
      await viewElement.viewOnReady();

      // Add the MapImageLayer
      viewElement.map.add(permitsLayer);

      // Wait until the MapImageLayer is loaded
      await viewElement.whenLayerView(permitsLayer);

      // Animate to the layer's full extent when the view loads
      try {
        await viewElement.goTo(permitsLayer.fullExtent);
      } catch (error) {
        if (error.name !== "AbortError") {
          console.error(error);
        }
      }
    </script>
  </body>
</html>
