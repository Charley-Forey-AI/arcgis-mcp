<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Generate continuous color visualization for 3D buildings | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      calcite-card {
        --calcite-font-weight-medium: 550;
      }
    </style>
  </head>

  <body>
    <arcgis-scene basemap="gray-vector" ground="world-elevation">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"></arcgis-compass>
      <calcite-card slot="bottom-right">
        <span slot="heading">Construction Year</span>
        <arcgis-slider-color-legacy slot="description" precision="0"></arcgis-slider-color-legacy>
      </calcite-card>
    </arcgis-scene>

    <script type="module">
      const [SceneLayer, colorRendererCreator, histogram] = await $arcgis.import([
        "@arcgis/core/layers/SceneLayer.js",
        "@arcgis/core/smartMapping/renderers/color.js",
        "@arcgis/core/smartMapping/statistics/histogram.js",
      ]);

      /*****************************************************************
       * Get a reference to the Scene component and slider
       *****************************************************************/
      const viewElement = document.querySelector("arcgis-scene");
      const colorSlider = document.querySelector("arcgis-slider-color-legacy");
      await colorSlider.componentOnReady();

      /*****************************************************************
       * Setup the Scene component and the layer
       *****************************************************************/
      viewElement.camera = {
        heading: 24,
        tilt: 77,
        position: {
          x: -8240208,
          y: 4965848,
          z: 960,
          spatialReference: { wkid: 3857 },
        },
      };

      // Create SceneLayer instance with popupTemplate
      const layer = new SceneLayer({
        portalItem: {
          id: "4ac2a674fdb54bb79471abe8368fd7d4",
        },
        visible: false,
        popupTemplate: {
          // autocasts as new PopupTemplate()
          title: "{NAME}",
          content: [
            {
              type: "fields",
              fieldInfos: [
                {
                  fieldName: "CNSTRCT_YR",
                  label: "Construction year",
                },
                {
                  fieldName: "HEIGHTROOF",
                  label: "Height (ft)",
                  format: {
                    digitSeparator: true,
                    places: 2,
                  },
                },
                {
                  fieldName: "NUM_FLOORS",
                  label: "Floors",
                },
              ],
            },
          ],
        },
      });

      // Wait for the view to initialize
      await viewElement.viewOnReady();

      viewElement.map.add(layer);

      /*****************************************************************
       * Setup the color renderer generator
       *****************************************************************/
      // Configure parameters for the color renderer generator.
      // The layer must be specified along with a field name
      // or arcade expression. The view and other properties determine
      // the appropriate default color scheme.
      const colorParams = {
        layer: layer,
        view: viewElement.view,
        field: "CNSTRCT_YR",
        theme: "above-and-below",
        minValue: 1800,
        maxValue: 2020,
        edgesType: "solid",
      };

      // Generate a continuous color renderer based on the
      // statistics of the data in the provided layer
      // and field.
      //
      // This resolves to an object containing several helpful
      // properties, including color scheme, statistics,
      // the renderer and visual variable
      const rendererResult = await colorRendererCreator.createContinuousRenderer(colorParams);

      // set the renderer to the layer
      layer.renderer = rendererResult.renderer;
      if (!layer.visible) {
        layer.visible = true;
      }

      const histogramResult = await histogram({ ...colorParams, numBins: [] });

      colorSlider.min = rendererResult.statistics.min;
      colorSlider.max = rendererResult.statistics.max;
      colorSlider.labelFormatFunction = (value) => value.toFixed(0);
      colorSlider.updateFromRendererResult(rendererResult, histogramResult);
      // when the user slides the handle(s), update the renderer
      // with the updated color visual variable stops
      function changeEventHandler() {
        const renderer = layer.renderer.clone();
        const colorVariable = renderer.visualVariables[0].clone();
        colorVariable.stops = colorSlider.stops;
        renderer.visualVariables = [colorVariable];
        layer.renderer = renderer;
      }
      colorSlider.addEventListener("arcgisThumbChange", changeEventHandler);
      colorSlider.addEventListener("arcgisThumbDrag", changeEventHandler);
      colorSlider.addEventListener("arcgisPropertyChange", changeEventHandler);
    </script>
  </body>
</html>
