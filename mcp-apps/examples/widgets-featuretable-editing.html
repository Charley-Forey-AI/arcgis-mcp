<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>FeatureTable with editing and attachments enabled | Sample | ArcGIS Maps SDK for JavaScript</title>

    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css" />
    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      #viewDiv {
        height: 50%;
        width: 100%;
      }

      .container {
        height: 50%;
        width: 100%;
      }
    </style>

    <script type="module">
      const [Map, MapView, FeatureLayer, FeatureTable] = await $arcgis.import([
        "@arcgis/core/Map.js",
        "@arcgis/core/views/MapView.js",
        "@arcgis/core/layers/FeatureLayer.js",
        "@arcgis/core/widgets/FeatureTable.js",
      ]);

      let featureLayer;
      const features = [];

      const map = new Map({
        basemap: "streets-navigation-vector",
      });

      const view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-87.63, 41.86],
        zoom: 11,
        popupEnabled: false,
      });

      view.when(() => {
        featureLayer = new FeatureLayer({
          portalItem: {
            id: "3807c58dd48c4d32810042d8edf4a2fe",
          },
          outFields: ["*"],
          title: "Chicago crime incidents",
        });
        map.add(featureLayer);

        // Create the feature table
        const featureTable = new FeatureTable({
          view: view,
          layer: featureLayer,
          multiSortEnabled: true, // set this to true to enable sorting on multiple columns
          attachmentsEnabled: true, //set this to true to enable attachments
          editingEnabled: true, // set this to true to enable editing
          paginationEnabled: true,
          tableTemplate: {
            // autocast to TableTemplate
            columnTemplates: [
              // takes an array of GroupColumnTemplate and FieldColumnTemplate
              {
                // autocast to GroupColumnTemplate
                type: "group",
                label: "Crime details",
                columnTemplates: [
                  {
                    type: "field",
                    fieldName: "Primary_Type",
                    label: "Crime type",
                  },
                  {
                    type: "field",
                    fieldName: "Arrest",
                    label: "Arrest",
                  },
                  {
                    type: "field",
                    fieldName: "incident_date",
                    label: "Date of incident",
                  },
                ],
              },
              {
                type: "group",
                label: "Record information",
                columnTemplates: [
                  {
                    type: "field",
                    fieldName: "Case_Number",
                    label: "Case No.",
                    editable: false, // read only
                  },
                ],
              },
            ],
          },
          container: document.getElementById("tableDiv"),
        });
      });
    </script>
  </head>

  <body>
    <div id="viewDiv"></div>
    <div class="container">
      <div id="tableDiv"></div>
    </div>
  </body>
</html>
