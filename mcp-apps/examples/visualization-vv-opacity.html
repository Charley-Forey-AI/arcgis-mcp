<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Data-driven opacity | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-map basemap="gray-vector" center="-122.34,47.59" zoom="11">
      <arcgis-popup slot="popup"></arcgis-popup>
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-legend slot="top-right"></arcgis-legend>
    </arcgis-map>
    <script type="module">
      const FeatureLayer = await $arcgis.import("@arcgis/core/layers/FeatureLayer.js");

      const layer = new FeatureLayer({
        url: "https://services.arcgis.com/V6ZHFr6zdgNZuVG0/arcgis/rest/services/Puget_Sound_BG_demographics/FeatureServer/0",
        popupTemplate: {
          title: "{NAMELSAD}",
          content: "In this block group, the median household income is ${MEDHINC_CY}.",
          fieldInfos: [
            {
              fieldName: "MEDHINC_CY",
              format: {
                places: 0,
                digitSeparator: true,
              },
            },
          ],
        },
        renderer: {
          type: "simple",
          symbol: {
            type: "simple-fill",
            color: "#238443",
            outline: null,
          },
          // use opacity to visualize median household income
          visualVariables: [
            {
              type: "opacity",
              field: "MEDHINC_CY",
              stops: [
                { value: 10000, opacity: 0.2, label: "$10,000" },
                { value: 100000, opacity: 0.85, label: "$100,000" },
              ],
            },
          ],
        },
      });

      // Get a reference to the Map component element.
      const viewElement = document.querySelector("arcgis-map");
      await viewElement.viewOnReady();
      viewElement.map.add(layer);
    </script>
  </body>
</html>
