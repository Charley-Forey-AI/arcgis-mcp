<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>LayerList component with actions | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>


  <body>

    <arcgis-map center="-98.5795, 39.8282" zoom="4">

      <arcgis-zoom slot="top-left"></arcgis-zoom>

      <arcgis-layer-list
        slot="top-right"
        show-collapse-button
        show-heading
        show-filter
        filter-placeholder="Filter layers"></arcgis-layer-list>

    </arcgis-map>

    <script type="module">
      const [Map, Collection, GroupLayer, MapImageLayer, ActionButton] = await $arcgis.import([
        "@arcgis/core/Map.js",
        "@arcgis/core/core/Collection.js",
        "@arcgis/core/layers/GroupLayer.js",
        "@arcgis/core/layers/MapImageLayer.js",
        "@arcgis/core/support/actions/ActionButton.js",
      ]);

      // Create layer showing sample data for the United States.
      const USALayer = new MapImageLayer({
        url: "http://sampleserver6.arcgisonline.com/arcgis/rest/services/USA/MapServer",
        title: "US Sample Data",
      });

      // Create layer showing sample census data for the United States.
      // Set visibility to false so it's not visible on startup.
      const censusLayer = new MapImageLayer({
        url: "http://sampleserver6.arcgisonline.com/arcgis/rest/services/Census/MapServer",
        title: "US Sample Census",
        visible: false,
      });

      // Create GroupLayer with the two MapImageLayers created above
      // as children layers. Set the visibilityMode to "exclusive" so
      // only one layer is visible at a time.
      const demographicGroupLayer = new GroupLayer({
        title: "US Demographics",
        visible: true,
        visibilityMode: "exclusive",
        layers: [USALayer, censusLayer],
        opacity: 0.75,
      });

      // Get a reference to the arcgis-map component.
      // Set its map property to a new Map instance containing the GroupLayer.
      const viewElement = document.querySelector("arcgis-map");
      viewElement.map = new Map({
        basemap: "gray-vector",
        layers: [demographicGroupLayer],
      });
      // Get a reference to the arcgis-layer-list component.
      const arcgisLayerList = document.querySelector("arcgis-layer-list");
      // A function that executes each time a ListItem is created for a layer.
      arcgisLayerList.listItemCreatedFunction = (event) => {
        // The event object contains an item property.
        // It is a ListItem referencing the associated layer
        // and other properties. You can control the visibility of the
        // item, its title, and actions using this object.
        const { item } = event;

        // If the title of the item is "US Demographics"
        if (item.title === "US Demographics") {
          // A collection of ActionButtons to place in the LayerList.
          // By making this collection two-dimensional, you can separate similar
          // actions into separate groups with a breaking line.
          item.actionsSections = new Collection([
            new Collection([
              new ActionButton({
                title: "Go to full extent",
                icon: "zoom-out-fixed",
                id: "full-extent",
              }),
              new ActionButton({
                title: "Layer information",
                icon: "information",
                id: "information",
              }),
            ]),
            new Collection([
              new ActionButton({
                title: "Increase opacity",
                icon: "chevron-up",
                id: "increase-opacity",
              }),
              new ActionButton({
                title: "Decrease opacity",
                icon: "chevron-down",
                id: "decrease-opacity",
              }),
            ]),
          ]);
        }
        // Add a calcite slider for updating opacity on group layers.
        if (item.layer.type === "map-image") {
          const label = document.createElement("calcite-label");
          label.textContent = "Opacity";
          label.scale = "s";

          const slider = document.createElement("calcite-slider");
          slider.labelHandles = true;
          slider.labelTicks = true;
          slider.min = 0;
          slider.minLabel = "0";
          slider.max = 1;
          slider.maxLabel = "1";
          slider.scale = "s";
          slider.step = 0.01;
          slider.value = 1;
          slider.ticks = 0.5;

          slider.addEventListener("calciteSliderChange", () => {
            item.layer.opacity = slider.value;
          });

          label.appendChild(slider);

          item.panel = {
            content: label,
            icon: "sliders-horizontal",
            title: "Change layer opacity",
          };
        }
      };
      // Event listener that fires each time an action is triggered
      arcgisLayerList.addEventListener("arcgisTriggerAction", (event) => {
        // The layer visible in the view at the time of the trigger.
        const visibleLayer = USALayer.visible ? USALayer : censusLayer;

        // Get a reference to the action id.
        const { id } = event.detail.action;

        // If the full-extent action is triggered then navigate
        // to the full extent of the visible layer
        if (id === "full-extent") {
          viewElement?.goTo(visibleLayer.fullExtent).catch((error) => {
            if (error.name != "AbortError") {
              console.error(error);
            }
          });
        }

        // If the information action is triggered, then
        // open the item details page of the service layer
        if (id === "information") {
          window.open(visibleLayer.url);
        }

        // If the increase-opacity action is triggered, then
        // increase the opacity of the GroupLayer by 0.25
        if (id === "increase-opacity") {
          if (demographicGroupLayer.opacity < 1) {
            demographicGroupLayer.opacity += 0.25;
          }
        }

        // If the decrease-opacity action is triggered, then
        // decrease the opacity of the GroupLayer by 0.25
        if (id === "decrease-opacity") {
          if (demographicGroupLayer.opacity > 0) {
            demographicGroupLayer.opacity -= 0.25;
          }
        }
      });

    </script>

  </body>
</html>
