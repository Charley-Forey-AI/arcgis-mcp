<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Visualize data with dictionary renderer | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-map basemap="gray-vector">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-expand slot="top-left" expanded>
        <arcgis-bookmarks></arcgis-bookmarks>
      </arcgis-expand>
    </arcgis-map>
    <script type="module">
      const [FeatureLayer, DictionaryRenderer, Bookmark] = await $arcgis.import([
        "@arcgis/core/layers/FeatureLayer.js",
        "@arcgis/core/renderers/DictionaryRenderer.js",
        "@arcgis/core/webmap/Bookmark.js",
      ]);
      // Get a reference to the map and bookmarks components
      const viewElement = document.querySelector("arcgis-map");
      const bookmarksElement = document.querySelector("arcgis-bookmarks");
      viewElement.extent = {
        spatialReference: {
          wkid: 102100,
        },
        xmax: -13581772,
        xmin: -13584170,
        ymax: 4436367,
        ymin: 4435053,
      };
      await viewElement.viewOnReady();
      const popupTemplate = {
        // autocasts as new PopupTemplate()
        title: "station: {Station_Name}",
        content: [
          {
            // It is also possible to set the fieldInfos outside of the content
            // directly in the popupTemplate. If no fieldInfos is specifically set
            // in the content, it defaults to whatever may be set within the popupTemplate.
            type: "fields",
            fieldInfos: [
              {
                fieldName: "Fuel_Type_Code",
                label: "Fuel type",
              },
              {
                fieldName: "EV_Network",
                label: "EV network",
              },
              {
                fieldName: "EV_Connector_Types",
                label: "EV connection types",
              },
              {
                fieldName: "Station_Name",
                label: "Station Name",
              },
            ],
          },
        ],
      };
      const scale = 36112;
      const layer_1 = new FeatureLayer({
        url: "https://services.arcgis.com/V6ZHFr6zdgNZuVG0/arcgis/rest/services/Alternative_Fuel_Station_March2018/FeatureServer",
        outFields: ["*"],
        popupTemplate: popupTemplate,
        // Use DictionaryRenderer to render the fuel stations
        // with different symbols based on the fuel type code
        renderer: new DictionaryRenderer({
          url: "https://www.arcgis.com/sharing/rest/content/items/910476b3e3784e0f966a1547fa664356",
          fieldMap: {
            fuel_type: "Fuel_Type_Code",
          },
          config: {
            show_label: "false",
          },
          visualVariables: [
            {
              type: "size",
              valueExpression: "$view.scale",
              stops: [
                {
                  value: scale / 2,
                  size: 20,
                },
                {
                  value: scale * 2,
                  size: 15,
                },
                {
                  value: scale * 4,
                  size: 10,
                },
                {
                  value: scale * 8,
                  size: 5,
                },
                {
                  value: scale * 16,
                  size: 2,
                },
                {
                  value: scale * 32,
                  size: 1,
                },
              ],
            },
          ],
        }),
        minScale: 0,
        maxScale: 10000,
      });
      const layer_2 = new FeatureLayer({
        url: "https://services.arcgis.com/V6ZHFr6zdgNZuVG0/arcgis/rest/services/Alternative_Fuel_Station_March2018/FeatureServer",
        outFields: ["*"],
        popupTemplate: popupTemplate,
        renderer: new DictionaryRenderer({
          url: "https://www.arcgis.com/sharing/rest/content/items/910476b3e3784e0f966a1547fa664356",
          fieldMap: {
            fuel_type: "Fuel_Type_Code",
            connector_types: "EV_Connector_Types",
            network: "EV_Network",
            name: "Station_Name",
          },
          config: {
            show_label: "true",
          },
        }),
        minScale: 10000,
        maxScale: 0,
      });
      viewElement.map.addMany([layer_1, layer_2]);
      await bookmarksElement.componentOnReady();
      bookmarksElement.bookmarks = [
        new Bookmark({
          name: "Santa Cruz",
          viewpoint: {
            targetGeometry: {
              type: "extent",
              spatialReference: {
                wkid: 102100,
              },
              xmax: -13581772,
              xmin: -13584170,
              ymax: 4436367,
              ymin: 4435053,
            },
          },
        }),
        new Bookmark({
          name: "Santa Barbara",
          viewpoint: {
            targetGeometry: {
              type: "extent",
              spatialReference: {
                wkid: 102100,
              },
              xmax: -13342320,
              xmin: -13344718,
              ymax: 4087066,
              ymin: 4085752,
            },
          },
        }),
        new Bookmark({
          name: "Thousand Oaks",
          viewpoint: {
            targetGeometry: {
              type: "extent",
              spatialReference: {
                wkid: 102100,
              },
              xmax: -13232337,
              xmin: -13234735,
              ymax: 4053869,
              ymin: 4052556,
            },
          },
        }),
      ];
    </script>
  </body>
</html>
