<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Configuring the popup of a VoxelLayer | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <arcgis-scene item-id="1d32064a92074560892999c71257f240">
      <arcgis-zoom slot="top-left"> </arcgis-zoom>
      <arcgis-compass slot="top-left"> </arcgis-compass>
      <arcgis-expand slot="bottom-left">
        <arcgis-legend></arcgis-legend>
      </arcgis-expand>
    </arcgis-scene>

    <script type="module">
      const Popup = await $arcgis.import("@arcgis/core/widgets/Popup.js");

      // Access the Scene component
      const viewElement = document.querySelector("arcgis-scene");

      // Add colors and legends on the pie chart
      const probabilityAttributes = {
        kans_1: { color: [157, 78, 64, 1], title: "Organic material (peat)" },
        kans_2: { color: [0, 146, 0, 1], title: "Clay" },
        kans_3: { color: [194, 207, 92, 1], title: "Clayey sand, sandy clay and loam" },
        kans_5: { color: [255, 255, 0, 1], title: "Fine sand" },
        kans_6: { color: [243, 225, 6, 1], title: "Medium sand" },
        kans_7: { color: [231, 195, 22, 1], title: "Coarse sand" },
        kans_8: { color: [216, 163, 32, 1], title: "Gravel" },
        kans_9: { color: [95, 95, 255, 1], title: "Shells" },
      };

      const probabilityColors = [];
      const probabilityFields = [];
      let probabilityTitle = "";

      for (const att in probabilityAttributes) {
        probabilityColors.push(probabilityAttributes[att].color);
        probabilityFields.push(att);
        probabilityTitle +=
          "<div style='font-size:11px'><span style='width:10px;height:10px;display:inline-block;background-color:rgba(" +
          probabilityAttributes[att].color.toString() +
          ")'></span><span>&nbsp;" +
          probabilityAttributes[att].title +
          "</span></div>";
      }
      // Define the fields (or voxel variables) to be displayed
      const contentFieldInfo = [
        {
          fieldName: "lithok",
          label: "Most likely lithological class",
          visible: true,
        },
        {
          fieldName: "strat",
          label: "Geological unit",
          visible: true,
        },
        {
          fieldName: "expression/voxelDepth",
          label: "Depth",
        },
      ];
      // Create a popupTemplate
      const voxelPopupTemplate = {
        title: "GeoTOP v1.6",
        // Create Arcade expression using the $voxel profile variable
        expressionInfos: [
          {
            name: "voxelDepth",
            title: "Depth",
            expression: 'Text($voxel["Voxel.Depth"], "#.## m")',
          },
        ],
        content: [
          {
            type: "text",
            text: "Current Variable: {Voxel.CurrentVariable}",
          },
          // The fields to be displayed in the popup's content
          {
            type: "fields",
            fieldInfos: contentFieldInfo,
            title: "<span style='font-size:13px;'>Voxel Position {Voxel.Position}:</span>",
          },
          // Adding a pie chart by using the element media
          {
            type: "media",
            title:
              "<div style='margin-bottom:5px'>Probability distribution of lithological class</div>" +
              probabilityTitle,
            mediaInfos: [
              {
                type: "pie-chart",
                value: {
                  fields: probabilityFields, // An array of fields
                  colors: probabilityColors, // An array of colors
                },
                caption:
                  "<div>Click <a href='https://www.dinoloket.nl/en/detailing-the-upper-layers-with-geotop' target='_blank'>here</a> to know more about the GeoTOP model</div>",
              },
            ],
          },
          // Adding a bar chart by using the element media
          {
            type: "media",
            title:
              "<div style='margin-bottom:5px'>Model Uncertainty</div><div style='font-size:11px'><span style='width:10px;height:10px;display:inline-block;background-color:rgb(50, 115, 168)'></span><span>&nbsp;Geological unit</span></div><div style='font-size:11px'><span style='width:10px;height:10px;display:inline-block;background-color:rgb(219, 132, 81)'></span><span>&nbsp;Lithological class</span></div>",
            mediaInfos: [
              {
                type: "bar-chart",
                value: {
                  fields: ["onz_ls", "onz_lk"],
                  colors: [
                    [50, 115, 168, 1],
                    [219, 132, 81, 1],
                  ],
                },
                caption:
                  "<div style='margin-top:-20px;font-size:11px'>0% very certain to 100% very uncertain</div>",
              },
            ],
          },
          {
            type: "text",
            text: "<strong>Data by:</strong> <a href='https://www.dinoloket.nl/en/modelbestanden-aanvragen/netcdf'>TNO - Geological Survey of the Netherlands</a>",
          },
        ],
        // Change the labels of the fields used in the charts
        fieldInfos: [
          {
            fieldName: "onz_ls",
            label: "Geological Unit",
            visible: true,
          },
          {
            fieldName: "onz_lk",
            label: "Lithological class",
            visible: true,
          },
          {
            fieldName: "kans_1",
            label: "Organic material (peat)",
            visible: true,
          },
          {
            fieldName: "kans_2",
            label: "Clay",
            visible: true,
          },
          {
            fieldName: "kans_3",
            label: "Clayey sand, sandy clay and loam",
            visible: true,
          },
          {
            fieldName: "kans_5",
            label: "Fine sand",
            visible: true,
          },
          {
            fieldName: "kans_6",
            label: "Medium sand",
            visible: true,
          },
          {
            fieldName: "kans_7",
            label: "Coarse sand",
            visible: true,
          },
          {
            fieldName: "kans_8",
            label: "Gravel",
            visible: true,
          },
          {
            fieldName: "kans_9",
            label: "Shells",
            visible: true,
          },
        ],
      };

      await viewElement.viewOnReady();
      viewElement.popup = new Popup({
        dockEnabled: true,
        dockOptions: {
          buttonEnabled: true,
          breakpoint: false,
          position: "auto",
        },
        defaultPopupTemplateEnabled: true,
        visibleElements: {
          closeButton: true,
        },
      });
      const voxelLayer = viewElement.map.allLayers.find((layer) => layer.type === "voxel");
      voxelLayer.popupEnabled = true;
      voxelLayer.popupTemplate = voxelPopupTemplate;
    </script>
  </body>
</html>
