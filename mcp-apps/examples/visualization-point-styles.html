<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Point styles for cities | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      #checkboxContainer {
        display: flex;
        flex-wrap: wrap;
        gap: 1em;
        padding-top: 5px;
        font-size: 0.9em;
        align-items: center;
      }
      #checkboxContainer calcite-select {
        width: 160px;
      }
    </style>
  </head>

  <body>
    <arcgis-scene item-id="711ddecedece4fd88b728bfe4322c22b">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"></arcgis-compass>
      <arcgis-legend slot="top-right"></arcgis-legend>
      <calcite-card id="cityStyleCard" slot="bottom-left">
        <div id="checkboxContainer">
          <calcite-label scale="s" layout="inline">
            <calcite-checkbox scale="s" id="callout" checked></calcite-checkbox>
            Set callout lines on icons
          </calcite-label>
          <calcite-label scale="s" layout="inline">
            <calcite-checkbox scale="s" id="declutter" checked></calcite-checkbox>
            Declutter view
          </calcite-label>
          <calcite-label scale="s" layout="inline">
            <calcite-checkbox scale="s" id="perspective" checked></calcite-checkbox>
            Improve icon perspective
          </calcite-label>
          <calcite-label scale="s" layout="inline">
            <calcite-checkbox scale="s" id="relative-to-scene" checked></calcite-checkbox>
            Align icon to building height
          </calcite-label>
          <calcite-label scale="s" layout="inline">
            Occluded visibility
            <calcite-select scale="s" id="occluded-visibility" value="adaptive">
              <calcite-option value="adaptive">adaptive</calcite-option>
              <calcite-option value="visible">visible</calcite-option>
              <calcite-option value="hidden">hidden</calcite-option>
            </calcite-select>
          </calcite-label>
        </div>
      </calcite-card>
    </arcgis-scene>

    <script type="module">
      const [FeatureLayer, UniqueValueRenderer] = await $arcgis.import([
        "@arcgis/core/layers/FeatureLayer.js",
        "@arcgis/core/renderers/UniqueValueRenderer.js",
      ]);

      /*****************************************************************
       * Get a reference to the HTML elements
       *****************************************************************/
      const viewElement = document.querySelector("arcgis-scene");
      const cityStyleCard = document.getElementById("cityStyleCard");

      // verticalOffset shifts the symbol vertically
      const verticalOffset = {
        screenLength: 40,
        maxWorldLength: 200,
        minWorldLength: 35,
      };

      // Wait for the view to initialize
      await viewElement.viewOnReady();

      // Set up the renderer for the points layer
      const pointsRenderer = {
        type: "unique-value", // autocasts as new UniqueValueRenderer()
        field: "Type",
        uniqueValueInfos: [
          {
            value: "Museum",
            symbol: getUniqueValueSymbol(
              "https://developers.arcgis.com/javascript/latest/assets/sample-code/visualization-point-styles/Museum.png",
              "#D13470",
            ),
          },
          {
            value: "Restaurant",
            symbol: getUniqueValueSymbol(
              "https://developers.arcgis.com/javascript/latest/assets/sample-code/visualization-point-styles/Restaurant.png",
              "#F97C5A",
            ),
          },
          {
            value: "Church",
            symbol: getUniqueValueSymbol(
              "https://developers.arcgis.com/javascript/latest/assets/sample-code/visualization-point-styles/Church.png",
              "#884614",
            ),
          },
          {
            value: "Hotel",
            symbol: getUniqueValueSymbol(
              "https://developers.arcgis.com/javascript/latest/assets/sample-code/visualization-point-styles/Hotel.png",
              "#56B2D6",
            ),
          },
          {
            value: "Park",
            symbol: getUniqueValueSymbol("https://developers.arcgis.com/javascript/latest/assets/sample-code/visualization-point-styles/Park.png", "#40C2B4"),
          },
        ],
      };

      // Create the layer with the points of interest.
      // Initially points are aligned to the buildings with relative-to-scene,
      // feature reduction is set to "selection" to avoid overlapping icons.
      // A perspective view is enabled on the layers by default.
      const pointsLayer = new FeatureLayer({
        url: "http://services.arcgis.com/V6ZHFr6zdgNZuVG0/arcgis/rest/services/LyonPointsOfInterest/FeatureServer",
        title: "Touristic attractions",
        elevationInfo: {
          // Elevation mode that will place points on top of the buildings or other SceneLayer 3D objects
          mode: "relative-to-scene",
        },
        renderer: pointsRenderer,
        outFields: ["*"],
        // Feature reduction is set to selection because our scene contains too many points and they overlap
        featureReduction: {
          type: "selection",
        },
        labelingInfo: [
          {
            labelExpressionInfo: {
              value: "{Name}",
            },
            symbol: {
              type: "label-3d", // autocasts as new LabelSymbol3D()
              symbolLayers: [
                {
                  type: "text", // autocasts as new TextSymbol3DLayer()
                  material: {
                    color: "white",
                  },
                  // Set a halo on the font to make the labels more visible with any kind of background
                  halo: {
                    size: 1,
                    color: [50, 50, 50],
                  },
                  size: 10,
                  occludedVisibility: {
                    mode: "adaptive",
                  },
                },
              ],
            },
          },
        ],
      });

      viewElement.map.add(pointsLayer);

      // Add functionality on the controls for selection, perspective, callout lines and relative-to-scene elevation mode
      cityStyleCard.addEventListener("calciteCheckboxChange", (event) => {
        const id = event.target.id;
        if (id === "declutter") {
          const type = {
            type: "selection",
          };
          pointsLayer.featureReduction = event.target.checked ? type : null;
        } else if (id === "perspective") {
          pointsLayer.screenSizePerspectiveEnabled = event.target.checked;
        } else if (id === "callout") {
          const renderer = pointsLayer.renderer.clone();
          renderer.uniqueValueInfos.forEach((valueInfo) => {
            valueInfo.symbol.verticalOffset = event.target.checked ? verticalOffset : null;
          });
          pointsLayer.renderer = renderer;
        } else if (id === "relative-to-scene") {
          const mode = event.target.checked ? "relative-to-scene" : "relative-to-ground";
          pointsLayer.elevationInfo = {
            mode: mode,
          };
        }
      });

      // Add functionality on the occluded visibility control
      cityStyleCard.addEventListener("calciteSelectChange", (event) => {
        const id = event.target.id
        if (id === "occluded-visibility") {
          const mode = event.target.value;

          // Set occluded visibility mode on icons in the renderer
          const renderer = pointsLayer.renderer.clone();
          renderer.uniqueValueInfos.forEach((valueInfo) => {
            valueInfo.symbol.symbolLayers.forEach((iconSymbolLayer) => {
              iconSymbolLayer.occludedVisibility = {
                mode: mode,
              };
            });
          });
          pointsLayer.renderer = renderer;

          // Set occluded visibility mode on labels
          const labelClass = pointsLayer.labelingInfo[0].clone();
          labelClass.symbol.symbolLayers.forEach((textSymbolLayer) => {
            textSymbolLayer.occludedVisibility = {
              mode: mode
            };
          });
          pointsLayer.labelingInfo = [labelClass];
        }
      });

      // Function that automatically creates the symbol for the points of interest
      function getUniqueValueSymbol(name, color) {
        // The point symbol is visualized with an icon symbol. To clearly see the location of the point
        // we displace the icon vertically and add a callout line. The line connects the offseted symbol with the location
        // of the point feature.
        return {
          type: "point-3d", // autocasts as new PointSymbol3D()
          symbolLayers: [
            {
              type: "icon", // autocasts as new IconSymbol3DLayer()
              resource: {
                href: name,
              },
              size: 20,
              outline: {
                color: "white",
                size: 2,
              },
              occludedVisibility: {
                mode: "adaptive",
              },
            },
          ],
          verticalOffset: verticalOffset,
          callout: {
            type: "line", // autocasts as new LineCallout3D()
            color: "white",
            size: 2,
            border: {
              color: color,
            },
          },
        };
      }
    </script>
  </body>
</html>
