<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Multiple popup elements | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <!-- Note: popup-component-enabled enables the Popup component (beta). See https://developers.arcgis.com/javascript/latest/references/map-components/components/arcgis-map/#popupComponentEnabled for details. -->
    <arcgis-map basemap="topo-vector" center="-102.95646, 38.4961" zoom="5" popup-component-enabled>
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-expand slot="top-left">
        <arcgis-legend></arcgis-legend>
      </arcgis-expand>
    </arcgis-map>
    <script type="module">
      const [FeatureLayer, Color] = await $arcgis.import([
        "@arcgis/core/layers/FeatureLayer.js",
        "@arcgis/core/Color.js",
      ]);
      const viewElement = document.querySelector("arcgis-map");
      await viewElement.viewOnReady();

      viewElement.popupElement.dockEnabled = true;
      viewElement.popupElement.dockOptions = {
        buttonEnabled: false,
        breakpoint: false,
      };
      viewElement.constraints = {
        minScale: 30000000,
        maxScale: 2000001,
      };
      const featureLayer = new FeatureLayer({
        portalItem: {
          id: "59b201fc69a24fe69cda4fd47490d553",
        },
        outFields: ["*"],
        // Add field configurations to format fields for display in the popup elements.
        // These configurations will also be honored in all other components.
        fieldConfigurations: [
          {
            name: "B19053_calc_pctSelfempE",
            alias: "Percentage of households with any self employment-income",
            fieldFormat: {
              type: "number",
              minimumFractionDigits: 2,
              maximumFractionDigits: 2,
              useGrouping: "always",
            },
          },
          {
            name: "B19049_001E",
            alias: "Median Household Income",
            fieldFormat: {
              type: "number",
              minimumFractionDigits: 2,
              maximumFractionDigits: 2,
              useGrouping: "always",
            },
          },
          {
            name: "B19049_001M",
            alias: "Median Household Income - Margin of error",
            fieldFormat: {
              type: "number",
              minimumFractionDigits: 2,
              maximumFractionDigits: 2,
              useGrouping: "always",
            },
          },
          {
            name: "B19049_002E",
            alias: "Householder under 25 years",
            fieldFormat: {
              type: "number",
              minimumFractionDigits: 2,
              maximumFractionDigits: 2,
              useGrouping: "always",
            },
          },
          {
            name: "B19049_003E",
            alias: "Householder 25 to 44 years",
            fieldFormat: {
              type: "number",
              useGrouping: "always",
            },
          },
          {
            name: "B19049_004E",
            alias: "Householder 45 to 64 years",
            fieldFormat: {
              type: "number",
              useGrouping: "always",
            },
          },
          {
            name: "B19049_005E",
            alias: "Householder 65 years and over",
            fieldFormat: {
              type: "number",
              useGrouping: "always",
            },
          },
          {
            name: "B19053_002E",
            alias: "Households with any self employment-income",
          },
          {
            name: "B19053_003E",
            alias: "Households with no self employment-income",
          },
        ],
        popupTemplate: {
          // autocasts as new PopupTemplate()
          title: "{NAME} in {State}",
          outFields: ["*"],
          // Set the fieldInfos at the PopupTemplate level so all the
          // popup elements have the desired field formatting.
          fieldInfos: [
            {
              fieldName: "B19049_001E",
              visible: false,
              label: "Median Household Income",
              format: {
                places: 2,
                digitSeparator: true,
              },
            },
            {
              fieldName: "B19049_001M",
              label: "Median Household Income - Margin of error",
              visible: false,
              format: {
                places: 2,
                digitSeparator: true,
              },
            },
            {
              fieldName: "B19049_002E",
              label: "Householder under 25 years",
              visible: false,
              format: {
                digitSeparator: true,
              },
            },
            {
              fieldName: "B19049_003E",
              label: "Householder 25 to 44 years",
              visible: false,
              format: {
                digitSeparator: true,
              },
            },
            {
              fieldName: "B19049_004E",
              label: "Householder 45 to 64 years",
              visible: false,
              format: {
                digitSeparator: true,
              },
            },
            {
              fieldName: "B19049_005E",
              label: "Householder 65 years and over",
              visible: false,
              format: {
                digitSeparator: true,
              },
            },
            {
              fieldName: "B19053_002E",
              label: "Households with any self employment-income",
              visible: false,
            },
            {
              fieldName: "B19053_003E",
              label: "Households with no self employment-income",
              visible: false,
            },
          ],
          // Set content elements in the order to display.
          // The first element displayed is fields.
          content: [
            {
              // Displays a table of fields configured in the fieldInfos.
              type: "fields", // Autocasts to FieldsContent
              fieldInfos: [
                {
                  fieldName: "B19053_calc_pctSelfempE",
                },
                {
                  fieldName: "COUNTYNS",
                },
              ],
            },
            ,
            {
              // A descriptive text element. This element uses an attribute
              // from the feature layer which displays a
              // sentence giving the median household income of the area.
              // Text elements can only be set within the content and HTML formatting is supported.
              type: "text", // Autocasts to TextContent
              text: "The median household income in this area is estimated to be <b>${B19049_001E}</b> (±${B19049_001M}).",
            },
            {
              // A media element. This can be either an image or a chart.
              // You specify these within the mediaInfos. The following creates bar
              // and pie chart along with an image.
              // Similar to text elements, media can only be set within the content.
              type: "media", // Autocasts to MediaContent
              title: "Median income details for {Name}",
              mediaInfos: [
                // Column chart that uses custom chart colors to represent specified fields.
                {
                  title: "<b>Income by householder age</b>",
                  type: "column-chart",
                  caption: "Median household income by householder age.",
                  value: {
                    fields: ["B19049_002E", "B19049_003E", "B19049_004E", "B19049_005E"],
                    // Set the colors array to various shades of green since the chart represents income.
                    colors: [
                      new Color("#598c58"),
                      new Color("#dde8b2"),
                      new Color("#637349"),
                      new Color("#becc97"),
                    ],
                  },
                },
                // Pie chart that uses the default chart colors to represent specified fields.
                {
                  title: "<b>Self employment income</b>",
                  type: "pie-chart",
                  caption: "Households with or without self employment-income.",
                  value: {
                    fields: ["B19053_002E", "B19053_003E"],
                  },
                },
                // Image from the US Census website regarding the national social and economic well-being.
                {
                  type: "image",
                  caption:
                    "Image showing data measuring the nation's social and economic well-being.",
                  value: {
                    sourceURL:
                      "https://www.census.gov/library/visualizations/2023/comm/well-being/_jcr_content/root/responsivegrid/embeddableimage.coreimg.jpeg/1694484822013/measuring-social-economic-well-being.jpeg",
                  },
                },
              ],
            },
          ],
        },
      });
      viewElement.map.add(featureLayer);
    </script>
  </body>
</html>
