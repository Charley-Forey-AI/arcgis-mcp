<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Line markers and label placement | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      #titleDiv {
        padding: 10px;
        font-size: 20pt;
        font-family: "IM FELL DW Pica PRO";
        font-style: italic;
        text-align: right;
      }
    </style>
  </head>

  <body>
    <arcgis-scene item-id="ff7aaf017b604b02ae7b39a4b72bf3fa" alpha-compositing-enabled>
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"></arcgis-compass>
      <div id="titleDiv" slot="top-right" hidden>
        Bellingshausen Antarctic Expedition<br />1819 - 1921
      </div>
    </arcgis-scene>
    <script type="module">
      /*****************************************************************
       * Get a reference to the HTML elements
       *****************************************************************/
      const viewElement = document.querySelector("arcgis-scene");
      const titleElement = document.getElementById("titleDiv");

      // Wait for the view to initialize
      await viewElement.viewOnReady();
      titleElement.hidden = false;

      // Set the constraints and lighting to virtual
      viewElement.constraints = {
        altitude: {
          min: 9000000,
          max: 25000000,
        },
      };

      viewElement.environment = {
        lighting: {
          type: "virtual", // Virtual lighting provides a nicely lit globe without shadows
        },
        // Remove realistic elements for the thematic visualization
        atmosphereEnabled: false,
        starsEnabled: false,
        background: {
          type: "color",
          color: [237, 233, 219, 1],
        },
      };

      /***********************************
       * Set the line patterns and markers
       ***********************************/
      // Get the two layers we want to change
      const paths = viewElement.map.allLayers.find(
        (layer) => layer.title === "Bellinghausen Exp Path",
      );
      const labels = viewElement.map.allLayers.find(
        (layer) => layer.title === "Bellinghausen Exp Labels",
      );

      paths.renderer = {
        type: "simple", // autocasts as new SimpleRenderer()
        symbol: {
          type: "line-3d", // autocasts as new LineSymbol3D()

          // Add two symbolizations on top of each other
          symbolLayers: [
            {
              //1.  White background line, transparent
              type: "line", // autocasts as new LineSymbol3DLayer()
              material: {
                color: [255, 255, 255, 0.3],
              },
              size: "8px",
            },
            {
              // 2. Dashed line with arrows as markers
              type: "line", // autocasts as new LineSymbol3DLayer()
              material: {
                color: [121, 72, 0],
              },
              size: "3px",
              pattern: {
                type: "style", // autocasts as new LineStylePattern3D()
                style: "long-dash",
              },
              marker: {
                type: "style", // autocasts as new LineStyleMarker3D()
                style: "arrow",
                placement: "end",
              },
            },
          ],
        },
      };

      /***********************************
       * Define the label style
       ***********************************/

      // Define the text for the labels. Combine name of the location with the arrival date in a nice format
      var labelExpression = `
      var months = [
        "January","February","March","April","May","June","July", "August","September","October","November","December"
      ];
      var arrival = Date($feature['Start_Date']);
      var label = $feature.Location_Name + TextFormatting.NewLine + months[Month(arrival)] + " " + Day(arrival) + ", " + Year(arrival);

      return label;`;

      // Define the label symbol: color, font, size, background
      const labelSymbol = {
        type: "label-3d", // autocasts as new LabelSymbol3D()
        symbolLayers: {
          type: "text", // autocasts as new TextSymbol3DLayer()
          material: { color: "black" },
          size: 16, // Defined in points
          background: {
            color: [236, 232, 221, 0.7],
          },
          font: {
            family: "IM FELL DW Pica PRO",
            style: "italic",
            weight: "normal",
          },
        },
      };

      // Define the label: content and placement
      // Note: You can define several labelingInfos and apply it to different features with a definitionExpression on the where property
      labels.labelingInfo = [
        {
          // autocasts as new LabelClass()
          symbol: labelSymbol,
          labelExpressionInfo: {
            expression: labelExpression,
          },
          labelPlacement: "above-right",
          where: "Location_Name = 'Discovery of Antarctic'", // Change the placement of this one label to the right side, so it is better visible
        },
        {
          // autocasts as new LabelClass()
          symbol: labelSymbol,
          labelExpressionInfo: {
            expression: labelExpression,
          },
          labelPlacement: "above-left", // All other labels should be on the left side
        },
      ];
      labels.labelsVisible = true;
    </script>
  </body>
</html>
