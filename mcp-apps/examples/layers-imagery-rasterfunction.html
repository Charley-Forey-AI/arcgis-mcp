<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>ImageryLayer - raster function | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-map basemap="gray-vector" zoom="8" center="-84.1522, 35.793">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
    </arcgis-map>

    <script type="module">
      const ImageryLayer = await $arcgis.import("@arcgis/core/layers/ImageryLayer.js");

      const url =
        "https://sampleserver6.arcgisonline.com/arcgis/rest/services/NLCDLandCover2001/ImageServer";

      const viewElement = document.querySelector("arcgis-map");
      await viewElement.componentOnReady(); // Wait for property methods to be ready.
      // Define a Remap raster function to reclassify pixel values.
      const remapRasterFunction = {
        functionName: "Remap",
        // Separate forested and unforested areas.
        functionArguments: {
          // Define the pixel value ranges to remap: 0-40, 41-43, and 44-255.
          inputRanges: [0, 41, 41, 44, 44, 255],
          // Remap forest pixels (41-43) to 2 and non-forest pixels to 1.
          outputValues: [1, 2, 1],
          // Reference the entire image service, this is the default.
          raster: "$$", // $2 would refer to the second image of the service.
        },
      };

      // Define a Colormap raster function to color each pixel based on its value.
      const rasterFunction = {
        functionName: "Colormap",
        functionArguments: {
          colormap: [
            // Assign rgb(253, 254, 152) to pixels with a value of 1.
            [1, 253, 254, 152], // Unforested areas get a yellow color.
            // Assign rgb(2, 102, 6) to pixels with a value of 2.
            [2, 2, 102, 6], // Forested areas get a green color.
          ],
          raster: remapRasterFunction, // Chain the Remap raster function here.
        },
        outputPixelType: "u8", // Store output values as 0-255 integers.
      };

      // Specify how images overlap in the mosaic. Autocasts as MosaicRule.
      const mosaicRule = { ascending: true, method: "center", operation: "last" };

      // Initialize the layer with the last autocast RasterFunction in the chain.
      const layer = new ImageryLayer({ mosaicRule, rasterFunction, url });
      viewElement.map.add(layer);
    </script>
  </body>
</html>
