<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Data-driven extrusion | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-scene
      basemap="gray-vector"
      camera-position="-88.72943, 18.24237, 1534560"
      camera-tilt="45"
      camera-heading="10">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"></arcgis-compass>
      <arcgis-legend slot="bottom-right"></arcgis-legend>
    </arcgis-scene>
    <script type="module">
      const [FeatureLayer] = await $arcgis.import(["@arcgis/core/layers/FeatureLayer.js"]);

      // limit visualization to southeast U.S. counties
      const defExp = [
        "STATE = 'LA'",
        "STATE = 'AL'",
        "STATE = 'AR'",
        "STATE = 'MS'",
        "STATE = 'TN'",
        "STATE = 'GA'",
        "STATE = 'FL'",
        "STATE = 'SC'",
        "STATE = 'NC'",
        "STATE = 'VA'",
        "STATE = 'KY'",
        "STATE = 'WV'",
      ];

      /*****************************************************************
       * In this case we set two visual variables on the renderer. Since
       * we're defining both size and color based on data values, there's
       * no need to specify defaults in the `symbol` property of the
       * renderer. In 3D it is easier to visually perceive size differences
       * when they are combined with color. Therefore we set up both a
       * size and a color visual variable based on the values of the same
       * field.
       *
       * Notice that the data value ramps for each is slightly different.
       * Color allows us to see the spatial trend in a tight range, whereas
       * size can be used to observe nuances between features of the same
       * color.
       *****************************************************************/

      const renderer = {
        type: "simple", // autocasts as new SimpleRenderer()
        symbol: {
          type: "polygon-3d", // autocasts as new PolygonSymbol3D()
          symbolLayers: [
            {
              type: "extrude", // autocasts as new ExtrudeSymbol3DLayer()
            },
          ],
        },
        visualVariables: [
          {
            type: "size",
            field: "POP_POVERTY",
            stops: [
              {
                value: 1000,
                size: 10000,
                label: "1,000",
              },
              {
                value: 150000,
                size: 300000,
                label: ">150,000",
              },
            ],
          },
          {
            type: "color",
            field: "POP_POVERTY",
            normalizationField: "TOTPOP_CY",
            legendOptions: {
              title: "% population with income below poverty level",
            },
            stops: [
              {
                value: 0.1,
                color: "#FFFCD4",
                label: "<15%",
              },
              {
                value: 0.35,
                color: [153, 83, 41],
                label: ">35%",
              },
            ],
          },
        ],
      };

      const povLayer = new FeatureLayer({
        url: "https://services.arcgis.com/V6ZHFr6zdgNZuVG0/arcgis/rest/services/counties_politics_poverty/FeatureServer/0",
        renderer: renderer,
        title: "Population living in poverty by county",
        outFields: ["*"],
        popupTemplate: {
          // autocasts as new PopupTemplate()
          title: "{COUNTY}, {STATE}",
          content: "{POP_POVERTY} of {TOTPOP_CY} people live below the poverty line.",
          fieldInfos: [
            {
              fieldName: "POP_POVERTY",
              format: {
                digitSeparator: true,
                places: 0,
              },
            },
            {
              fieldName: "TOTPOP_CY",
              format: {
                digitSeparator: true,
                places: 0,
              },
            },
          ],
        },
        definitionExpression: defExp.join(" OR "), // only display counties from states in defExp
      });

      // Get a reference to the Scene component
      const viewElement = document.querySelector("arcgis-scene");
      // When the viewe is ready, add the FeatureLayer instance to the scene
      await viewElement.viewOnReady();
      viewElement.map.layers.add(povLayer);
    </script>
  </body>
</html>
