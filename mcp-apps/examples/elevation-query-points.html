<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Query Elevation (points) | Sample | ArcGIS Maps SDK for JavaScript</title>
    <style>
      html,
      body,
      arcgis-scene {
        margin: 0;
        height: 100%;
        cursor: crosshair;
      }

      calcite-card {
        max-width: 320px;
        cursor: default;
      }

      calcite-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
    </style>

    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css" />

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <script type="module">
      // Import necessary modules from the ArcGIS Maps SDK for JavaScript
      const [Map, Graphic, Polyline, ElevationLayer, promiseUtils] = await $arcgis.import([
        "esri/Map",
        "esri/Graphic",
        "esri/geometry/Polyline",
        "esri/layers/ElevationLayer",
        "esri/core/promiseUtils",
      ]);

      const beforeLandslideLayer = new ElevationLayer({
        url: "https://sampleserver6.arcgisonline.com/arcgis/rest/services/OsoLandslide/OsoLandslide_Before_3DTerrain/ImageServer/",
      });
      const afterLandslideLayer = new ElevationLayer({
        url: "https://sampleserver6.arcgisonline.com/arcgis/rest/services/OsoLandslide/OsoLandslide_After_3DTerrain/ImageServer/",
      });

      const map = new Map({
        basemap: "satellite",
        ground: {
          layers: [beforeLandslideLayer, afterLandslideLayer],
        },
      });

      /*****************************************************************
       * Scene setup
       *****************************************************************/

      const viewElement = document.querySelector("arcgis-scene");
      viewElement.map = map;
      viewElement.camera = {
        heading: 332.8,
        tilt: 65.5,
        position: {
          x: -13563643,
          y: 6153016,
          z: 577,
          spatialReference: { wkid: 102100 },
        },
      };

      await viewElement.viewOnReady();

      /*****************************************************************
       * Symbology setup
       *****************************************************************/

      const textSymbol = {
        type: "point-3d",
        verticalOffset: { screenLength: 10 },
        symbolLayers: [
          {
            type: "text",
            material: { color: "black" },
            size: 12,
            background: { color: [255, 255, 255, 0.75] },
            verticalAlignment: "bottom",
          },
        ],
      };

      const lineSymbol = {
        type: "line-3d",
        symbolLayers: [
          {
            type: "line",
            material: { color: [150, 26, 15] },
            size: 2,
            marker: { type: "style", style: "arrow", placement: "end" },
          },
          {
            type: "line",
            material: { color: "green" },
            size: 2,
            marker: { type: "style", style: "circle", placement: "begin" },
          },
        ],
      };

      const landslideSwitch = document.getElementById("elevAfterSwitch");

      // Toggle layer visibility
      landslideSwitch.addEventListener("calciteSwitchChange", (event) => {
        afterLandslideLayer.visible = event.target.checked;
      });

      // Click interaction
      viewElement.addEventListener("arcgisViewClick", (event) => {
        if (!event.detail.mapPoint) {
          return;
        }
        const position = event.detail.mapPoint;

        const queryBefore = beforeLandslideLayer.queryElevation(position);
        const queryAfter = afterLandslideLayer.queryElevation(position);

        promiseUtils
          .eachAlways([queryBefore, queryAfter])
          .then((results) => {
            const posBefore = results[0].value.geometry;
            const posAfter = results[1].value.geometry;

            viewElement.graphics.removeAll();

            // Update Text
            const diff = (posAfter.z - posBefore.z).toFixed(2);
            textSymbol.symbolLayers[0].text = diff + " m";

            // Add Point Graphic
            viewElement.graphics.add(
              new Graphic({
                geometry: posBefore.z > posAfter.z ? posBefore : posAfter,
                symbol: textSymbol,
              }),
            );

            // Add Line Graphic
            const lineGeometry = new Polyline({
              spatialReference: posBefore.spatialReference,
              hasZ: true,
              paths: [
                [
                  [posBefore.x, posBefore.y, posBefore.z],
                  [posAfter.x, posAfter.y, posAfter.z],
                ],
              ],
            });

            viewElement.graphics.add(
              new Graphic({
                geometry: lineGeometry,
                symbol: lineSymbol,
              }),
            );
          })
          .catch((error) => {
            console.error("Query failed: ", error);
          });
      });
    </script>
  </head>

  <body>
    <arcgis-scene>
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"></arcgis-compass>
      <calcite-card slot="bottom-right">
        <calcite-label layout="inline">
          <calcite-icon icon="information" text-label="information"></calcite-icon>
          Click the map to compare elevations before and after the landslide.
        </calcite-label>
        <calcite-label layout="inline">
          <calcite-switch id="elevAfterSwitch" checked></calcite-switch>
          Show surface after landslide
        </calcite-label>
      </calcite-card>
    </arcgis-scene>
  </body>
</html>
