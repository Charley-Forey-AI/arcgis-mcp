<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>FeatureLayerView - query statistics by geometry | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the Chart.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.4.0/Chart.min.js"></script>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      #chartPanel {
        background: #fff;
        font: "Avenir Next W00";
        line-height: 1.5em;
        overflow: auto;
        padding: 10px;
        width: 580px;
        height: 300px;
      }

      .chart {
        height: 280px;
      }
    </style>
  </head>

  <body>
    <arcgis-map zoom="11" center="-122.083, 37.3069">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-search slot="top-right"></arcgis-search>
      <arcgis-expand slot="bottom-right" mode="floating">
        <arcgis-legend></arcgis-legend>
      </arcgis-expand>
      <div id="chartPanel" slot="bottom-left" class="esri-content">
        <canvas id="chart" class="chart"></canvas>
      </div>
    </arcgis-map>

    <script type="module">
      const [
        SketchViewModel,
        Polyline,
        Point,
        Graphic,
        Map,
        FeatureLayer,
        GraphicsLayer,
        geodeticLengthOperator,
        geodesicBufferOperator,
        reactiveUtils,
        promiseUtils,
      ] = await $arcgis.import([
        "@arcgis/core/widgets/Sketch/SketchViewModel.js",
        "@arcgis/core/geometry/Polyline.js",
        "@arcgis/core/geometry/Point.js",
        "@arcgis/core/Graphic.js",
        "@arcgis/core/Map.js",
        "@arcgis/core/layers/FeatureLayer.js",
        "@arcgis/core/layers/GraphicsLayer.js",
        "@arcgis/core/geometry/operators/geodeticLengthOperator.js",
        "@arcgis/core/geometry/operators/geodesicBufferOperator.js",
        "@arcgis/core/core/reactiveUtils.js",
        "@arcgis/core/core/promiseUtils.js",
      ]);

      let centerGraphic,
        edgeGraphic,
        polylineGraphic,
        bufferGraphic,
        labelGraphic,
        centerGeometryAtStart;
      let count = 0;
      const unit = { unit: "kilometers" };

      const graphicsLayer = new GraphicsLayer();
      const bufferLayer = new GraphicsLayer({ blendMode: "color-burn" });

      const featureLayer = new FeatureLayer({
        portalItem: { id: "83c37666a059480bb8a7cb73f449ff52" },
        outFields: ["*"],
      });

      const viewElement = document.querySelector("arcgis-map");
      viewElement.map = new Map({
        basemap: "dark-gray-vector",
        layers: [featureLayer, bufferLayer, graphicsLayer],
      });
      viewElement.constraints = { maxScale: 0, minScale: 300000 };
      viewElement.popup = {
        alignment: "top-left",
        viewModel: { includeDefaultActions: false },
      };
      await viewElement.viewOnReady();

      const featureLayerView = await viewElement.whenLayerView(featureLayer);

      const statDefinitions = createStatDefinitions();

      setUpApp();

      // Debounce the onMove event to avoid querying the layer too frequently
      const debounceOnMove = promiseUtils.debounce(async (vertices) => {
        const buffer = await calculateBuffer(vertices);
        const newData = await queryLayerViewAgeStats(buffer);
        updateChart(newData);
      });

      // sketchViewModel to update the buffer graphic to resize the buffer
      const sketchViewModel = new SketchViewModel({
        view: viewElement.view,
        layer: graphicsLayer,
      });

      sketchViewModel.on("update", (event) => {
        handleSketchUpdate(event, debounceOnMove);
      });

      // Update the buffer graphic when user drags the center or edge point
      // called from the drawBufferPolygon function to calculate the buffer
      async function calculateBuffer(vertices) {
        polylineGraphic.geometry = new Polyline({
          paths: vertices,
          spatialReference: viewElement.spatialReference,
        });

        const length = await geodeticLengthOperator.execute(polylineGraphic.geometry, unit);
        const buffer = await geodesicBufferOperator.execute(centerGraphic.geometry, length, unit);

        bufferGraphic.geometry = buffer;
        labelGraphic.geometry = edgeGraphic.geometry;
        labelGraphic.symbol = createLabelSymbol(length);

        return buffer;
      }

      // Query the layer view to get the age statistics as user moves or resizes the buffer
      async function queryLayerViewAgeStats(buffer) {
        const query = featureLayerView.layer.createQuery();
        query.outStatistics = statDefinitions;
        query.geometry = buffer;

        const results = await featureLayerView.queryFeatures(query);
        const attributes = results.features[0].attributes;

        const femaleAgeData = [];
        const maleAgeData = [];

        for (let key in attributes) {
          if (key.includes("FEM")) {
            femaleAgeData.push(attributes[key]);
          } else {
            maleAgeData.push(-Math.abs(attributes[key]));
          }
        }

        return [femaleAgeData, maleAgeData];
      }

      // Draw the updated buffer polygon when user moves or resizes the buffer
      // This function is called whenever the layer view data updates
      async function drawBufferPolygon() {
        const viewCenter = viewElement.center.clone();
        const centerScreenPoint = viewElement.toScreen(viewCenter);

        const centerPoint = viewElement.toMap({
          x: centerScreenPoint.x + 120,
          y: centerScreenPoint.y - 120,
        });

        const edgePoint = viewElement.toMap({
          x: centerScreenPoint.x + 240,
          y: centerScreenPoint.y - 120,
        });

        const vertices = [
          [centerPoint.x, centerPoint.y],
          [edgePoint.x, edgePoint.y],
        ];

        if (!centerGraphic) {
          const polyline = new Polyline({
            paths: vertices,
            spatialReference: viewElement.spatialReference,
          });

          const length = await geodeticLengthOperator.execute(polyline, unit);
          const buffer = await geodesicBufferOperator.execute(centerPoint, length, unit);

          centerGraphic = createGraphic(centerPoint, createPointSymbol(), { center: "center" });
          edgeGraphic = createGraphic(edgePoint, createPointSymbol(), { edge: "edge" });
          polylineGraphic = createGraphic(polyline, createLineSymbol(), null);
          bufferGraphic = createGraphic(buffer, createBufferSymbol(), null);
          labelGraphic = createLabelGraphic(edgePoint, length);

          graphicsLayer.addMany([centerGraphic, edgeGraphic, polylineGraphic]);
          viewElement.graphics.add(labelGraphic);
          sketchViewModel.update([edgeGraphic, centerGraphic], { tool: "move" });
          bufferLayer.addMany([bufferGraphic]);
        } else {
          centerGraphic.geometry = centerPoint;
          edgeGraphic.geometry = edgePoint;

          const buffer = await calculateBuffer(vertices);
          const newData = await queryLayerViewAgeStats(buffer);
          updateChart(newData);
        }
      }

      // Create the statistics definitions for the query for each age group
      function createStatDefinitions() {
        const statDefinitions = [];
        for (let age = 85; age >= 0; age -= 5) {
          statDefinitions.push(createAgeGroupStats("FEM", age));
        }
        for (let age = 85; age >= 0; age -= 5) {
          statDefinitions.push(createAgeGroupStats("MALE", age));
        }
        return statDefinitions;
      }

      // called from createStatDefinitions to create the statistics definition for each age group
      function createAgeGroupStats(gender, age) {
        return {
          statisticType: "sum",
          onStatisticField: `${gender}${age}C10`,
          outStatisticFieldName: `${gender}_TOTAL${age}`,
        };
      }

      // called when app is initialized. It sets up the app with the search, legend, and the initial buffer
      async function setUpApp() {
        await geodeticLengthOperator.load();
        await geodesicBufferOperator.load();

        await reactiveUtils.whenOnce(() => !featureLayerView.updating);
        await drawBufferPolygon();

        viewElement.openPopup({
          title: "Center point",
          content:
            "Drag this point to move the buffer.<br/> Or drag the <b>Edge</b> point to resize the buffer.",
          location: centerGraphic.geometry,
          viewModel: { includeDefaultActions: false },
        });

        reactiveUtils.when(
          () => !featureLayerView.dataUpdating,
          async () => {
            await drawBufferPolygon();
          },
        );

        setTimeout(() => {
          viewElement.closePopup();
        }, 5000);
      }

      function createGraphic(geometry, symbol, attributes) {
        return new Graphic({ geometry, symbol, attributes });
      }

      function createPointSymbol() {
        return {
          type: "simple-marker",
          style: "circle",
          size: 10,
          color: [0, 255, 255, 0.5],
        };
      }

      function createLineSymbol() {
        return {
          type: "simple-line",
          color: [254, 254, 254, 1],
          width: 2.5,
        };
      }

      function createBufferSymbol() {
        return {
          type: "simple-fill",
          color: [150, 150, 150],
          outline: {
            color: "#FFEB00",
            width: "3px",
          },
        };
      }

      function createLabelSymbol(length) {
        return {
          type: "text",
          color: "#FFEB00",
          text: length.toFixed(2) + " kilometers",
          xoffset: 50,
          yoffset: 10,
          font: {
            size: 14,
            family: "sans-serif",
          },
        };
      }

      function createLabelGraphic(geometry, length) {
        return new Graphic({
          geometry,
          symbol: createLabelSymbol(length),
        });
      }

      function handleSketchUpdate(event, debounceOnMove) {
        if (event.toolEventInfo && event.toolEventInfo.mover.attributes.edge) {
          const toolType = event.toolEventInfo.type;
          if (toolType === "move-start") {
            centerGeometryAtStart = centerGraphic.geometry;
          } else {
            centerGraphic.geometry = centerGeometryAtStart;
          }
        }

        const vertices = [
          [centerGraphic.geometry.x, centerGraphic.geometry.y],
          [edgeGraphic.geometry.x, edgeGraphic.geometry.y],
        ];

        debounceOnMove(vertices).catch((error) => {
          if (!promiseUtils.isAbortError(error)) {
            throw error;
          }
        });

        if (event.state == "complete") {
          sketchViewModel.update([edgeGraphic, centerGraphic], { tool: "move" });
        }
      }

      let chart;

      function updateChart(newData) {
        const [femaleAgeData, maleAgeData] = newData;

        if (!chart) {
          const canvasElement = document.getElementById("chart");
          chart = new Chart(canvasElement.getContext("2d"), {
            type: "horizontalBar",
            data: {
              labels: [
                "85+",
                "80-84",
                "75-79",
                "70-74",
                "65-69",
                "60-64",
                "55-59",
                "50-54",
                "45-49",
                "40-44",
                "35-39",
                "30-34",
                "25-29",
                "20-24",
                "15-19",
                "10-14",
                "5-9",
                "0-4",
              ],
              datasets: [
                {
                  label: "Female",
                  backgroundColor: "#B266FF",
                  borderColor: "#7F00FF",
                  borderWidth: 0.25,
                  data: femaleAgeData,
                },
                {
                  label: "Male",
                  backgroundColor: "#0080FF",
                  borderColor: "#004C99",
                  borderWidth: 0.25,
                  data: maleAgeData,
                },
              ],
            },
            options: {
              responsive: false,
              legend: { position: "bottom" },
              title: { display: true, text: "Population pyramid" },
              scales: {
                yAxes: [
                  {
                    barThickness: 10,
                    stacked: true,
                    scaleLabel: { display: true, labelString: "Age group" },
                  },
                ],
                xAxes: [
                  {
                    ticks: {
                      callback: (value) => numberWithCommas(Math.abs(parseInt(value))),
                    },
                    scaleLabel: { display: true, labelString: "Population" },
                  },
                ],
              },
              tooltips: {
                callbacks: {
                  label: (tooltipItem, data) => {
                    return `${data.datasets[tooltipItem.datasetIndex].label}: ${numberWithCommas(Math.abs(tooltipItem.xLabel))}`;
                  },
                },
              },
            },
          });
        } else {
          chart.data.datasets[0].data = femaleAgeData;
          chart.data.datasets[1].data = maleAgeData;
          chart.update();
        }
      }

      function numberWithCommas(value) {
        return (value || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }
    </script>
  </body>
</html>
