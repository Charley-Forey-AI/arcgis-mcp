<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>OpenStreetMapLayer | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-scene ground="world-elevation">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"></arcgis-compass>
    </arcgis-scene>

    <script type="module">
      const OpenStreetMapLayer = await $arcgis.import("@arcgis/core/layers/OpenStreetMapLayer.js");

      // Get the reference to the Scene component
      const viewElement = document.querySelector("arcgis-scene");
      await viewElement.viewOnReady();

      // create and add OpenStreetMap layer
      const osmLayer = new OpenStreetMapLayer();
      viewElement.map.add(osmLayer);
    </script>
  </body>
</html>
