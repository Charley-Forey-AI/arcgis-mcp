<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Filter BuildingSceneLayer with Building Explorer | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <arcgis-scene item-id="f477c289e93347aba6a0c052bfe0e0a4">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"> </arcgis-compass>
      <arcgis-building-explorer slot="top-right"></arcgis-building-explorer>
    </arcgis-scene>
    <script type="module">
      /*****************************************************************
       * Get a reference to the Scene component
       *****************************************************************/
      const viewElement = document.querySelector("arcgis-scene");
      await viewElement.viewOnReady();

      viewElement.map.allLayers.forEach((layer) => {
        if (layer.title === "Esri Building E Demo") {
          // Explore building elements in the BuildingSceneLayer using the Building Explorer
          const buildingExplorer = document.querySelector("arcgis-building-explorer");
          buildingExplorer.layers = [layer];
        }
      });
    </script>
  </body>
</html>
