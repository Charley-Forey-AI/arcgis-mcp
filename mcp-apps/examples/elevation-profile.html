<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Elevation Profile component | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      arcgis-elevation-profile {
        width: 350px;
      }
    </style>
  </head>

  <body>
    <arcgis-scene
      item-id="9a542f6755274436985617a462ffdf44"
      camera-position="-74.006438, 40.6934417, 686"
      camera-tilt="66"
      camera-heading="353">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"></arcgis-compass>
      <arcgis-elevation-profile slot="top-right"></arcgis-elevation-profile>
    </arcgis-scene>

    <script type="module">
      // Get a reference to the scene and elevation profile components
      const viewElement = document.querySelector("arcgis-scene");
      const arcgisElevationProfile = document.querySelector("arcgis-elevation-profile");

      // Wait for the view to initialize
      await viewElement.viewOnReady();

      // Setup the elevation profiles
      arcgisElevationProfile.profiles = [
        {
          type: "ground", // first profile line samples the ground elevation
        },
        {
          type: "scene", // second profile samples the scene and shows building profiles
        },
      ];
    </script>
  </body>
</html>
