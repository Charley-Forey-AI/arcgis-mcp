<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <title>TableList component | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100vh;
      }

      arcgis-map {
        flex: 1;
      }

      arcgis-feature-table {
        flex: 0.5;
      }
    </style>
  </head>
  <body>
    <calcite-shell>
      <arcgis-map item-id="62f9d6aabd024931a940c5f00d74d0ac">
        <arcgis-zoom slot="top-left"></arcgis-zoom>
        <arcgis-legend slot="bottom-left"></arcgis-legend>
        <arcgis-table-list
          slot="top-right"
          selection-mode="single"
          show-heading></arcgis-table-list>
      </arcgis-map>
      <arcgis-feature-table></arcgis-feature-table>
    </calcite-shell>
    <script type="module">
      const [reactiveUtils, Layer, PortalItem] = await $arcgis.import([
        "@arcgis/core/core/reactiveUtils.js",
        "@arcgis/core/layers/Layer.js",
        "@arcgis/core/portal/PortalItem.js",
      ]);

      // Get references to the feature table, map, and table list components
      const arcgisFeatureTable = document.querySelector("arcgis-feature-table");
      const viewElement = document.querySelector("arcgis-map");
      const arcgisTableList = document.querySelector("arcgis-table-list");

      // Wait for the map to be ready before adding the table
      await viewElement.viewOnReady();
      addTable("6aa49be79248400ebd28f1d0c6af3f9f");

      // Wait for the table list to be ready before
      // setting up the watch on the selected item
      await arcgisTableList.componentOnReady();
      handleTableListReady();

      // A function to watch for changes to the table list selection.
      // When the selection changes update the feature table's layer property
      function handleTableListReady() {
        reactiveUtils.watch(
          // If the arcgisFeatureTable exists, and there is a selected item in the table list,
          // watch the layer of the selected list item otherwise don't watch anything
          () => (arcgisFeatureTable ? arcgisTableList.selectedItems.at(0)?.layer : null),
          async (layer) => {
            // If the layer is not null, load the layer
            if (!layer) {
              return;
            }
            await layer.load();
            // If the layer is the same as the currently selected item's layer,
            // set the layer property of the feature table to the selected item's layer
            if (layer === arcgisTableList.selectedItems.at(0)?.layer) {
              arcgisFeatureTable.layer = layer;
            }
          },
        );
      }
      // A function to add a table to the map and feature table
      // from a portal item id
      async function addTable(id) {
        const table = await Layer.fromPortalItem({
          portalItem: new PortalItem({
            id,
          }),
        });
        // Wait for the table to load
        await table.load();

        // If the table is a table,
        // set the title and add it to the map and feature table
        if (table.isTable) {
          table.title = "Table from portal item";
          viewElement.map.tables.add(table);
          arcgisFeatureTable.layer = table;
        }
      }
    </script>
  </body>
</html>
