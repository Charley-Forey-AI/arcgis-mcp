<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Edit FeatureLayer with subtypes | Sample | ArcGIS Maps SDK for JavaScript</title>

    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css" />
    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body,
      #viewDiv {
        height: 100%;
        margin: 0;
      }
    </style>

    <script type="module">
      const [WebMap, MapView, Editor, Legend] = await $arcgis.import([
        "@arcgis/core/WebMap.js",
        "@arcgis/core/views/MapView.js",
        "@arcgis/core/widgets/Editor.js",
        "@arcgis/core/widgets/Legend.js",
      ]);

      // Initialize the WebMap containing a FeatureLayer with subtypes
      // Note: This FeatureLayer only supports attribute editing
      const webmap = new WebMap({
        portalItem: {
          id: "4cac00143ef345f09b7fc7553c7a2ca8",
        },
      });

      const view = new MapView({
        container: "viewDiv",
        map: webmap,
      });

      const editor = new Editor({
        view: view,
      });

      const legend = new Legend({
        view: view,
      });

      // Add the widgets to the view
      view.ui.add(editor, "top-right");
      view.ui.add(legend, "bottom-left");
    </script>
  </head>

  <body>
    <div id="viewDiv"></div>
  </body>
</html>
