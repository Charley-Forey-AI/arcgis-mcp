<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>3D icon rotation | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      .esri-view-surface:after {
        outline: 0 !important;
      }

      #data-notice {
        margin-right: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-scene item-id="8244d9e565db4e448b19fb7d82e52315">
      <arcgis-zoom slot="top-left"> </arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"> </arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"> </arcgis-compass>
      <arcgis-expand slot="bottom-left">
        <arcgis-legend></arcgis-legend>
      </arcgis-expand>
      <arcgis-expand slot="top-right" expand-tooltip="Info about data" expand-icon="information">
        <calcite-notice id="data-notice" open icon="information" kind="info" scale="s">
          <div slot="title">NOTE</div>
          <div slot="message">
            The displayed data are for illustrative purposes only and do not represent actual
            information.
          </div>
        </calcite-notice>
      </arcgis-expand>
    </arcgis-scene>

    <script type="module">
      const FeatureLayer = await $arcgis.import("@arcgis/core/layers/FeatureLayer.js");

      /**********************************************
       * Constants
       *********************************************/
      const arrowSourcePNG =
        "https://jsapi.maps.arcgis.com/sharing/rest/content/items/0e6d7969d8b248f6aadb58affc75020e/data";

      /**********************************************
       * Environment
       *********************************************/
      // Access Scene component
      const viewElement = document.querySelector("arcgis-scene");
      // Listen for when the view first loads
      await viewElement.viewOnReady();
      // Create a PointSymbol3D with an IconSymbol3DLayer referencing a left pointing arrow image
      const arrowTrendSymbol = {
        type: "point-3d", // autocasts as new PointSymbol3D()
        symbolLayers: [
          {
            type: "icon", // autocasts as new IconSymbol3DLayer()
            size: "30", // points
            resource: {
              href: arrowSourcePNG,
            },
            material: {
              color: "white",
            },
            angle: 90, // initial clockwise angle in degrees to make the arrow point upwards
          },
        ],
        verticalOffset: {
          // verticalOffset shifts the symbol vertically
          screenLength: 3,
          maxWorldLength: 18,
          minWorldLength: 3,
        },
        callout: {
          type: "line", // autocasts as new LineCallout3D()
          color: "white",
          size: 1,
        },
      };

      // Use Esri color ramp "Red and Green 11" from
      // https://developers.arcgis.com/javascript/latest/visualization/symbols-color-ramps/esri-color-ramps/
      const colors = ["#00ffaaff", "#17a67dff", "#403c35ff", "#b02626ff", "#ff0000ff"];

      // Create the renderer using the PointSymbol3D defined above
      const arrowTrendRenderer = {
        type: "simple", // autocasts as new SimpleRenderer()
        symbol: arrowTrendSymbol,
        visualVariables: [
          // Use RotationVariable to make all the arrows rotated according to the trend values
          {
            type: "rotation", // autocasts as new RotationVariable()
            field: "Property_Value_Diff_Percent", // this attribute represents the positive or negative trend in percentage and it can be associated to a degree of rotation
            rotationType: "arithmetic", // to make the rotation counter clockwise. It also adds 90 degrees to the icon's initial rotation, positioning it to face right
          },
          // Use ColorVariable to color all the arrows according to the trend intensity
          {
            type: "color", // autocasts as new ColorVariable()
            field: "Property_Value_Diff_Percent", // the trend intensity can be represented by this attribute
            stops: [
              // the trend intensity going from green (positive) to red (negative)
              { value: 80, color: colors[0] },
              { value: 10, color: colors[1] },
              { value: 0, color: colors[2] },
              { value: -10, color: colors[3] },
              { value: -80, color: colors[4] },
            ],
          },
        ],
      };

      // Create an instance of a FeatureLayer containing the locations of some buildings
      const buildingsPropertyTrendLayer = new FeatureLayer({
        portalItem: {
          id: "e1018631be3c4069b57c2aff151aa013",
        },
        outFields: ["Property_Value_Diff_Percent", "OBJECTID"],
        renderer: arrowTrendRenderer,
        labelingInfo: getLabelClass(), // Adding a custom label with Arcade to show the trend in percentage
        popupEnabled: false,
        featureReduction: {
          type: "selection", // Declutter the view by removing overlapping features so that features will be thinned automatically
        },
      });

      ((buildingsPropertyTrendLayer.elevationInfo = {
        mode: "relative-to-scene", // The elevationInfo mode positions billboarded icons on top of the buildings
      }),

        viewElement.map.add(buildingsPropertyTrendLayer));

      // This function returns a label using Arcade for getting the percentage of the property value changes
      function getLabelClass() {
        return {
          labelExpressionInfo: {
            expression: `
                var value_diff_pct = Round($feature.Property_Value_Diff_Percent, 0)
                if (value_diff_pct >= 0) {
                  return '+' + value_diff_pct + '%'
                } else {
                  return value_diff_pct + '%'
                }
              `,
          },
          labelPlacement: "above-center",
          minScale: 0,
          symbol: {
            type: "label-3d", // autocasts as new TextSymbol()
            symbolLayers: [
              {
                type: "text", // autocasts as new TextSymbol3DLayer()
                material: { color: "#ffffff" },
                halo: {
                  color: "black", // autocasts as Color
                  size: 1.5,
                },
                size: 12, // points
              },
            ],
          },
        };
      }
    </script>
  </body>
</html>
