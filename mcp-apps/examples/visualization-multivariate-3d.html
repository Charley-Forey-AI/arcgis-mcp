<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Thematic multivariate visualization (3D) | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <arcgis-scene basemap="oceans">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"></arcgis-compass>
      <arcgis-legend slot="bottom-left"></arcgis-legend>
    </arcgis-scene>
    <script type="module">
      const [FeatureLayer] = await $arcgis.import(["@arcgis/core/layers/FeatureLayer.js"]);

      /*****************************************************************
       * Get a reference to the HTML elements
       *****************************************************************/
      const viewElement = document.querySelector("arcgis-scene");

      // Wait for the view to initialize
      await viewElement.viewOnReady();

      // The initial camera of the scene
      const initCam = {
        // autocasts as new Camera()
        position: {
          // autocasts as new Point()
          x: -7094839,
          y: -113987,
          z: 8032780,
          spatialReference: {
            // autocasts as new SpatialReference()
            wkid: 3857,
          },
        },
        heading: 358.8,
        tilt: 13.7,
      };

      viewElement.camera = initCam;
      viewElement.environment = {
        lighting: {
          type: "virtual",
        },
      };

      /*****************************************************************
       * More than one visual variable can be set on a renderer to create
       * multivariate visualizations on a layer.
       *
       * In this case we set three visual variables on the renderer - one
       * for color and two for size. Because size values can be applied to
       * more than one axis in 3D (heigh, depth, and width) we want to
       * specify a constant value for the width and depth and size the
       * height of each feature based on the windspeed of the hurricane
       * at that location. Color is used to visualize atmospheric pressure.
       *****************************************************************/

      const renderer = {
        type: "simple", // autocasts as new SimpleRenderer()
        symbol: {
          type: "point-3d", // autocasts as new PointSymbol3D()
          symbolLayers: [
            {
              type: "object", // autocasts as new ObjectSymbol3DLayer()
              resource: {
                primitive: "cone",
              },
              width: 50000, // width of the symbol in meters
            },
          ],
        },
        label: "hurricane location",
        visualVariables: [
          {
            type: "color",
            field: "PRESSURE",
            stops: [
              {
                value: 950,
                color: "red",
              },
              {
                value: 1020,
                color: "blue",
              },
            ],
          },
          {
            type: "size",
            field: "WINDSPEED",
            stops: [
              {
                value: 20,
                size: 60000,
              },
              {
                value: 150,
                size: 500000,
              },
            ],
            axis: "height",
          },
          {
            type: "size",
            axis: "width-and-depth",
            useSymbolValue: true, // uses the width value defined in the symbol layer (50,000)
          },
        ],
      };

      // Set the renderer on the layer
      const hurricaneLayer = new FeatureLayer({
        url: "https://sampleserver6.arcgisonline.com/arcgis/rest/services/Hurricanes/MapServer/0",
        renderer: renderer,
      });

      viewElement.map.add(hurricaneLayer);
    </script>
  </body>
</html>
