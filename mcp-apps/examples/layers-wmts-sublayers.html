<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css" />
    <title>Select WMTSLayer sublayer | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      #header {
        padding: var(--calcite-spacing-sm);
        background-color: var(--calcite-color-background);
      }
    </style>
  </head>

  <body>
    <calcite-shell>
      <div slot="header" id="header">
        <calcite-label>
          Pick a layer from the WMTS catalog
          <calcite-select id="selectSublayer"></calcite-select>
        </calcite-label>
      </div>
      <arcgis-map center="0, 0" scale="144201449">
        <arcgis-zoom slot="top-left"></arcgis-zoom>
        <arcgis-layer-list slot="bottom-left"></arcgis-layer-list>
      </arcgis-map>
    </calcite-shell>
    <script type="module">
      const [WMTSLayer, Map] = await $arcgis.import([
        "@arcgis/core/layers/WMTSLayer.js",
        "@arcgis/core/Map.js",
      ]);
      // Get a reference to the map and select components
      const viewElement = document.querySelector("arcgis-map");
      const selectElement = document.querySelector("calcite-select");

      // Create the WMTS layer
      const layer = new WMTSLayer({
        url: "https://gibs.earthdata.nasa.gov/wmts/epsg4326/best",
        copyright: "<a href='https://earthdata.nasa.gov'>Earthdata</a> by NASA",
        activeLayer: {
          id: "SRTM_Color_Index",
        },
      });
      // Create the map and set it to the map component
      const map = new Map({
        layers: [layer],
      });
      viewElement.map = map;

      // When the layer is loaded, populate the select with sublayers
      layer.when(() => {
        layer.sublayers.forEach((sublayer, i) => {
          let option = document.createElement("calcite-option");
          option.label = `(${i}) ${sublayer.title}`;
          option.value = sublayer.id;
          selectElement.appendChild(option);
        });
      });

      // Listen for changes on the select and update the active sublayer
      selectElement.addEventListener("calciteSelectChange", (event) => {
        layer.activeLayer = layer.findSublayerById(event.target.value).clone();
      });
    </script>
  </body>
</html>
