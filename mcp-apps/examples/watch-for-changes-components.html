<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Watch for changes in components | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      #outputMessages {
        box-sizing: border-box;
        padding: 20px;
        height: 90vh;
        width: 350px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        font-size: 14px;
        line-height: 30px;
        overflow: auto;
        overflow-wrap: break-word;
      }

      #outputMessages span {
        color: #f7be81;
        font-weight: bold;
      }
    </style>
  </head>

  <body class="calcite-mode-dark">
    <arcgis-map item-id="d5dda743788a4b0688fe48f43ae7beb9">
      <div id="outputMessages" slot="top-right"><b>Watch for changes</b></div>
      <arcgis-basemap-gallery slot="top-left"> </arcgis-basemap-gallery>
    </arcgis-map>
    <script type="module">
      // Get a reference to the map component
      const viewElement = document.querySelector("arcgis-map");
      const outputMessages = document.getElementById("outputMessages");
      const displayMessage = (info) => {
        outputMessages.innerHTML += info;
        outputMessages.scrollTop = outputMessages.scrollHeight;
      };

      // Listen for when the view first loads
      await viewElement.viewOnReady();
      const zoom = viewElement.zoom;
      let message = `<br><span>viewOnReady:</span> initial zoom is ${zoom}`;
      displayMessage(message);

      const portalItem = viewElement.map.portalItem;
      message = `<br><span>viewOnReady:</span> WebMap title is ${portalItem?.title}`;
      displayMessage(message);

      // Listen for property changes on the view after it has been loaded.
      viewElement.addEventListener("arcgisViewChange", async (event) => {
        const { zoom, basemap } = event.target;
        const message = `<br><span>arcgisViewChange:</span>
        zoom has changed to ${zoom} and basemap is ${basemap?.title}`;
        displayMessage(message);
      });
    </script>
  </body>
</html>
