<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Realistic buildings with SceneLayer | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-scene
      basemap="hybrid"
      ground="world-elevation"
      camera-position="4.84361, 45.75561, 270"
      camera-tilt="82"
      camera-heading="304">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"> </arcgis-compass>
    </arcgis-scene>

    <script type="module">
      const [SceneLayer] = await $arcgis.import(["@arcgis/core/layers/SceneLayer.js"]);

      // Get a reference to the Scene component
      const viewElement = document.querySelector("arcgis-scene");

      // Create a SceneLayer instance
      const sceneLayer = new SceneLayer({
        portalItem: {
          id: "b66b02861afa4e8dbf9655d05bc89afc",
        },
        elevationInfo: {
          mode: "absolute-height",
          offset: 6,
        },
        popupEnabled: false,
      });

      // Wait for the view to initialize
      await viewElement.viewOnReady();

      // Set the scene lighting based on a specific time of day and enable shadows
      viewElement.environment = {
        lighting: {
          date: new Date("July 15, 2015 12:00:00 PDT"),
          directShadowsEnabled: true,
        },
      };

      // Add the SceneLayer to the map
      viewElement.map.add(sceneLayer);
    </script>
  </body>
</html>
