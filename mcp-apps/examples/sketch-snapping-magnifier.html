<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Snapping with Sketch widget and Magnifier | Sample | ArcGIS Maps SDK for JavaScript</title>

    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css" />

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body,
      #viewDiv {
        height: 100%;
        margin: 0;
      }
    </style>
    <script type="module">
      const [Sketch, Map, GraphicsLayer, MapView, Expand] = await $arcgis.import([
        "@arcgis/core/widgets/Sketch.js",
        "@arcgis/core/Map.js",
        "@arcgis/core/layers/GraphicsLayer.js",
        "@arcgis/core/views/MapView.js",
        "@arcgis/core/widgets/Expand.js",
      ]);

      const graphicsLayer = new GraphicsLayer({ title: "graphicsLayer" });

      const map = new Map({
        basemap: "streets-navigation-vector",
        layers: [graphicsLayer],
      });

      const view = new MapView({
        container: "viewDiv",
        map: map,
        zoom: 6,
        center: [38.33081, 0.36532],
      });

      // setup the Sketch widget with all snapping enabled by default
      const sketch = new Sketch({
        layer: graphicsLayer,
        view: view,
        // graphic will be selected as soon as it is created
        creationMode: "update",
        snappingOptions: {
          // autocasts as SnappingOptions()
          enabled: true,
          // enable snapping on the graphicslayer by default
          featureSources: [{ layer: graphicsLayer, enabled: true }],
        },
        visibleElements: {
          // hide/show sketch elements
          createTools: {
            circle: false, // hide the circle tool
          },
          selectionTools: {
            "lasso-selection": false, // hide the lasso-selection tool
          },
        },
      });

      const configurationExpand = new Expand({
        expandIcon: "magnifying-glass",
        expandTooltip: "Show magnifier configuration",
        expanded: true,
        view: view,
        content: document.getElementById("config-panel"),
      });

      // add the UI components to the view
      view.ui.add(sketch, "top-right");
      view.ui.add(configurationExpand, "top-left");

      view.when(() => {
        // enable the Magnifier
        view.magnifier.visible = false;
        view.magnifier.factor = 1.7; // magnification factor
        view.magnifier.size = 150; // magnifier image size
        view.magnifier.offset = { x: 75, y: 75 }; // x and y offset values

        // uses the mouse cursor location to position the Magnifier
        view.on("pointer-move", (evt) => {
          view.magnifier.position = { x: evt.x, y: evt.y };
        });

        // setup UI to use the default config values
        setMagnifierConfig(view.magnifier);
      });

      function setMagnifierConfig(magnifier) {
        const toggleSwitch = document.getElementById("toggle-switch");
        const factorInput = document.getElementById("factor-input");
        const xoffsetInput = document.getElementById("xoffset-input");
        const yoffsetInput = document.getElementById("yoffset-input");
        const sizeInput = document.getElementById("size-input");

        // set default input values
        toggleSwitch.checked = magnifier.visible;
        factorInput.value = magnifier.factor.toString();
        xoffsetInput.value = magnifier.offset.x.toString();
        yoffsetInput.value = magnifier.offset.y.toString();
        sizeInput.value = magnifier.size.toString();

        // add calcite event listeners
        toggleSwitch.addEventListener("calciteSwitchChange", (evt) => {
          magnifier.visible = evt.target.checked;
        });
        factorInput.addEventListener("calciteInputInput", (evt) => {
          magnifier.factor = parseFloat(evt.target.value);
        });
        xoffsetInput.addEventListener("calciteInputInput", (evt) => {
          magnifier.offset.x = parseInt(evt.target.value);
        });
        yoffsetInput.addEventListener("calciteInputInput", (evt) => {
          magnifier.offset.y = parseInt(evt.target.value);
        });
        sizeInput.addEventListener("calciteInputInput", (evt) => {
          magnifier.size = parseInt(evt.target.value);
        });
      }
    </script>
  </head>

  <body>
    <div id="viewDiv"></div>
    <calcite-block expanded heading="Magnifier Configuration" id="config-panel">
      <calcite-label id="toggle-label"
        >Magnifier
        <calcite-switch scale="l" id="toggle-switch"></calcite-switch>
      </calcite-label>
      <calcite-label
        >factor
        <calcite-input id="factor-input" type="number" scale="s" min="0" value="0"> </calcite-input>
      </calcite-label>
      <calcite-label
        >xoffset
        <calcite-input id="xoffset-input" type="number" scale="s" value="0"> </calcite-input>
      </calcite-label>
      <calcite-label
        >yoffset
        <calcite-input id="yoffset-input" type="number" scale="s" value="0"> </calcite-input>
      </calcite-label>
      <calcite-label
        >size
        <calcite-input id="size-input" type="number" scale="s" min="0" value="0"> </calcite-input>
      </calcite-label>
    </calcite-block>
  </body>
</html>
