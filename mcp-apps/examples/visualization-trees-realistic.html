<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Thematic visualization with realistic 3D symbols | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <arcgis-scene basemap="osm" ground="world-elevation">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"></arcgis-compass>
      <arcgis-legend slot="top-right"></arcgis-legend>
    </arcgis-scene>

    <script type="module">
      const [FeatureLayer] = await $arcgis.import(["@arcgis/core/layers/FeatureLayer.js"]);
      /*****************************************************************
       * Get a reference to the Scene component
       *****************************************************************/
      const viewElement = document.querySelector("arcgis-scene");

      /*****************************************************************
       * Setup the Scene component
       *****************************************************************/
      viewElement.camera = {
        position: {
          x: -9177356,
          y: 4246783,
          z: 723,
          spatialReference: {
            wkid: 3857,
          },
        },
        heading: 0,
        tilt: 83,
      };

      viewElement.popup = {
        dockEnabled: true,
        dockOptions: {
          breakpoint: false,
          position: "bottom-right",
        },
      };

      viewElement.environment = {
        lighting: {
          directShadowsEnabled: true,
        },
      };

      /*****************************************************************
       * Set the Renderer and Layer for the trees. The symbol references
       * a hosted 3D symbol resource that resembles a tree.
       * Four visual variables are used to modify this symbol on the
       * client. One for the height (height axis),
       * another for diameter from north to south (depth axis), and
       * another for diameter from east to west (width axis).
       *
       * The color visual variable shades each tree based on its
       * carbon storage.
       *****************************************************************/

      const visualVariables = [
        {
          type: "size",
          axis: "height", // specify which axis to apply the data values to
          field: "Height", // tree height in feet
          valueUnit: "feet",
        },
        {
          type: "size",
          axis: "width", // specify which axis to apply the data values to
          field: "Width_EW", // tree diameter in feet from east to west
          valueUnit: "feet",
        },
        {
          type: "size",
          axis: "depth", // specify which axis to apply the data values to
          field: "Width_NS", // tree diameter in feet from north to south
          valueUnit: "feet",
        },
        {
          type: "color",
          field: "C_Storage", // Carbon storage
          stops: [
            {
              value: 0,
              color: "#f7fcb9",
            }, // features with zero carbon
            {
              value: 10000,
              color: "#31a354",
            }, // features with 10000 carbon
          ],
          legendOptions: {
            title: "Carbon Storage",
          },
        },
      ];
      const renderer = {
        type: "simple", // autocasts as new SimpleRenderer()
        symbol: {
          type: "web-style", // autocasts as new WebStyleSymbol()
          styleName: "EsriRealisticTreesStyle",
          name: "Other",
        },
        label: "tree",
        visualVariables: visualVariables, // set the visualVariables defined separately
      };
      // Construct the layer and set the renderer and popupTemplate on it
      const treesLayer = new FeatureLayer({
        url: "https://services.arcgis.com/V6ZHFr6zdgNZuVG0/arcgis/rest/services/Landscape_Trees/FeatureServer/0",
        renderer: renderer, // set the renderer defined earlier
        outFields: ["*"],
        popupTemplate: {
          // autocasts as new PopupTemplate()
          title: "{Cmn_Name}",
          content:
            "<i>{Sci_Name}</i><br>" +
            "This tree is in {Condition} condition and is {Height} feet in height.",
        },
      });

      // Wait for the view to initialize
      await viewElement.viewOnReady();
      viewElement.map.add(treesLayer);
    </script>
  </body>
</html>
