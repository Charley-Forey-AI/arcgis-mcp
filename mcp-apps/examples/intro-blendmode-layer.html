<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Intro to layer blending | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-map center="81.938, 26.733" zoom="5">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
    </arcgis-map>

    <script type="module">
      const [Map, VectorTileLayer, TileLayer] = await $arcgis.import([
        "@arcgis/core/Map.js",
        "@arcgis/core/layers/VectorTileLayer.js",
        "@arcgis/core/layers/TileLayer.js",
      ]);

      const viewElement = document.querySelector("arcgis-map");

      const map = new Map({
        basemap: {
          baseLayers: [
            new TileLayer({
              // World Hillshade
              portalItem: { id: "1b243539f4514b6ba35e7d995890db1d" },
            }),
            new VectorTileLayer({
              // This multiplies the top and background layer colors
              // which accentuates parts of the map through contrast
              // and enables hillshades to show through the top layer.
              blendMode: "multiply",
              // Community style (World Edition)
              portalItem: { id: "273bf8d5c8ac400183fc24e109d20bcf" },
            }),
          ],
        },
      });

      viewElement.map = map;
    </script>
  </body>
</html>
