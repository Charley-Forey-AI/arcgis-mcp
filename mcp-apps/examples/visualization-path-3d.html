<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Path visualization in 3D | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      #pathPanel {
        width: 190px;
      }
      calcite-label {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <arcgis-scene item-id="4a711462369c4334972dcd39b064d214">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"></arcgis-compass>
      <calcite-card id="pathPanel" slot="top-right">
        <span slot="heading">Choose path properties:</span>
        <calcite-label alignment="start" scale="s">
          Style
          <calcite-select id="styleSelect" scale="s">
            <calcite-option value="wall">Wall</calcite-option>
            <calcite-option value="square-tube">Square tube</calcite-option>
            <calcite-option value="round-tube">Round tube</calcite-option>
            <calcite-option value="strip">Strip</calcite-option>
          </calcite-select>
        </calcite-label>
        <calcite-label alignment="start" scale="s">
          Cap
          <calcite-select id="capSelect" scale="s">
            <calcite-option value="round">Round</calcite-option>
            <calcite-option value="butt">Butt</calcite-option>
            <calcite-option value="square">Square</calcite-option>
            <calcite-option value="none">None</calcite-option>
          </calcite-select>
        </calcite-label>
        <calcite-label alignment="start" scale="s">
          Join
          <calcite-select id="joinSelect" scale="s">
            <calcite-option value="miter">Miter</calcite-option>
            <calcite-option value="round">Round</calcite-option>
            <calcite-option value="bevel">Bevel</calcite-option>
          </calcite-select>
        </calcite-label>
        <calcite-label alignment="start" scale="s">
          Profile rotation
          <calcite-select id="rotationSelect" scale="s">
            <calcite-option value="all">All</calcite-option>
            <calcite-option value="heading">Heading</calcite-option>
          </calcite-select>
        </calcite-label>
      </calcite-card>
    </arcgis-scene>

    <script type="module">
      const [FeatureLayer, UniqueValueRenderer] = await $arcgis.import([
        "@arcgis/core/layers/FeatureLayer.js",
        "@arcgis/core/renderers/UniqueValueRenderer.js",
      ]);

      /*****************************************************************
       * Get a reference to the HTML elements
       *****************************************************************/
      const viewElement = document.querySelector("arcgis-scene");
      const styleSelect = document.querySelector("#styleSelect");
      const capSelect = document.querySelector("#capSelect");
      const joinSelect = document.querySelector("#joinSelect");
      const rotationSelect = document.querySelector("#rotationSelect");

      /*****************************************************************
       * Setup the Scene component with layer
       *****************************************************************/
      viewElement.environment = {
        lighting: {
          directShadowsEnabled: true,
        },
      };

      // Wait for the view to initialize
      await viewElement.viewOnReady();

      // Create layer with the transit lines
      const transitLayer = new FeatureLayer({
        url: "http://services.arcgis.com/V6ZHFr6zdgNZuVG0/arcgis/rest/services/subway_tcl_stations_lines_wgs84/FeatureServer/0",
        copyright:
          "Data from <a href='https://data.beta.grandlyon.com/en/datasets/lignes-metro-funiculaire-reseau-transports-commun-lyonnais/info'>Data Grand Lyon - Sytral</a>",
        elevationInfo: {
          mode: "relative-to-ground",
          offset: 10,
        },
        title: "Transit lines in Lyon",
        definitionExpression: "sens='Aller'",
      });

      viewElement.map.add(transitLayer);

      /*************************************************
       * These options can be set on a PathSymbol3DLayer.
       * `profile` changes the shape of the path to be either
       * rectangular or round, `cap` styles the start and
       * end vertices of the path and `join` styles the start
       * and end vertices of the segments along the path.
       * `profileRotation` controls the rotation of the profile
       * along the path.
       **************************************************/
      const options = {
        profile: "quad",
        cap: "round",
        join: "miter",
        width: 5,
        height: 30,
        color: {
          // The colors used for each transit line
          A: [255, 0, 16],
          B: [0, 170, 227],
          C: [248, 150, 29],
          D: [0, 166, 63],
          F1: [189, 239, 133],
          F2: [189, 239, 133],
        },
        profileRotation: "all",
      };

      /****************************************
       * Function that sets a renderer with a
       * unique path symbol for each transit line.
       * The path symbol uses the properties from
       * the options object, which are set everytime
       * the user modifies the settings in the menu.
       * **************************************/
      function renderTransitLayer() {
        const renderer = new UniqueValueRenderer({
          field: "ligne",
        });
        for (let property in options.color) {
          if (options.color.hasOwnProperty(property)) {
            renderer.addUniqueValueInfo({
              value: property,
              symbol: {
                type: "line-3d",
                symbolLayers: [
                  {
                    type: "path",
                    profile: options.profile,
                    material: {
                      color: options.color[property],
                    },
                    width: options.width,
                    height: options.height,
                    join: options.join,
                    cap: options.cap,
                    anchor: "bottom",
                    profileRotation: options.profileRotation,
                  },
                ],
              },
            });
          }
        }
        transitLayer.renderer = renderer;
      }

      /*************************************************
       * The rest of the sample adds event listeners
       * on the Calcite select components, to modify
       * the path properties in the options object and
       * rerender the layer.
       *************************************************/
      styleSelect.addEventListener("calciteSelectChange", () => {
        const value = styleSelect.value;
        switch (value) {
          case "round-tube":
            options.profile = "circle";
            options.height = 30;
            options.width = 30;
            break;
          case "square-tube":
            options.profile = "quad";
            options.height = 30;
            options.width = 30;
            break;
          case "wall":
            options.profile = "quad";
            options.height = 30;
            options.width = 5;
            break;
          case "strip":
            options.profile = "quad";
            options.height = 5;
            options.width = 30;
            break;
        }
        renderTransitLayer();
      });
      capSelect.addEventListener("calciteSelectChange", () => {
        options.cap = capSelect.value;
        renderTransitLayer();
      });
      joinSelect.addEventListener("calciteSelectChange", () => {
        options.join = joinSelect.value;
        renderTransitLayer();
      });
      rotationSelect.addEventListener("calciteSelectChange", () => {
        options.profileRotation = rotationSelect.value;
        renderTransitLayer();
      });

      // Set the initial renderer
      renderTransitLayer();
    </script>
  </body>
</html>
