<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Custom popup actions per feature attribute | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-map item-id="0be26340218c4ff1959a204a32e7e0d8">
      <arcgis-popup slot="popup"></arcgis-popup>
      <arcgis-zoom slot="top-left"></arcgis-zoom>
    </arcgis-map>
    <script type="module">
      const [FeatureLayer, reactiveUtils, TextContent] = await $arcgis.import([
        "@arcgis/core/layers/FeatureLayer.js",
        "@arcgis/core/core/reactiveUtils.js",
        "@arcgis/core/popup/content/TextContent.js",
      ]);
      const viewElement = document.querySelector("arcgis-map");
      const popupComponent = document.querySelector("arcgis-popup");
      await viewElement.viewOnReady();
      const featureLayer = viewElement.map.allLayers.find((layer) => {
        return layer.title === "Breweries (OpenDB)";
      });
      await featureLayer.load();
      featureLayer.popupTemplate = {
        title: "{name}",
        outFields: ["*"],
        lastEditInfoEnabled: false,
        actions: [
          {
            id: "find-brewery",
            icon: "web",
            title: "Brewery Info",
          },
        ],
        content: formatContent,
      };
      // Use a function to format the content of the popup
      function formatContent(event) {
        const attributes = event.graphic.attributes;
        let text = "";
        // Only display the attributes if they exist
        text += attributes.website_url
          ? `<b>Brewery</b>: <a href="${attributes.website_url}">${attributes.name}</a><br>`
          : `<b>Brewery</b>: ${attributes.name}<br>`;
        text += attributes.address_1
          ? `<b>Address:</b><br>${attributes.address_1}<br>`
          : `<b>Located in:</b> `;
        text +=
          attributes.city && attributes.state_province
            ? `${attributes.city}, ${attributes.state_province}<br>`
            : ``;
        text += attributes.phone !== null ? `<b>Phone</b>: ${attributes.phone}` : ``;
        let textElement = new TextContent({
          text: text,
        });
        return [textElement];
      }
      // Watch for when features are selected
      reactiveUtils.watch(
        () => popupComponent.selectedFeature,
        (graphic) => {
          if (graphic) {
            // Set the action's visible property to true if the 'website' field value is not null, otherwise set it to false
            const graphicTemplate = graphic.getEffectivePopupTemplate();
            graphicTemplate.actions.items[0].visible = graphic.attributes.website_url
              ? true
              : false;
          }
        },
      );
      // Watch for the trigger-action event on the popup
      reactiveUtils.on(
        () => popupComponent,
        "arcgisTriggerAction",
        (event) => {
          if (event.detail.action.id === "find-brewery") {
            const attributes = popupComponent.selectedFeature.attributes;
            // Get the 'website' field attribute
            const info = attributes.website_url;
            // Make sure the 'website' field value is not null
            if (info) {
              // Open up a new browser using the URL value in the 'website' field
              window.open(info.trim());
            }
          }
        },
      );
    </script>
  </body>
</html>
