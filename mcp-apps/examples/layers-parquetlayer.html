<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Intro to ParquetLayer | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      calcite-panel {
        width: 300px;
      }
    </style>
  </head>

  <body>
    <arcgis-map center="-98.3098, 38.2465" zoom="6">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-legend slot="bottom-left"></arcgis-legend>
      <calcite-panel slot="top-right">
        <arcgis-layer-list></arcgis-layer-list>
        <calcite-block expanded id="feaure-count-block" label="feature count block"></calcite-block>
      </calcite-panel>
    </arcgis-map>

    <script type="module">
      const [Map, ParquetLayer, Color, reactiveUtils] = await $arcgis.import([
        "@arcgis/core/Map.js",
        "@arcgis/core/layers/ParquetLayer.js",
        "@arcgis/core/Color.js",
        "@arcgis/core/core/reactiveUtils.js",
      ]);

      // Esri color ramps - Esri Blue and Brown 1
      // colors are used for the class breaks renderer's color visual variables
      const colorRamp = ["#00619bff", "#50a7daff", "#d3e6e3ff", "#ad8b62ff", "#664015ff"];
      // apply some transparency to the colors
      const colors = colorRamp.map((color) => {
        const c = new Color(color);
        c.a = 0.2;
        return c;
      });

      // get the arcgis-map component element
      const viewElement = document.querySelector("arcgis-map");
      viewElement.constraints = {
        minScale: 36978595.474472,
      };

      // create a ParquetLayer instance and add it to the map
      // kansas water wells parquet file (gzip compressed and location encoded)
      const layer = new ParquetLayer({
        urls: [
          "https://jsapi.maps.arcgis.com/sharing/rest/content/items/6ab6f959c1684eb5a54db91644a89747/data",
        ],
        title: "Kansas water wells",
        orderBy: [
          {
            field: "DEPTH_OF_COMPLETED_WELL",
            order: "descending",
          },
        ],
        effect: "drop-shadow(2px, 2px, 2px, lightgray)",
        renderer: createClassBreaksRenderer(),
        popupTemplate: {
          title: "Water well info",
          content: [
            {
              type: "fields",
              fieldInfos: [
                {
                  fieldName: "COUNTY",
                  label: "County",
                },
                {
                  fieldName: "LOCATION_DIRECTIONS",
                  label: "Directions to location",
                },
                {
                  fieldName: "STATUS",
                  label: "Status",
                },
                {
                  fieldName: "USE_DESC",
                  label: "Usage description",
                },
                {
                  fieldName: "ESTIMETED_YIELD",
                  label: "Estimated yield",
                },
                {
                  fieldName: "DEPTH_OF_COMPLETED_WELL",
                  label: "Depth of well (ft)",
                },
                {
                  fieldName: "FILE_URL",
                  label: "Well file",
                },
                {
                  fieldName: "KGS_URL",
                  label: "Kansas Geological Survery info",
                },
              ],
            },
          ],
        },
      });

      // set the map on the arcgis-map component element
      viewElement.map = new Map({
        basemap: {
          portalItem: {
            // human geography map
            id: "3582b744bba84668b52a16b0b6942544",
          },
        },
        layers: [layer],
      });

      const layerView = await viewElement.whenLayerView(layer);

      await reactiveUtils.whenOnce(() => !layerView.dataUpdating);
      const count = await layer.queryFeatureCount();
      document.getElementById("feaure-count-block").innerHTML =
        `Displaying <b> ${count}</b> water wells across Kansas- from Parquet file.`;

      // this function is called from the parquet layer creation above
      // creates a class breaks renderer with color visual variables
      // The stronger colors indicate a higher density of wells.
      function createClassBreaksRenderer() {
        const renderer = {
          type: "class-breaks",
          visualVariables: [
            {
              type: "size",
              valueExpression: "$view.scale",
              stops: [
                { size: 1.5, value: 4621936 },
                { size: 2.5, value: 1200000 },
                { size: 3, value: 800000 },
                { size: 4, value: 500000 },
                { size: 5, value: 250000 },
              ],
            },
            {
              type: "color",
              field: "DEPTH_OF_COMPLETED_WELL",
              stops: [
                {
                  color: colors[0],
                  value: 0,
                },
                {
                  color: colors[1],
                  value: 100,
                },
                {
                  color: colors[2],
                  value: 200,
                },
                {
                  color: colors[3],
                  value: 500,
                },
                {
                  color: colors[4],
                  value: 800,
                },
              ],
              legendOptions: {
                title: "Depth of Wells (ft)",
              },
            },
          ],
          classBreakInfos: [
            {
              maxValue: 9007199254740991,
              minValue: -9007199254740991,
              symbol: {
                type: "simple-marker",
                color: [170, 170, 170, 0],
                size: 1.5,
                style: "circle",
                outline: {
                  type: "simple-line",
                  color: [153, 153, 153, 0],
                  width: 0,
                  style: "none",
                },
              },
            },
          ],
          field: "DEPTH_OF_COMPLETED_WELL",
        };
        return renderer;
      }
    </script>
  </body>
</html>
