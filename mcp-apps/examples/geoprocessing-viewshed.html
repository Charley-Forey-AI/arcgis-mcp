<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Geoprocessing - viewshed analysis | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      #paneDiv {
        position: absolute;
        top: 18px;
        right: 18px;
        padding: 12px;
        background-color: rgba(0, 0, 0, 0.5);
        color: white;
        width: 200px;
      }
    </style>
  </head>

  <body>
    <arcgis-scene
      basemap="hybrid"
      ground="world-elevation"
      camera-position="7.59564, 46.06595, 5184"
      camera-tilt="70">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"> </arcgis-compass>
    </arcgis-scene>
    <div id="paneDiv" class="esri-widget">Click on map to execute ViewShed geoprocessor</div>
    <script type="module">
      const [GraphicsLayer, Graphic, Point, geoprocessor, LinearUnit, FeatureSet] =
        await $arcgis.import([
          "@arcgis/core/layers/GraphicsLayer.js",
          "@arcgis/core/Graphic.js",
          "@arcgis/core/geometry/Point.js",
          "@arcgis/core/rest/geoprocessor.js",
          "@arcgis/core/rest/support/LinearUnit.js",
          "@arcgis/core/rest/support/FeatureSet.js",
        ]);

      const gpUrl =
        "https://sampleserver6.arcgisonline.com/arcgis/rest/services/Elevation/ESRI_Elevation_World/GPServer/Viewshed";

      const graphicsLayer = new GraphicsLayer();

      /*****************************************************************
       * Setup the Scene component and add the GraphicsLayer
       *****************************************************************/
      const viewElement = document.querySelector("arcgis-scene");

      await viewElement.viewOnReady();
      viewElement.map.add(graphicsLayer);

      const markerSymbol = {
        type: "simple-marker",
        color: [255, 0, 0],
        outline: {
          color: [255, 255, 255],
          width: 2,
        },
      };

      const fillSymbol = {
        type: "simple-fill",
        color: [226, 119, 40, 0.75],
        outline: {
          color: [255, 255, 255],
          width: 1,
        },
      };

      const options = {
        outSpatialReference: {
          wkid: 102100,
        },
      };

      viewElement.addEventListener("arcgisViewClick", (event) => {
        computeViewshed(event.detail);
      });

      function computeViewshed(event) {
        graphicsLayer.removeAll();

        const point = new Point({
          longitude: event.mapPoint.longitude,
          latitude: event.mapPoint.latitude,
        });

        const inputGraphic = new Graphic({
          geometry: point,
          symbol: markerSymbol,
        });

        graphicsLayer.add(inputGraphic);

        const inputGraphicContainer = [];
        inputGraphicContainer.push(inputGraphic);
        const featureSet = new FeatureSet();
        featureSet.features = inputGraphicContainer;

        const vsDistance = new LinearUnit();
        vsDistance.distance = 5;
        vsDistance.units = "miles";

        const params = {
          Input_Observation_Point: featureSet,
          Viewshed_Distance: vsDistance,
        };

        geoprocessor.execute(gpUrl, params, options).then(drawResultData);
      }

      function drawResultData(result) {
        const resultFeatures = result.results[0].value.features;

        // Assign each resulting graphic a symbol
        const viewshedGraphics = resultFeatures.map((feature) => {
          feature.symbol = fillSymbol;
          return feature;
        });

        // Add the resulting graphics to the graphics layer
        graphicsLayer.addMany(viewshedGraphics);

        // animate the result
        viewElement
          .goTo({
            target: viewshedGraphics,
            tilt: 0,
          })
          .catch((error) => {
            if (error.name != "AbortError") {
              console.error(error);
            }
          });
      }
    </script>
  </body>
</html>
