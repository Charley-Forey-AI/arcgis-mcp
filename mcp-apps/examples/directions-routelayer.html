<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Directions component with RouteLayer | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-map item-id="45b3b2fb35e94ab09381d0caa0da5946">
      <arcgis-directions slot="top-right"></arcgis-directions>
    </arcgis-map>
    <script type="module">
      // import RouteLayer module to load a RouteLayer from a portal item
      const RouteLayer = await $arcgis.import("@arcgis/core/layers/RouteLayer.js");
      // import config to set the API key
      const config = await $arcgis.import("@arcgis/core/config.js");

      // get access to the arcgis-map component element and arcgis-directions component
      const viewElement = document.querySelector("arcgis-map");
      const directionsElement = document.querySelector("arcgis-directions");

      // define the API key and define their scopes (only for directions component)
      config.apiKeys.scopes = [
        {
          token: "YOUR_ACCESS_TOKEN",
          urls: [
            "https://geocode-api.arcgis.com/arcgis/rest/services/World/GeocodeServer",
            "https://route-api.arcgis.com/arcgis/rest/services/World/Route/NAServer/Route_World",
          ],
        },
      ];

      // create a RouteLayer from a portal item
      const routeLayer = new RouteLayer({
        portalItem: {
          // autocasts as new PortalItem()
          id: "1607ad700759418095e696bc387a1ff6", // Redlands Route
        },
      });

      // wait for the map and directions and routeLayer to be ready
      // and load the RouteLayer
      await viewElement.viewOnReady();
      await directionsElement.componentOnReady();
      await routeLayer.load();

      // assign the RouteLayer to the Directions component
      // and add the RouteLayer to the map
      directionsElement.layer = routeLayer;
      viewElement.map.add(routeLayer);

      // get the extent of the route and expand it by 20%
      // then pan and zoom the map to that extent
      const extent = routeLayer.fullExtent.clone().expand(1.2);
      viewElement.goTo(extent);
    </script>
  </body>
</html>
