<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Intro to OrientedImageryLayer | Sample | ArcGIS Maps SDK for JavaScript</title>

    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css" />
    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body,
      #viewDiv {
        height: 100%;
        margin: 0;
      }

      #oi-container {
        top: 8px;
        right: 8px;
        position: absolute;
        height: 80%;
        width: 30%;
      }
    </style>

    <script type="module">
      const [Map, MapView, OrientedImageryViewer, OrientedImageryLayer] = await $arcgis.import([
        "@arcgis/core/Map.js",
        "@arcgis/core/views/MapView.js",
        "@arcgis/core/widgets/OrientedImageryViewer.js",
        "@arcgis/core/layers/OrientedImageryLayer.js",
      ]);

      const map = new Map({
        basemap: "hybrid",
      });

      const view = new MapView({
        map,
        container: "viewDiv",
      });

      // create an instance of an oriented imagery layer and add it to map
      const layer = new OrientedImageryLayer({
        portalItem: {
          id: "ca2aa99099414ff7aba2f1e3721f4218",
        },
      });
      map.layers.add(layer);

      // zoom to the full extent of the layer when layer is loaded
      // set the oriented imagery layer to be used with an oriented imagery viewer
      view.whenLayerView(layer).then(() => {
        view.goTo(layer.fullExtent);
        orientedImageryViewer.layer = layer;
      });

      // create a new instance of the oriented imagery viewer widget
      const orientedImageryViewer = new OrientedImageryViewer({
        view,
        disabled: false,
        container: "oi-container",
      });
    </script>
  </head>

  <body>
    <div id="viewDiv"></div>
    <div id="oi-container"></div>
  </body>
</html>
