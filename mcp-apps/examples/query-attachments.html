<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Query Attachments | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      #calcite-block {
        overflow: auto;
      }
    </style>
  </head>
  <body class="calcite-mode-dark">
    <calcite-shell>
      <calcite-shell-panel slot="panel-start" width="l">
        <calcite-panel
          id="panel"
          heading="Query for attachments"
          description="Click on a location in the map to display crowd sourced images.">
        </calcite-panel>
      </calcite-shell-panel>
      <arcgis-map item-id="dd39b6d775b541fd900835b55927b5cc" popup-disabled>
        <arcgis-zoom slot="top-left"></arcgis-zoom>
        <arcgis-expand slot="top-right" expand-tooltip="Show Legend">
          <arcgis-legend></arcgis-legend>
        </arcgis-expand>
      </arcgis-map>
      <calcite-alert auto-close id="alert" kind="danger" icon label="Danger alert">
        <div id="title" slot="title"></div>
      </calcite-alert>
    </calcite-shell>
    <script type="module">
      let highlight;
      const panel = document.getElementById("panel");
      const alert = document.getElementById("alert");
      const title = document.getElementById("title");
      const viewElement = document.querySelector("arcgis-map");
      await viewElement.viewOnReady();
      const layer = viewElement.map.layers.at(0);
      layer.outFields = ["*"];
      viewElement.addEventListener("arcgisViewClick", (event) => {
        if (alert.open) {
          alert.open = false;
        }
        clearMap();
        queryFeatures(event.detail);
      });
      async function queryFeatures(event) {
        // Query the for the object ids within 800m from where the user clicked
        const objectIds = await layer.queryObjectIds({
          geometry: event.mapPoint,
          spatialRelationship: "intersects",
          returnGeometry: false,
          outFields: ["*"],
          distance: 3,
          units: "miles",
        });
        if (!objectIds.length) {
          showAlert();
          return;
        }
        // Highlight the query-area on the map
        const layerView = await viewElement.whenLayerView(layer);
        if (highlight) {
          highlight.remove();
        }
        highlight = layerView.highlight(objectIds);
        // Query the for the attachments from the object ids found
        const attachmentsByFeatureId = await layer.queryAttachments({
          attachmentTypes: ["image/*"],
          objectIds: objectIds,
        });
        if (!attachmentsByFeatureId) {
          return;
        }
        if (Object.keys(attachmentsByFeatureId).length === 0) {
          showAlert();
        }
        // Display the attachments
        Object.keys(attachmentsByFeatureId).forEach((objectId) => {
          const attachments = attachmentsByFeatureId[objectId];
          attachments.forEach((attachment) => {
            const block = document.createElement("calcite-block");
            block.expanded = true;
            block.heading = attachment.name;
            const card = document.createElement("calcite-card");
            const spanHeading = document.createElement("span");
            spanHeading.slot = "description";
            spanHeading.textContent = `Attachment type: ${attachment.contentType}`;
            const image = document.createElement("img");
            image.slot = "thumbnail";
            image.src = attachment.url;
            card.append(image, spanHeading);
            block.appendChild(card);
            panel.appendChild(block);
          });
        });
      }

      function showAlert() {
        clearMap();
        title.textContent = "There are no incidents within 3 miles of the click location.";
        alert.open = true;
      }
      // Clear attachments from div
      function clearMap() {
        if (highlight) {
          highlight.remove();
        }
        const att = document.getElementById("panel");
        while (att.firstChild) {
          att.removeChild(att.firstChild);
        }
      }
    </script>
  </body>
</html>
