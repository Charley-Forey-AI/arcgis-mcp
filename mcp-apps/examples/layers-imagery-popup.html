<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>ImageryLayer - server side raster function | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-map basemap="hybrid" zoom="13">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-popup slot="popup" include-default-actions-disabled></arcgis-popup>
    </arcgis-map>

    <script type="module">
      const [ImageryLayer, RasterFunction] = await $arcgis.import([
        "@arcgis/core/layers/ImageryLayer.js",
        "@arcgis/core/layers/support/RasterFunction.js",
      ]);

      const url = "https://sampleserver6.arcgisonline.com/arcgis/rest/services/Toronto/ImageServer";
      const title = "Data from {SensorName} satellite";
      const content = `Rendered RGB values: <b>{Raster.ServicePixelValue} </b>
      <br>Original values (B, G, R, NIR): <b>{Raster.ItemPixelValue} </b>`;

      const viewElement = document.querySelector("arcgis-map");
      await viewElement.componentOnReady(); // Wait for property methods to be ready.

      const centerCoordinates = { x: -8836932.6501, y: 5411004.902699997 };
      viewElement.center = { spatialReference: 3857, ...centerCoordinates };

      // Define the popup title and content display. Autocasts as PopupTemplate.
      const popupTemplate = { title, content };
      // Specify the processing to apply to the imagery. Autocasts as RasterFunction.
      const rasterFunction = { functionName: "TorontoFalseColor", variableName: "Raster" };
      // Initialize the layer with the popup and raster function templates.
      const layer = new ImageryLayer({ popupTemplate, rasterFunction, url });

      viewElement.map.add(layer);
    </script>
  </body>
</html>
