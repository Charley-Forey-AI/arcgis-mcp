<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Intro to SubtypeGroupLayer | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      arcgis-layer-list {
        width: 375px;
      }
    </style>
  </head>

  <body>
    <arcgis-map basemap="streets-night-vector" center="-88.15, 41.787" zoom="17">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-popup slot="popup"></arcgis-popup>
      <arcgis-layer-list slot="top-right">
        <template id="item-template">
          <calcite-card>
            <div slot="footer-start" style="height: 40px">
              <calcite-label>
                Labels
                <calcite-switch label-text-start="off" label-text-end="on"></calcite-switch>
              </calcite-label>
            </div>

            <div slot="footer-end" style="height: 40px">
              <calcite-label>
                Renderer
                <calcite-radio-button-group>
                  <calcite-radio-button
                    checked
                    label-text="simple"
                    value="simple"></calcite-radio-button>
                  <calcite-radio-button
                    label-text="unique-value"
                    value="unique-value"></calcite-radio-button>
                </calcite-radio-button-group>
              </calcite-label>
            </div>
          </calcite-card>
        </template>
      </arcgis-layer-list>
    </arcgis-map>

    <script type="module">
      const [SubtypeGroupLayer, { createVisualVariables }] = await $arcgis.import([
        "@arcgis/core/layers/SubtypeGroupLayer.js",
        "@arcgis/core/smartMapping/renderers/univariateColorSize.js",
      ]);

      const viewElement = document.querySelector("arcgis-map");
      const layerList = document.querySelector("arcgis-layer-list");
      const layerListItemTemplate = document.getElementById("item-template");
      await viewElement.componentOnReady(); // Wait for property methods to be ready.

      const defaultRenderers = {};
      // Define asset groups that have multiple asset types.
      const assetGroups = {
        "Transformer": [522, 531, 533, 528],
        "Switch": [487, 493, 494, 502, 498],
        "Fuse": [161, 162, 163, 170, 172],
        "Service Point": [401, 402, 403],
        "Capacitor": [82, 85],
      };
      // Create a SubtypeGroupLayer, allowing for richer interaction with each SubtypeSublayer.
      const subtypeGroupLayer = new SubtypeGroupLayer({
        portalItem: { id: "b702d7258a724a53aada3fefc3a36829" }, // new PortalItem()
        outFields: ["assettype", "assetgroup", "objectid", "transformer_kva", "subnetworkname"],
      });

      viewElement.map.add(subtypeGroupLayer);
      // Configure the content for popups; this autocasts to PopupTemplate.
      const popupTemplate = {
        title: "Asset Group: {assetgroup}",
        content: [
          {
            type: "fields",
            fieldInfos: [
              { fieldName: "assettype", label: "Asset Type" },
              { fieldName: "transformer_kva", label: "Transformer KVA" },
              { fieldName: "subnetworkname", label: "Subnetwork Name" },
            ],
          },
        ],
      };

      // Define feature label appearance; this autocasts to LabelClass.
      const labelClass = {
        symbol: {
          type: "text", // new TextSymbol()
          color: "black",
          haloColor: "white",
          haloSize: 1.5,
          font: { family: "Noto Sans", size: 10 }, // new Font()
        },
        labelPlacement: "above-center",
        labelExpressionInfo: { expression: "SubtypeName($feature)" },
      };

      // Create uniqueValueInfos, used by the renderer to color features by asset type.
      const createUniqueValueInfos = (title) => {
        const colors = ["blue", "green", "orange", "purple", "yellow"];
        const assetTypes = assetGroups[title];
        return assetTypes.map((value, index) => {
          return { value, symbol: { type: "simple-marker", color: colors[index] } };
        });
      };

      // Create a UniqueValueRenderer which sets a color for each unique feature.
      const uniqueValueRenderer = {
        field: "assettype", // Each feature's uniqueness is determined by this field.
        type: "unique-value", // new UniqueValueRenderer(),
        defaultSymbol: { type: "simple-marker", color: "red" }, // new SimpleMarkerSymbol()
        uniqueValueInfos: [],
      };
      const handleRendererChange = async ({ value }, item) => {
        const { title } = item.layer;
        const hasVariedAssetTypes = assetGroups[title];

        // Use the stored original SimpleRenderer.
        if (value === "simple") {
          item.layer.renderer = defaultRenderers[title];
          return;
        }

        // Set uniqueValueInfos if asset types are distinguishable.
        if (hasVariedAssetTypes) {
          const uniqueValueInfos = createUniqueValueInfos(title);
          uniqueValueRenderer.uniqueValueInfos = uniqueValueInfos;
          uniqueValueRenderer.visualVariables = [];
          item.layer.renderer = uniqueValueRenderer;
          return;
        }

        // Apply color gradient by object ID if asset types are not distinguishable.
        const visualVariables = await createVisualVariables({
          layer: item.layer,
          view: viewElement.view,
          valueExpression: "( $feature.objectid )",
          theme: "high-to-low",
        });
        uniqueValueRenderer.visualVariables = [visualVariables.color.visualVariable];
        item.layer.renderer = uniqueValueRenderer;
      };
      const handleLabelsChange = (checked, item) => (item.layer.labelsVisible = checked);
      // Configure the controls for each of the LayerList's ListItems.
      layerList.listItemCreatedFunction = async ({ item }) => {
        const featureCount = await item.layer.queryFeatureCount();
        if (!featureCount) item.layer.listMode = "hide";
        if (item.layer === subtypeGroupLayer || !featureCount) return;

        const { renderer, title } = item.layer; // Get the layer tied to this ListItem.
        const layerListItemClone = layerListItemTemplate.content.cloneNode(true);
        const open = title === "Service Point"; // Open ListItem if its layer title matches.

        const content = layerListItemClone.querySelector("calcite-card");
        const symbolSwitch = content.querySelector("calcite-switch");
        const rendererRadioGroup = content.querySelector("calcite-radio-button-group");

        // Add event listeners to the ListItem's controls.
        symbolSwitch.addEventListener("calciteSwitchChange", () => {
          handleLabelsChange(symbolSwitch.checked, item);
        });
        rendererRadioGroup.addEventListener("calciteRadioButtonGroupChange", () => {
          handleRendererChange(rendererRadioGroup.selectedItem, item);
        });

        defaultRenderers[title] = renderer; // Store the layer's original SimpleRenderer.
        rendererRadioGroup.name = `${title} Renderer`; // Set a unique button group name.
        item.layer.popupTemplate = popupTemplate; // Set the layer's popup configuration.
        item.layer.labelingInfo = [labelClass]; // Set the layer's label configuration.
        item.panel = { content, open, icon: "gear" }; // Assign the ListItem controls.

        handleLabelsChange(false, item); // Toggle off feature labels by default.
      };
    </script>
  </body>
</html>
