<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Cluster size based on the sum of a field | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      #infoDiv {
        padding: 10px;
      }
    </style>
  </head>

  <body>
    <arcgis-map center="0,0" zoom="2">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-home slot="top-left"></arcgis-home>
      <arcgis-expand slot="top-left" expand-icon="list-bullet">
        <div id="infoDiv">
          <calcite-button id="cluster" secondary width="full">Disable Clustering</calcite-button>
          <arcgis-legend legend-style="classic"></arcgis-legend>
        </div>
      </arcgis-expand>
    </arcgis-map>

    <script type="module">
      const [Map, FeatureLayer, GeoJSONLayer] = await $arcgis.import([
        "@arcgis/core/Map.js",
        "@arcgis/core/layers/FeatureLayer.js",
        "@arcgis/core/layers/GeoJSONLayer.js",
      ]);

      const symbolColor = "#007f99";
      const outlineColor = "#ebe6df";

      const clusterConfig = {
        type: "cluster",
        fields: [
          {
            name: "population_total",
            alias: "Total population",
            onStatisticField: "POP",
            statisticType: "sum",
          },
        ],
        renderer: {
          type: "simple",
          symbol: {
            type: "simple-marker",
            style: "circle",
            color: symbolColor,
            size: 24,
            outline: {
              color: outlineColor,
              width: 1,
            },
          },
          visualVariables: [
            {
              type: "size",
              field: "population_total",
              stops: [
                { value: 0, size: 8 },
                { value: 100, size: 12 },
                { value: 10000, size: 18 },
                { value: 50000000, size: 48 },
              ],
            },
          ],
        },
        clusterRadius: "120px",
        // {cluster_count} is an aggregate field containing
        // the number of features comprised by the cluster
        popupTemplate: {
          title: "Cluster summary",
          content:
            "This cluster represents {cluster_count} cities with a total population of <b>{population_total}</b>.",
          fieldInfos: [
            {
              fieldName: "cluster_count",
              format: {
                places: 0,
                digitSeparator: true,
              },
            },
            {
              fieldName: "population_total",
              format: {
                places: 0,
                digitSeparator: true,
              },
            },
          ],
        },
        labelingInfo: [
          {
            deconflictionStrategy: "none",
            labelExpressionInfo: {
              expression: `
                var value = $feature.population_total;
                var num = Count(Text(Round(value)));

                if(value == 0){
                  return "";
                }
                Decode(num,
                  4, Text(value / Pow(10, 3), "##.0k"),
                  5, Text(value / Pow(10, 3), "##k"),
                  6, Text(value / Pow(10, 3), "##k"),
                  7, Text(value / Pow(10, 6), "##m"),
                  8, Text(value / Pow(10, 6), "##m"),
                  9, Text(value / Pow(10, 6), "##m"),
                  10, Text(value / Pow(10, 6), "##m"),
                  Text(value, "#,###")
                )
                `,
            },
            symbol: {
              type: "text",
              color: "white",
              font: {
                weight: "bold",
                family: "Noto Sans",
                size: "12px",
              },
              haloColor: symbolColor,
              haloSize: 1,
            },
            labelPlacement: "center-center",
          },
        ],
      };

      const layer = new FeatureLayer({
        minScale: 0,
        maxScale: 0,
        title: "World Cities",
        portalItem: {
          id: "6996f03a1b364dbab4008d99380370ed",
        },

        featureReduction: clusterConfig,

        // popupTemplates can still be viewed on
        // individual features
        popupTemplate: {
          title: "{CITY_NAME}, {CNTRY_NAME}",
          content: "Population: {POP}",
          fieldInfos: [
            {
              fieldName: "POP",
              format: {
                digitSeparator: true,
                places: 0,
              },
            },
          ],
        },
        renderer: {
          type: "simple",
          symbol: {
            type: "simple-marker",
            style: "circle",
            color: symbolColor,
            size: 4,
            outline: {
              color: outlineColor,
              width: 1,
            },
          },
        },
        labelingInfo: [
          {
            labelExpressionInfo: {
              expression: `
              var value = $feature.POP;
              var num = Count(Text(Round(value)));

              if(value == 0){
                return "";
              }
              Decode(num,
                4, Text(value / Pow(10, 3), "##.0k"),
                5, Text(value / Pow(10, 3), "##k"),
                6, Text(value / Pow(10, 3), "##k"),
                7, Text(value / Pow(10, 6), "##m"),
                8, Text(value / Pow(10, 6), "##m"),
                9, Text(value / Pow(10, 6), "##m"),
                10, Text(value / Pow(10, 6), "##m"),
                Text(value, "#,###")
              )
              `,
            },
            symbol: {
              type: "text",
              color: "white",
              font: {
                weight: "bold",
                family: "Noto Sans",
                size: "12px",
              },
              haloColor: symbolColor,
              haloSize: 1,
            },
            labelPlacement: "center-center",
          },
          {
            labelExpressionInfo: {
              expression: `
                $feature.CITY_NAME + ", " + $feature.ADMIN_NAME;
              `,
            },
            symbol: {
              type: "text",
              color: symbolColor,
              font: {
                family: "Noto Sans",
                size: "10px",
              },
              haloColor: "white",
              haloSize: 0.7,
            },
            labelPlacement: "above-right",
          },
        ],
      });

      // get the arcgis-map component element and set the map
      const viewElement = document.querySelector("arcgis-map");
      viewElement.map = new Map({
        basemap: "gray-vector",
        layers: [layer],
      });

      const toggleButton = document.getElementById("cluster");

      // To turn off clustering on a layer, set the
      // featureReduction property to null
      toggleButton.addEventListener("click", () => {
        let fr = layer.featureReduction;
        layer.featureReduction = fr && fr.type === "cluster" ? null : clusterConfig;
        toggleButton.textContent =
          toggleButton.textContent === "Enable Clustering"
            ? "Disable Clustering"
            : "Enable Clustering";
      });
    </script>
  </body>
</html>
