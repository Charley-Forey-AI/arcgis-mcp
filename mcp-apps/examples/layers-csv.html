<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Intro to CSVLayer | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <arcgis-scene item-id="a467ef1140de4e88acf34d38df9fb869">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"> </arcgis-compass>
    </arcgis-scene>
    <script type="module">
      const [CSVLayer] = await $arcgis.import(["@arcgis/core/layers/CSVLayer.js"]);

      // If CSV files are not on the same domain as your website, a CORS enabled server
      // or a proxy is required.
      const url = "https://developers.arcgis.com/javascript/latest/assets/sample-code/layers-csv/earthquakes.csv";

      // Paste the url into a browser's address bar to download and view the attributes
      // in the CSV file. These attributes include:
      // * mag - magnitude
      // * type - earthquake or other event such as nuclear test
      // * place - location of the event
      // * time - the time of the event

      const template = {
        title: "Earthquake Info",
        content: "Magnitude {mag} {type} hit {place} on {time}.",
      };

      const csvLayer = new CSVLayer({
        url: url,
        copyright: "USGS Earthquakes",
        popupTemplate: template,
      });

      csvLayer.renderer = {
        type: "simple", // autocasts as new SimpleRenderer()
        symbol: {
          type: "point-3d", // autocasts as new PointSymbol3D()
          // for this symbol we use 2 symbol layers, one for the outer circle
          // and one for the inner circle
          symbolLayers: [
            {
              type: "icon", // autocasts as new IconSymbol3DLayer()
              resource: { primitive: "circle" },
              material: { color: [255, 84, 54, 1] },
              size: 5,
            },
            {
              type: "icon", // autocasts as new IconSymbol3DLayer()
              resource: { primitive: "circle" },
              material: { color: [255, 84, 54, 0] },
              outline: { color: [255, 84, 54, 0.6], size: 1 },
              size: 25,
            },
          ],
        },
      };
      /*****************************************************************
       * Setup the Scene component and add the CSV layer
       *****************************************************************/
      const viewElement = document.querySelector("arcgis-scene");

      await viewElement.viewOnReady();

      viewElement.highlights = [
        {
          name: "default",
          color: "white",
        },
      ];

      viewElement.constraints = {
        altitude: {
          min: 700000,
        },
      };
      viewElement.environment.lighting = {
        type: "virtual",
      };

      viewElement.map.add(csvLayer);
    </script>
  </body>
</html>
