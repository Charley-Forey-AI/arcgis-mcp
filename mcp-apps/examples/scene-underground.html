<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Underground navigation in global mode | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      .panel-content {
        padding: 16px;
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>

  <body>
    <arcgis-scene item-id="0359bb9202614d7ca2bd0acc278422d6">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>
      <arcgis-compass slot="top-left"> </arcgis-compass>
      <calcite-panel slot="top-right">
        <div class="panel-content">
          <calcite-label layout="inline">
            <calcite-checkbox id="opacityInput" checked></calcite-checkbox>
            See through ground
          </calcite-label>
          <calcite-button id="undergroundBtn">Go underground</calcite-button>
        </div>
      </calcite-panel>
    </arcgis-scene>

    <script type="module">
      // Setup the Scene component
      const viewElement = document.querySelector("arcgis-scene");

      // Wait for the view to be ready.
      await viewElement.viewOnReady();

      // allow navigation above and below the ground
      viewElement.map.ground.navigationConstraint = {
        type: "none",
      };

      // the webscene has no basemap, so set a surfaceColor on the ground
      viewElement.map.ground.surfaceColor = "#fff";

      // to see through the ground, set the ground opacity to 0.4
      viewElement.map.ground.opacity = 0.4;

      const undergroundBtn = document.getElementById("undergroundBtn");
      const opacityInput = document.getElementById("opacityInput");

      undergroundBtn.addEventListener("click", () => {
        // slide 1 of the webscene presentation has a viewpoint that is underground
        viewElement
          .goTo(viewElement.map.presentation.slides.getItemAt(1).viewpoint, {
            duration: 1000,
          })
          .catch((error) => {
            if (error.name !== "AbortError") {
              console.error(error);
            }
          });
      });

      opacityInput.addEventListener("calciteCheckboxChange", (event) => {
        viewElement.map.ground.opacity = event.target.checked ? 0.4 : 1;
      });
    </script>
  </body>
</html>
