<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Access features with hitTest | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      #info span {
        color: orange;
      }

      #info {
        padding: 10px;
      }

      calcite-panel {
        width: 200px;
      }
    </style>
  </head>

  <body class="calcite-mode-dark">
    <arcgis-map zoom="3" center="-61.125537, 35.863534">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-expand slot="top-left" mode="floating">
        <arcgis-legend></arcgis-legend>
      </arcgis-expand>
      <calcite-panel
        heading="Hurricane"
        slot="top-right"
        description="Move the pointer over hurricane track to see info">
        <div id="info"></div>
      </calcite-panel>
    </arcgis-map>

    <script type="module">
      const [Map, FeatureLayer, promiseUtils] = await $arcgis.import([
        "@arcgis/core/Map.js",
        "@arcgis/core/layers/FeatureLayer.js",
        "@arcgis/core/core/promiseUtils.js",
      ]);

      // get the arcgis-map component element and wait for it to be ready
      const viewElement = document.querySelector("arcgis-map");

      // hurricanes featurelayer to the map
      const layer = new FeatureLayer({
        url: "https://sampleserver6.arcgisonline.com/arcgis/rest/services/Hurricanes/MapServer/1",
        outFields: ["NAME", "CAT", "WIND_KTS", "YEAR"],
      });

      viewElement.map = new Map({
        basemap: "dark-gray-vector",
        layers: [layer],
      });

      // wait for the map component to be ready
      await viewElement.viewOnReady();

      // change the default highlight option object's color to orange
      viewElement.highlights.forEach((highlightOption) => {
        if (highlightOption.name === "default") {
          highlightOption.color = "orange";
        }
      });

      const layerView = await viewElement.whenLayerView(layer);

      // update layer's renderer
      const renderer = layer.renderer.clone();
      renderer.symbol.width = 4;
      renderer.symbol.color = [128, 128, 128, 0.8];
      layer.renderer = renderer;

      const hurricanesHitTest = promiseUtils.debounce(async (event) => {
        try {
          // the hitTest() checks to see if any graphics from the hurricanesLayer
          // intersect the x, y coordinates of the pointer
          const response = await viewElement.hitTest(event.detail, { include: layer });
          if (!response.results.length) {
            // no results returned from hittest, remove previous highlights
            highlight?.remove();
            document.getElementById("info").innerHTML = `Name: <br> Category: <br> Speed:`;
            return;
          }

          // the topmost graphic from the hurricanes layer and display attribute
          // values from the graphic to the user
          const graphic = response.results[0].graphic;

          const attributes = graphic.attributes;
          const year = attributes.YEAR;
          const name = attributes.NAME;

          // update the hurricanes info div
          document.getElementById("info").innerHTML = setupHurricaneInfoDiv(attributes);

          // highlight all features belonging to the same hurricane as the feature
          // returned from the hitTest
          const query = layerView.createQuery();
          query.where = `YEAR = ${year} AND NAME = '${name}'`;
          layerView.queryObjectIds(query).then((ids) => {
            highlight?.remove();
            highlight = layerView.highlight(ids);
            currentYear = year;
            currentName = name;
          });
        } catch (err) {
          if (err.name !== "AbortError") {
            console.error(err);
          }
        }
      });

      // Set up an event handler for pointer-down (mobile) and pointer-move events
      // and retrieve the screen x, y coordinates
      viewElement.addEventListener("arcgisViewPointerDown", eventHandler);
      viewElement.addEventListener("arcgisViewPointerMove", eventHandler);

      let highlight, currentYear, currentName;

      const nameDiv = document.getElementById("name");
      const categoryDiv = document.getElementById("category");
      const windDiv = document.getElementById("wind");

      async function eventHandler(event) {
        try {
          await hurricanesHitTest(event);
        } catch (err) {
          if (err.name !== "AbortError") {
            console.error(err);
          }
        }
      }

      // update info div to show hurricanes info
      function setupHurricaneInfoDiv(attributes) {
        let isFirst = true;
        const htmls = Object.keys(hurricaneInfoFields)
          .map((name) => {
            if (attributes[name] != null) {
              const html = `${isFirst ? "" : "<br>"}${hurricaneInfoFields[name]}: <b><span>${attributes[name]}</span></b>`;
              isFirst = false;
              return html;
            }
            return "";
          })
          .filter((html) => html !== "");
        return htmls.join("");
      }

      // fields used to display hurricanes info
      const hurricaneInfoFields = {
        NAME: "Name",
        CAT: "Category",
        WIND_KTS: "Speed",
      };
    </script>
  </body>
</html>
