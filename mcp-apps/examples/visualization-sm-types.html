<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Generate data-driven visualization of unique values | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <arcgis-map basemap="gray-vector" zoom="4" center="-100, 39">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-legend slot="bottom-left" legend-style="card"></arcgis-legend>
      <arcgis-expand slot="top-right">
        <arcgis-basemap-gallery></arcgis-basemap-gallery>
      </arcgis-expand>
    </arcgis-map>
    <script type="module">
      const [FeatureLayer, typeRendererCreator, reactiveUtils] = await $arcgis.import([
        "@arcgis/core/layers/FeatureLayer.js",
        "@arcgis/core/smartMapping/renderers/type.js",
        "@arcgis/core/core/reactiveUtils.js",
      ]);
      const viewElement = document.querySelector("arcgis-map");

      // Call generateRenderer() anytime the user switches the basemap
      document
        .querySelector("arcgis-basemap-gallery")
        .addEventListener("arcgisPropertyChange", (event) => {
          if (event.detail.name === "activeBasemap") {
            generateRenderer();
          }
        });

      // Create FeatureLayer instance with popupTemplate

      const fieldInfos = [
        {
          fieldName: "M172_07",
          label: "Wheat",
          fieldFormat: {
            type: "number",
            minimumFractionDigits: 0,
            maximumFractionDigits: 0,
          },
        },
        {
          fieldName: "M188_07",
          label: "Cotton",
          fieldFormat: {
            type: "number",
            minimumFractionDigits: 0,
            maximumFractionDigits: 0,
          },
        },
        {
          fieldName: "M193_07",
          label: "Soybeans",
          fieldFormat: {
            type: "number",
            minimumFractionDigits: 0,
            maximumFractionDigits: 0,
          },
        },
        {
          fieldName: "M217_07",
          label: "Vegetables",
          fieldFormat: {
            type: "number",
            minimumFractionDigits: 0,
            maximumFractionDigits: 0,
          },
        },
        {
          fieldName: "M163_07",
          label: "Corn",
          fieldFormat: {
            type: "number",
            minimumFractionDigits: 0,
            maximumFractionDigits: 0,
          },
        },
      ];

      const layer = new FeatureLayer({
        url: "https://services.arcgis.com/V6ZHFr6zdgNZuVG0/arcgis/rest/services/US_county_crops_2007_clean/FeatureServer/0",
        outFields: [
          "M172_07",
          "M188_07",
          "M193_07",
          "M217_07",
          "M163_07",
          "TOT_CROP_ACRES",
          "DOM_CROP_ACRES",
          "COUNTY",
          "STATE",
        ],
        title: "U.S. Counties - crop harvest",
        popupTemplate: {
          // autocasts as new PopupTemplate()
          title: "{COUNTY}, {STATE}",
          content: [
            {
              type: "text",
              text:
                "{TOT_CROP_ACRES} acres of crops were harvested in {COUNTY}, {STATE}" +
                " in 2007. The table below breaks down the number of acres that were" +
                " harvested for each type of crop.",
            },
            {
              type: "fields",
              fieldInfos: fieldInfos,
            },
          ],
          fieldInfos: [
            {
              fieldName: "TOT_CROP_ACRES",
              label: "Total harvest acres of crops",
              format: {
                digitSeparator: true,
                places: 0,
              },
            },
          ],
        },
      });

      // Generate the renderer when the view becomes ready
      await viewElement.viewOnReady();
      generateRenderer();

      function generateRenderer() {
        // configure parameters for the color renderer generator.
        // The layer must be specified along with a field name
        // The view and other properties determine
        // the appropriate default color scheme.

        const typeParams = {
          layer: layer,
          view: viewElement.view,
          field: "DOM_CROP_ACRES",
          legendOptions: {
            title: "Dominant crop in harvested acres by county (2007)",
          },
        };

        // Generate a unique value renderer based on the
        // unique values of the DOM_CROPS_ACRES field.
        // The generated renderer creates a visualization,
        // assigning each feature to a category.
        //
        // This resolves to an object containing several helpful
        // properties, including the type scheme, unique value infos,
        // excluded values (if any), and the renderer object

        typeRendererCreator
          .createRenderer(typeParams)
          .then((response) => {
            // set the renderer to the layer and add it to the map

            layer.renderer = response.renderer;

            if (!viewElement.map.layers.includes(layer)) {
              viewElement.map.add(layer);
            }
          })
          .catch((error) => {
            console.error("there was an error: ", error);
          });
      }
    </script>
  </body>
</html>
