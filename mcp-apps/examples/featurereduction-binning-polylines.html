<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Binning polylines | Sample | ArcGIS Maps SDK for JavaScript</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      #infoDiv {
        padding: 10px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      #binning-button {
        width: 100%;
      }
    </style>
  </head>

  <body>
    <arcgis-map item-id="50f30ad3e33e48cfb1e6f21339d5cbcc">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-expand expand-icon="list-bullet" slot="top-left">
        <div id="infoDiv">
          <calcite-button id="binning-button">Disable Binning</calcite-button>
          <arcgis-legend></arcgis-legend>
        </div>
      </arcgis-expand>
      <arcgis-home slot="top-left"></arcgis-home>
    </arcgis-map>

    <script type="module">
      const colorRamps = await $arcgis.import(
        "@arcgis/core/smartMapping/symbology/support/colorRamps.js",
      );

      const toggleButton = document.getElementById("binning-button");
      const viewElement = document.querySelector("arcgis-map");

      const { colors } = colorRamps.byName("Circling Circus");

      function createSymbol(params) {
        const { type, color } = params;

        if (type === "simple-line") {
          return {
            type: "simple-line",
            color,
            width: 3,
          };
        }
        return {
          type: "simple-marker",
          color,
          outline: {
            color: "rgba(255,255,255,0.3)",
            width: 0.7,
          },
        };
      }

      const railLineNames = [
        "North Island Main Trunk",
        "Main South Line",
        "North Auckland Line",
        "Palmerston North - Gisborne Line",
        "Main North Line",
        "Midland Line",
        "Stillwater - Ngakawau Line",
        "Wairarapa Line",
        "East Coast Main Trunk",
        "Marton - New Plymouth Line",
      ];

      await viewElement.viewOnReady();

      const map = viewElement.map;
      // layer representing bridges in New Zealand
      const layer = map.layers.getItemAt(0);

      const featureReduction = {
        type: "binning",
        fixedBinLevel: 4, // determines bin resolution
        labelsVisible: true,
        labelingInfo: [
          {
            minScale: 2311163,
            deconflictionStrategy: "none",
            labelExpressionInfo: {
              expression: "Text($feature.aggregateCount, '#,###')",
            },
            symbol: {
              type: "text",
              color: "rgba(255,255,255,1)",
              font: {
                weight: "bold",
                family: "Noto Sans",
                size: "12px",
              },
              haloColor: "gray",
              haloSize: 1,
            },
          },
        ],
        popupTemplate: {
          title: "Bin summary",
          content: "This bin contains {aggregateCount} bridges.",
        },
        // disable binning at this scale
        maxScale: 902800,
        fields: [
          {
            name: "aggregateCount",
            statisticType: "count",
          },
          {
            name: "line",
            alias: "Predominant Line",
            onStatisticField: "LINE_NAME",
            statisticType: "mode",
          },
          {
            name: "total_length",
            alias: "Total bridge length",
            onStatisticField: "SHAPE__Length",
            statisticType: "sum",
          },
        ],
        renderer: {
          type: "unique-value",
          field: "line", // note this must come from featureReduction.fields
          backgroundFillSymbol: {
            type: "simple-fill",
            color: null,
            outline: {
              color: "rgba(200,200,200,0.5)",
              width: 0.5,
            },
          },
          defaultSymbol: createSymbol({ type: "simple-marker", color: "rgba(0,0,0,0.5)" }),
          defaultLabel: "All others",
          // note the symbol type for bins must be simple-marker or simple-fill
          // because the bin is represented as a polygon geometry
          uniqueValueInfos: railLineNames.map((line, i) => ({
            value: line,
            symbol: createSymbol({ type: "simple-marker", color: colors[i] }),
          })),
          // vary the size of bin symbols based on the total length of bridges in the bin
          visualVariables: [
            {
              type: "size",
              field: "total_length",
              minDataValue: 10,
              maxDataValue: 5000,
              // vary min size by scale. Icon sizes should grow
              // as you zoom in and shrink as you zoom out
              minSize: {
                type: "size",
                valueExpression: "$view.scale",
                stops: [
                  {
                    value: 2311162,
                    size: "16px",
                  },
                  {
                    value: 9244649,
                    size: "3px",
                  },
                  {
                    value: 18489297,
                    size: "2px",
                  },
                ],
              },
              // vary max size by scale. Icon sizes should grow
              // as you zoom in and shrink as you zoom out
              maxSize: {
                type: "size",
                valueExpression: "$view.scale",
                stops: [
                  {
                    value: 2311162,
                    size: "64px",
                  },
                  {
                    value: 9244649,
                    size: "37px",
                  },
                  {
                    value: 18489297,
                    size: "18px",
                  },
                ],
              },
            },
          ],
        },
      };

      layer.featureReduction = featureReduction;
      layer.blendMode = "multiply";

      // note the symbol type for this layer must be simple-line
      // because the layer geometry type is polyline
      layer.renderer = {
        type: "unique-value",
        field: "LINE_NAME", // note this must come from layer.fields
        defaultSymbol: createSymbol({ type: "simple-line", color: "rgba(0,0,0,0.5)" }),
        uniqueValueInfos: railLineNames.map((line, i) => ({
          value: line,
          symbol: createSymbol({ type: "simple-line", color: colors[i] }),
        })),
      };

      viewElement.addEventListener("arcgisViewChange", (event) => {
        toggleButton.disabled = viewElement.scale <= featureReduction.maxScale;
      });

      // To turn off binning on a layer, set the
      // featureReduction property to null
      toggleButton.addEventListener("click", () => {
        let fr = layer.featureReduction;
        layer.featureReduction = fr && fr.type === "binning" ? null : featureReduction;
        toggleButton.textContent =
          toggleButton.textContent === "Enable Binning" ? "Disable Binning" : "Enable Binning";
      });
    </script>
  </body>
</html>
